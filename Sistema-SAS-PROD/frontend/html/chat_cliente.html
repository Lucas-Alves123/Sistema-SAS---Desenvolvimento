<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat SAS — v3.6</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; padding: 0; }
        .chat-container { height: 100vh; display: flex; flex-direction: column; background: white; }
        @media (min-width: 768px) {
            .chat-container { height: calc(100vh - 40px); margin: 20px 0; border-radius: 2.5rem; border: 1px solid #e2e8f0; }
        }
        .chat-bg { background: #f8fafc url("https://www.transparenttextures.com/patterns/cubes.png"); }
        .message-bubble { max-width: 85%; animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">

    <div class="w-full max-w-4xl overflow-hidden chat-container shadow-2xl relative">
        <header class="px-6 py-4 bg-white border-b border-slate-100 flex items-center justify-between z-10 shrink-0">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-blue-600 flex items-center justify-center text-white font-black shadow-lg">AS</div>
                <div>
                    <h1 class="text-sm md:text-base font-black text-slate-800 leading-tight">Atendimento SAS <span class="text-blue-600 text-[10px]">v3.6</span></h1>
                    <div class="flex items-center gap-1.5 mt-0.5">
                        <span class="text-[9px] text-blue-600 font-extrabold uppercase tracking-widest">Em Atendimento</span>
                    </div>
                </div>
            </div>
        </header>

        <main id="chatWindow" class="flex-1 overflow-y-auto p-4 md:p-6 chat-bg space-y-6 custom-scrollbar">
            <div id="loading" class="flex flex-col items-center justify-center h-full opacity-30"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>
        </main>

        <footer class="p-4 md:p-6 bg-white border-t border-slate-100 shrink-0">
            <!-- Resetadores de input -->
            <input type="file" id="fileInput" class="hidden" onclick="this.value=null">
            <input type="file" id="imgInput" class="hidden" accept="image/*" onclick="this.value=null">
            
            <div class="flex items-center gap-2 md:gap-4 bg-slate-100/60 p-1.5 md:p-2 rounded-[2.5rem] border border-slate-200">
                <div class="flex items-center gap-0.5 md:gap-1 pl-1 md:pl-2 border-r border-slate-200 pr-1 md:pr-2">
                    <button onclick="document.getElementById('fileInput').click()" class="p-1.5 md:p-2 text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="paperclip" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                    <button onclick="document.getElementById('imgInput').click()" class="p-1.5 md:p-2 text-slate-400 hover:text-blue-600 transition-all"><i data-lucide="camera" class="w-4 h-4 md:w-5 md:h-5"></i></button>
                </div>
                <input type="text" id="msgInput" placeholder="Mensagem..." class="flex-1 bg-transparent border-none focus:ring-0 text-[13px] md:text-sm py-2 text-slate-700 outline-none min-w-0">
                <button id="sendBtn" class="bg-blue-600 text-white p-3 md:p-4 rounded-xl md:rounded-2xl shadow-lg active:scale-95 transition-all shrink-0">
                    <i data-lucide="send" class="w-4 h-4 md:w-5 md:h-5"></i>
                </button>
            </div>
        </footer>
    </div>

    <!-- Preview Modal -->
    <div id="previewModal" class="fixed inset-0 bg-black/90 hidden z-[100] flex-col items-center justify-center p-4">
        <div class="w-full max-w-lg bg-white rounded-3xl overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex items-center justify-between">
                <span class="text-xs font-black uppercase text-slate-400">Confirmar Envio</span>
                <button onclick="closePreview()" class="p-2 hover:bg-slate-50 rounded-full"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="flex-1 flex flex-col items-center justify-center bg-slate-50 p-6 overflow-hidden">
                <img id="previewImg" class="max-w-full max-h-[50vh] rounded-xl shadow-lg hidden">
                <div id="docPreview" class="hidden flex flex-col items-center gap-4">
                    <div class="bg-blue-600 p-8 rounded-3xl text-white shadow-xl"><i data-lucide="file-text" class="w-12 h-12"></i></div>
                    <p id="docName" class="text-sm font-bold text-slate-800 text-center"></p>
                </div>
            </div>
            <div class="p-6 space-y-4">
                <input type="text" id="previewCaption" placeholder="Legenda..." class="w-full bg-slate-100 rounded-2xl py-4 px-6 text-sm outline-none">
                <button onclick="doSend()" id="finalSendBtn" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black text-xs shadow-xl active:scale-95">ENVIAR AGORA</button>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const chatWindow = document.getElementById('chatWindow');
        const params = new URLSearchParams(window.location.search);
        let sessaoId = params.get('sessao_id') || localStorage.getItem('sas_chat_sessao_id');
        let selectedFileBlob = null;
        let selectedFileName = "";
        let selectedFileType = "";
        let lastMsgCount = 0;

        if (sessaoId) localStorage.setItem('sas_chat_sessao_id', sessaoId);

        const closePreview = () => {
            document.getElementById('previewModal').classList.add('hidden');
            selectedFileBlob = null;
            document.getElementById('previewImg').src = "";
        };

        const handleFile = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            selectedFileName = file.name;
            selectedFileType = file.type;
            const isImg = file.type.startsWith('image/');
            
            const reader = new FileReader();
            reader.onload = (ev) => {
                selectedFileBlob = ev.target.result;
                document.getElementById('previewImg').classList.toggle('hidden', !isImg);
                document.getElementById('docPreview').classList.toggle('hidden', isImg);
                document.getElementById('docName').textContent = selectedFileName;
                if (isImg) document.getElementById('previewImg').src = selectedFileBlob;
                
                document.getElementById('previewModal').classList.remove('hidden');
                document.getElementById('previewModal').classList.add('flex');
            };
            reader.readAsDataURL(file);
        };

        document.getElementById('fileInput').onchange = handleFile;
        document.getElementById('imgInput').onchange = handleFile;

        const doSend = async () => {
            if (!selectedFileBlob) return;
            const btn = document.getElementById('finalSendBtn');
            btn.disabled = true;
            btn.textContent = "ENVIANDO...";
            
            const isImg = selectedFileType.startsWith('image/');
            const caption = document.getElementById('previewCaption').value.trim();
            const textMsg = isImg ? (caption || 'Imagem enviada') : `DOC:${selectedFileName}|${caption || 'Documento enviado'}`;
            
            try {
                const res = await fetch('/api/chat/mensagem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessao_id: sessaoId, remetente_tipo: 'servidor', mensagem: textMsg, midia_url: selectedFileBlob })
                });
                if (res.ok) {
                    closePreview();
                    document.getElementById('previewCaption').value = "";
                    setTimeout(loadMessages, 500);
                } else {
                    alert("Erro no servidor ao processar o arquivo.");
                }
            } catch(err) { alert("Erro de conexão."); }
            
            btn.disabled = false;
            btn.textContent = "ENVIAR AGORA";
        };

        const addMessage = (text, align='right', time = null, midiaUrl = null) => {
            if (!time) time = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
            const isBot = align === 'left';
            const d = document.createElement('div');
            d.className = `flex flex-col ${isBot ? 'items-start' : 'items-end'} mb-4`;
            
            const bubbleClass = isBot ? 'bg-white text-slate-700 border-slate-100' : 'bg-blue-600 text-white border-blue-500';
            let content = '';
            let finalMsg = text;

            if (midiaUrl && midiaUrl.length > 50) {
                if (midiaUrl.startsWith('data:image/')) {
                    content = `<div class="mb-2 rounded-xl overflow-hidden min-w-[200px] bg-black/5"><img src="${midiaUrl}" class="max-w-full cursor-pointer" onclick="window.open('${midiaUrl}')"></div>`;
                } else {
                    let displayFileName = 'Arquivo';
                    if (text.includes('|')) {
                        displayFileName = text.split('|')[0].replace('DOC:', '');
                        finalMsg = text.split('|')[1];
                    }
                    content = `<div class="mb-2 p-3 bg-white/10 rounded-xl flex items-center gap-3 cursor-pointer border border-white/10 w-full" onclick="const a=document.createElement('a');a.href='${midiaUrl}';a.download='${displayFileName}';a.click();"><div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-blue-600 shrink-0"><i data-lucide="file-text"></i></div><div class="flex-1 overflow-hidden text-left"><p class="text-[11px] font-bold truncate text-white">${displayFileName}</p><p class="text-[9px] font-black uppercase text-blue-200">Baixar</p></div></div>`;
                }
            }
            
            d.innerHTML = `<div class="message-bubble px-4 py-3 rounded-2xl border shadow-lg ${bubbleClass}" style="width:fit-content;max-width:85%;">${content}<p class="text-[13px] font-medium leading-relaxed">${finalMsg}</p><span class="text-[8px] block mt-1 opacity-50 uppercase font-black tracking-widest">${time}</span></div>`;
            chatWindow.appendChild(d);
            chatWindow.scrollTop = chatWindow.scrollHeight;
            lucide.createIcons();
        };

        const loadMessages = async () => {
            if (!sessaoId) return;
            try {
                const res = await fetch(`/api/chat/mensagens/${sessaoId}`);
                const msgs = await res.json();
                const validMsgs = msgs.filter(m => !m.mensagem.includes('DADOS DO SERVIDOR'));
                if (validMsgs.length > lastMsgCount) {
                    if (lastMsgCount === 0) chatWindow.innerHTML = '';
                    const newMsgs = validMsgs.slice(lastMsgCount);
                    newMsgs.forEach(m => {
                        const align = m.remetente_tipo === 'atendente' ? 'left' : 'right';
                        const time = m.created_at.split(' ')[1].substring(0,5);
                        addMessage(m.mensagem, align, time, m.midia_url);
                    });
                    lastMsgCount = validMsgs.length;
                }
            } catch (e) {}
        };

        setInterval(loadMessages, 3000);
        document.getElementById('sendBtn').onclick = async () => {
            const val = document.getElementById('msgInput').value.trim();
            if (val) {
                await fetch('/api/chat/mensagem', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessao_id: sessaoId, remetente_tipo: 'servidor', mensagem: val })
                });
                document.getElementById('msgInput').value = '';
                loadMessages();
            }
        };
        msgInput.onkeydown = (e) => { if(e.key === 'Enter') sendBtn.click(); };
        loadMessages();
    </script>
</body>
</html>
