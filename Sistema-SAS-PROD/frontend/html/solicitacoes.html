<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Central de Solicitações - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sonner@1.4.0/dist/sonner.js"></script>
</head>

<body>
    <div id="app"></div>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Solicitações');
        const content = document.getElementById('page-content');

        const isDev = user.tipo === 'dev';
        const isAdmin = user.tipo === 'adm';
        const isAtendente = user.tipo === 'usuario';
        const isAdminOrDev = isDev || isAdmin;
        const canManage = isDev || isAdmin || isAtendente;
        const canCreateSolicitacao = user.tipo !== 'dev';

        content.innerHTML = `
            <div class="flex flex-col items-center justify-center mb-8 animate-fade-in">
                <div class="flex items-center gap-3 mb-2">
                    <i data-lucide="clipboard-list" class="w-8 h-8 text-blue-700"></i>
                    <h1 class="text-3xl font-bold text-blue-700">Central de Solicitações</h1>
                </div>
                <div class="flex justify-center items-center">
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>
            </div>

            <div class="max-w-7xl mx-auto px-4">
                <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                    
                    <!-- Left Side: Form -->
                    <div class="lg:col-span-4 space-y-6">
                        ${canCreateSolicitacao ? `
                            <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 sticky top-24">
                                <h2 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                                    <i data-lucide="plus-circle" class="w-5 h-5 text-blue-600"></i>
                                    Nova Solicitação
                                </h2>
                                <form id="solicitacaoForm" class="space-y-4">
                                    <div>
                                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Título</label>
                                        <input type="text" id="titulo" required class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all" placeholder="Ex: Ajuste no painel de chamadas">
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Categoria</label>
                                        <select id="categoria" required class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                            <option value="Melhoria">Melhoria</option>
                                            <option value="Erro no sistema">Erro no sistema</option>
                                            <option value="Novo recurso">Novo recurso</option>
                                            <option value="Dúvida">Dúvida</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Nível de Atendimento</label>
                                        <select id="prioridade" required class="w-full border border-slate-200 rounded-lg p-3 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                                            <option value="Baixa">Baixa</option>
                                            <option value="Média">Média</option>
                                            <option value="Alta">Alta</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Descrição Detalhada</label>
                                        <textarea id="descricao" required class="w-full border border-slate-200 rounded-lg p-3 text-sm h-32 focus:ring-2 focus:ring-blue-500 outline-none transition-all resize-none" placeholder="Descreva sua solicitação com detalhes..."></textarea>
                                    </div>
                                    <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 flex items-center justify-center gap-2">
                                        <i data-lucide="send" class="w-4 h-4"></i>
                                        Enviar Solicitação
                                    </button>
                                </form>
                            </div>
                        ` : ''}
                    </div>

                    <!-- Right Side: List -->
                    <div class="${canCreateSolicitacao ? 'lg:col-span-8' : 'lg:col-span-12'}">
                        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div class="px-6 py-4 border-b border-slate-100 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-slate-50/50">
                                <div class="flex items-center gap-3">
                                    <h1 class="text-lg font-bold text-slate-800">
                                        ${canManage ? 'Painel de Solicitações' : 'Minhas Solicitações'}
                                    </h1>
                                    <span id="totalCount" class="bg-blue-100 text-blue-700 text-xs font-bold px-2.5 py-1 rounded-full">0 Solicitações</span>
                                </div>
                                ${canManage ? `
                                    <div class="flex items-center gap-2">
                                        <label class="text-xs font-bold text-gray-400 uppercase whitespace-nowrap">Filtrar:</label>
                                        <select id="statusFilter" onchange="loadSolicitacoes()" class="bg-white border border-slate-200 rounded-lg px-2 py-1 text-xs focus:ring-2 focus:ring-blue-500 outline-none">
                                            <option value="">Todos os Status</option>
                                            <option value="Análise">Análise</option>
                                            <option value="Em desenvolvimento">Em desenvolvimento</option>
                                            <option value="Em teste">Em teste</option>
                                            <option value="Concluído">Concluído</option>
                                            <option value="Rejeitado">Rejeitado</option>
                                        </select>
                                    </div>
                                ` : ''}
                            </div>
                            <div class="overflow-x-auto">
                                <table class="w-full text-left border-collapse">
                                    <thead>
                                        <tr class="bg-white">
                                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-slate-100">ID</th>
                                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-slate-100">Solicitação</th>
                                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-slate-100 text-center">Status</th>
                                            <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider border-b border-slate-100 text-right">Ver</th>
                                        </tr>
                                    </thead>
                                    <tbody id="solicitacoesList" class="divide-y divide-slate-100"></tbody>
                                </table>
                            </div>
                            <div id="emptyState" class="hidden p-12 text-center">
                                <i data-lucide="inbox" class="w-12 h-12 text-slate-300 mx-auto mb-4"></i>
                                <p class="text-slate-500 font-medium">Nenhuma solicitação encontrada.</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Details & Chat Modal -->
            <div id="detailModal" class="fixed inset-0 bg-slate-900/60 hidden flex items-center justify-center z-[100] p-4 backdrop-blur-sm">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-5xl max-h-[95vh] flex flex-col overflow-hidden animate-scale-up">
                    
                    <div class="px-8 py-6 border-b border-slate-100 flex justify-between items-start bg-slate-50/50">
                        <div>
                            <div class="flex items-center gap-3 mb-1">
                                <span id="modalId" class="bg-blue-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded">#0</span>
                                <h1 id="modalTitle" class="text-2xl font-bold text-slate-800">Visualizar Solicitação</h1>
                            </div>
                            <p id="modalInfo" class="text-sm text-slate-500">Enviada por <span class="font-bold text-slate-700" id="modalSolicitante">...</span> em <span id="modalData">...</span></p>
                        </div>
                        <button onclick="closeDetailModal()" class="text-slate-400 hover:text-slate-600 transition-colors">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>

                    <div class="flex-1 overflow-hidden grid grid-cols-1 lg:grid-cols-12">
                        
                        <!-- Details (Left) -->
                        <div class="lg:col-span-5 p-8 overflow-y-auto border-r border-slate-100 space-y-8 bg-white">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-3">Descrição</label>
                                <div id="modalDescricao" class="text-slate-700 leading-relaxed text-sm bg-slate-50 p-5 rounded-2xl border border-slate-200 max-h-60 overflow-y-auto">...</div>
                            </div>

                            <div class="grid grid-cols-2 gap-6">
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Categoria</label>
                                    <div id="modalCategoria" class="font-bold text-slate-800 text-sm">...</div>
                                </div>
                                <div>
                                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Nível de Atendimento</label>
                                    <div id="modalPrioridade" class="font-bold text-slate-800 text-sm">...</div>
                                </div>
                            </div>

                            <div class="w-2/3">
                                <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Status</label>
                                <div id="statusControlContainer">
                                    <!-- Dynamic Status Select or Badge -->
                                </div>
                            </div>
                            
                            <div id="rejectionSection" class="hidden animate-fade-in bg-red-50 border border-red-200 p-5 rounded-2xl">
                                <label class="block text-xs font-bold text-red-600 uppercase mb-2">Motivo da Rejeição</label>
                                <p id="modalMotivoRejeicao" class="text-sm text-red-800 font-medium italic">...</p>
                            </div>

                            <div id="rejectionInputUI" class="hidden animate-fade-in pt-8 border-t border-slate-100">
                                <label class="block text-xs font-bold text-red-600 uppercase mb-3">Motivo da Rejeição (Obrigatório)</label>
                                <textarea id="rejectionReason" class="w-full border border-red-100 rounded-2xl p-4 text-sm h-32 focus:ring-2 focus:ring-red-500 outline-none transition-all resize-none bg-red-50/30" placeholder="Explique por que esta solicitação foi rejeitada..."></textarea>
                                <div class="flex gap-3 mt-4">
                                    <button onclick="hideRejectionUI()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200 transition-colors">Voltar</button>
                                    <button onclick="confirmRejection()" class="flex-1 bg-red-600 text-white py-3 rounded-xl font-bold hover:bg-red-700 transition-colors shadow-lg shadow-red-200">Confirmar Rejeição</button>
                                </div>
                            </div>
                            <!-- HISTORY REMOVED -->
                        </div>

                        <!-- Chat (Right) -->
                        <div class="lg:col-span-7 bg-slate-50/50 flex flex-col overflow-hidden">
                            <div class="px-8 py-5 bg-white border-b border-slate-100 flex items-center justify-between shadow-sm">
                                <h3 class="font-bold text-slate-700 flex items-center gap-3">
                                    <div class="bg-blue-100 p-2 rounded-lg">
                                        <i data-lucide="message-square" class="w-5 h-5 text-blue-600"></i>
                                    </div>
                                    Conversa Interna
                                </h3>
                                <div class="flex items-center gap-2 text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                    <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
                                    Chat Ativo
                                </div>
                            </div>
                            
                            <div id="chatMessages" class="flex-1 overflow-y-auto p-8 space-y-6 scroll-smooth">
                                <!-- Messages load here -->
                            </div>

                            <div class="p-6 bg-white border-t border-slate-100">
                                <div id="chatReadOnlyForAdmin" class="hidden p-4 mb-4 bg-blue-50 border border-blue-100 rounded-2xl text-center text-xs font-bold text-blue-600 italic">
                                    <i data-lucide="info" class="w-4 h-4 inline-block mr-1"></i>
                                    Apenas o solicitante e desenvolvedores podem interagir no chat.
                                </div>
                                <div id="chatInputArea" class="flex gap-3">
                                    <input type="text" id="chatMessageInput" onkeypress="if(event.key==='Enter') sendChatMessage()" class="flex-1 bg-slate-100 border-none rounded-2xl px-6 py-4 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition-all shadow-inner" placeholder="Pressione Enter para enviar...">
                                    <button onclick="sendChatMessage()" id="sendChatBtn" class="bg-blue-600 text-white p-4 rounded-2xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-200 group">
                                        <i data-lucide="send" class="w-6 h-6 group-hover:scale-110 transition-transform"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        let currentSolicitacaoId = null;
        let activeSolicitacao = null;

        const getStatusStyles = (status) => {
            const map = {
                'Enviada': 'bg-slate-100 text-slate-600',
                'Em análise': 'bg-blue-100 text-blue-700',
                'Análise': 'bg-blue-100 text-blue-700',
                'Aprovado': 'bg-emerald-100 text-emerald-700',
                'Rejeitado': 'bg-red-100 text-red-700',
                'Em desenvolvimento': 'bg-amber-100 text-amber-700',
                'Em teste': 'bg-indigo-100 text-indigo-700',
                'Concluído': 'bg-purple-100 text-purple-700'
            };
            return map[status] || 'bg-slate-100 text-slate-700';
        };

        const loadSolicitacoes = async () => {
            try {
                const statusFilterEl = document.getElementById('statusFilter');
                const statusFilter = statusFilterEl ? statusFilterEl.value : '';

                const response = await fetch(`/api/solicitacoes?user_id=${user.id}&user_tipo=${user.tipo}`);
                const allItems = await response.json();
                let list = [...allItems];

                if (statusFilter) {
                    list = list.filter(item => item.status === statusFilter || (statusFilter === 'Análise' && item.status === 'Em análise'));
                }

                const container = document.getElementById('solicitacoesList');
                const totalEl = document.getElementById('totalCount');
                container.innerHTML = '';
                totalEl.textContent = `${list.length} Solicitações`;

                if (list.length === 0) {
                    document.getElementById('emptyState').classList.remove('hidden');
                    return;
                }
                document.getElementById('emptyState').classList.add('hidden');

                list.forEach(item => {
                    const row = document.createElement('tr');
                    row.className = 'hover:bg-slate-50 transition-colors cursor-pointer group';
                    row.onclick = () => openDetailModal(item.id);
                    row.innerHTML = `
                        <td class="px-6 py-5 font-bold text-slate-400 text-xs">#${item.id}</td>
                        <td class="px-6 py-5">
                            <div class="font-bold text-slate-700 group-hover:text-blue-700 transition-colors leading-tight mb-1">${item.titulo}</div>
                            <div class="flex items-center gap-3 text-[10px] text-slate-400 font-medium">
                                <span class="uppercase tracking-wider px-1.5 py-0.5 bg-slate-100 rounded text-slate-500">${item.categoria}</span>
                                <span>•</span>
                                <span>De: ${item.solicitante_nome}</span>
                                <span>•</span>
                                <span>${new Date(item.data_criacao).toLocaleDateString()}</span>
                            </div>
                        </td>
                        <td class="px-6 py-5 text-center">
                            <span class="text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest leading-none ${getStatusStyles(item.status)}">
                                ${item.status === 'Em análise' ? 'Análise' : item.status}
                            </span>
                        </td>
                        <td class="px-6 py-5 text-right">
                            <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300 group-hover:text-blue-600 transition-all group-hover:translate-x-1 inline-block"></i>
                        </td>
                    `;
                    container.appendChild(row);
                });
                lucide.createIcons();

                if (allItems.length > 0 && canManage) {
                    const maxId = Math.max(...allItems.map(i => i.id));
                    localStorage.setItem('sas_last_seen_solicitacao_id', maxId);
                    if (window.SAS.layout.updateSolicitacoesBadge) window.SAS.layout.updateSolicitacoesBadge();
                }
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao carregar solicitações.');
            }
        };

        const openDetailModal = async (id) => {
            currentSolicitacaoId = id;
            try {
                const response = await fetch(`/api/solicitacoes/${id}`);
                const data = await response.json();
                const item = data.solicitacao;
                activeSolicitacao = item;

                document.getElementById('modalId').textContent = `#${item.id}`;
                document.getElementById('modalTitle').textContent = item.titulo;
                document.getElementById('modalSolicitante').textContent = item.solicitante_nome;
                document.getElementById('modalData').textContent = new Date(item.data_criacao).toLocaleString('pt-BR');
                document.getElementById('modalDescricao').textContent = item.descricao;
                document.getElementById('modalCategoria').textContent = item.categoria;
                document.getElementById('modalPrioridade').textContent = item.prioridade;

                const statusContainer = document.getElementById('statusControlContainer');
                const isRejected = item.status === 'Rejeitado';
                const isDev = user.tipo === 'dev';

                // Only Devs can change status
                if (!isDev) {
                    const displayStatus = item.status === 'Em análise' ? 'Análise' : item.status;
                    statusContainer.innerHTML = `<div class="inline-block px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider ${getStatusStyles(item.status)}">${displayStatus}</div>`;
                } else {
                    const displayStatus = item.status === 'Em análise' ? 'Análise' : item.status;
                    statusContainer.innerHTML = `
                        <select id="modalStatusSelect" onchange="handleStatusChange()" class="w-full bg-white border border-slate-200 rounded-xl p-3 text-sm font-bold outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all cursor-pointer">
                            <option value="Análise" ${displayStatus === 'Análise' ? 'selected' : ''}>Análise</option>
                            <option value="Em desenvolvimento" ${displayStatus === 'Em desenvolvimento' ? 'selected' : ''}>Em desenvolvimento</option>
                            <option value="Em teste" ${displayStatus === 'Em teste' ? 'selected' : ''}>Em teste</option>
                            <option value="Concluído" ${displayStatus === 'Concluído' ? 'selected' : ''} ${isAtendente ? 'disabled' : ''}>Concluído</option>
                            <option value="Rejeitado" ${displayStatus === 'Rejeitado' ? 'selected' : ''}>Rejeitado</option>
                        </select>
                    `;
                }

                const rejSection = document.getElementById('rejectionSection');
                if (isRejected && item.motivo_rejeicao) {
                    rejSection.classList.remove('hidden');
                    document.getElementById('modalMotivoRejeicao').textContent = item.motivo_rejeicao;
                } else {
                    rejSection.classList.add('hidden');
                }

                const isOwner = String(item.solicitante_id) === String(user.id);
                const isChatBlockedForThisAdm = isAdmin && !isOwner;
                const finalCanChat = (isDev || isOwner) && !isChatBlockedForThisAdm;

                document.getElementById('chatInputArea').classList.toggle('hidden', !finalCanChat);
                document.getElementById('chatReadOnlyForAdmin').classList.toggle('hidden', !isChatBlockedForThisAdm);

                renderChat(data.comentarios);

                document.getElementById('detailModal').classList.remove('hidden');
                lucide.createIcons();
                document.getElementById('chatMessageInput').focus();
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao carregar detalhes.');
            }
        };

        const renderChat = (comentarios) => {
            const container = document.getElementById('chatMessages');
            container.innerHTML = '';

            if (comentarios.length === 0) {
                container.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full opacity-20 py-20">
                        <i data-lucide="message-square-dashed" class="w-16 h-16 mb-4"></i>
                        <p class="font-bold uppercase tracking-widest text-sm text-slate-400">Sem conversas iniciadas</p>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            comentarios.forEach(msg => {
                const isMe = String(msg.usuario_id) === String(user.id);
                const roleColor = msg.usuario_tipo === 'dev' ? 'bg-red-600' : (msg.usuario_tipo === 'adm' ? 'bg-blue-600' : 'bg-slate-500');

                const div = document.createElement('div');
                div.className = `flex flex-col ${isMe ? 'items-end' : 'items-start'} max-w-[90%] ${isMe ? 'ml-auto' : ''} animate-fade-in`;
                div.innerHTML = `
                    <div class="flex items-center gap-2 mb-1.5 px-2">
                        <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${msg.usuario_nome}</span>
                        ${!isMe ? `<span class="${roleColor} text-white text-[7px] px-1.5 py-0.5 rounded-full font-bold uppercase">${msg.usuario_tipo}</span>` : ''}
                    </div>
                    <div class="${isMe ? 'bg-blue-600 text-white rounded-2xl rounded-tr-none' : 'bg-white text-slate-700 rounded-2xl rounded-tl-none border border-slate-200 shadow-sm'} px-5 py-3 text-sm break-words leading-relaxed shadow-lg">
                        ${msg.mensagem}
                    </div>
                `;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        };

        window.closeDetailModal = () => {
            document.getElementById('detailModal').classList.add('hidden');
            hideRejectionUI();
            currentSolicitacaoId = null;
        };

        window.handleStatusChange = async () => {
            const select = document.getElementById('modalStatusSelect');
            if (select.value === 'Rejeitado') { showRejectionUI(); return; }
            await updateStatus(select.value);
        };

        window.updateStatus = async (status, reason = null) => {
            const backendStatus = status === 'Análise' ? 'Em análise' : status;
            try {
                const res = await fetch(`/api/solicitacoes/${currentSolicitacaoId}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: backendStatus, user_tipo: user.tipo, usuario_id: user.id, motivo_rejeicao: reason })
                });
                const data = await res.json();
                if (data.error) throw new Error(data.error);

                if (status === 'Rejeitado') {
                    window.SAS.utils.notify('error', 'Solicitação rejeitada.', ' ');
                    closeDetailModal(); // Close modal on rejection as requested
                } else {
                    window.SAS.utils.notify('success', `Status atualizado para ${status}`);
                    openDetailModal(currentSolicitacaoId);
                }
                loadSolicitacoes();
            } catch (e) {
                if (document.getElementById('modalStatusSelect')) {
                    document.getElementById('modalStatusSelect').value = activeSolicitacao.status === 'Em análise' ? 'Análise' : activeSolicitacao.status;
                }
                window.SAS.utils.notify('error', e.message);
            }
        };

        window.showRejectionUI = () => document.getElementById('rejectionInputUI').classList.remove('hidden');
        window.hideRejectionUI = () => {
            document.getElementById('rejectionInputUI').classList.add('hidden');
            document.getElementById('rejectionReason').value = '';
            if (activeSolicitacao && document.getElementById('modalStatusSelect')) {
                document.getElementById('modalStatusSelect').value = activeSolicitacao.status === 'Em análise' ? 'Análise' : activeSolicitacao.status;
            }
        };
        window.confirmRejection = async () => {
            const reason = document.getElementById('rejectionReason').value.trim();
            if (!reason) { window.SAS.utils.notify('warning', 'Explique o motivo da rejeição.'); return; }
            await updateStatus('Rejeitado', reason);
            hideRejectionUI();
        };

        window.sendChatMessage = async () => {
            const input = document.getElementById('chatMessageInput');
            const msg = input.value.trim();
            if (!msg) return;

            // Instant UI feedback (optimistic update)
            const container = document.getElementById('chatMessages');
            const tempDiv = document.createElement('div');
            tempDiv.className = `flex flex-col items-end max-w-[90%] ml-auto opacity-50`;
            tempDiv.innerHTML = `
                <div class="flex items-center gap-2 mb-1.5 px-2">
                    <span class="text-[9px] font-bold text-slate-400 uppercase tracking-tighter">${user.nome_completo}</span>
                </div>
                <div class="bg-blue-600 text-white rounded-2xl rounded-tr-none px-5 py-3 text-sm break-words leading-relaxed shadow-lg">
                    ${msg}
                </div>
            `;
            container.appendChild(tempDiv);
            container.scrollTop = container.scrollHeight;
            input.value = '';

            try {
                const res = await fetch(`/api/solicitacoes/${currentSolicitacaoId}/comentarios`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario_id: user.id, mensagem: msg })
                });
                if (!res.ok) throw new Error();

                // Pull real data to sync
                const detailRes = await fetch(`/api/solicitacoes/${currentSolicitacaoId}`);
                const detailData = await detailRes.json();
                renderChat(detailData.comentarios);
            } catch (e) {
                tempDiv.remove();
                input.value = msg;
                window.SAS.utils.notify('error', 'Falha ao enviar mensagem.');
            }
        };

        const form = document.getElementById('solicitacaoForm');
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                const formData = {
                    titulo: document.getElementById('titulo').value,
                    categoria: document.getElementById('categoria').value,
                    prioridade: document.getElementById('prioridade').value,
                    descricao: document.getElementById('descricao').value,
                    solicitante_id: user.id
                };
                try {
                    const res = await fetch('/api/solicitacoes/', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(formData) });
                    if (res.ok) {
                        window.SAS.utils.notify('success', 'Solicitação enviada com sucesso!');
                        document.getElementById('solicitacaoForm').reset();
                        loadSolicitacoes();
                    }
                } catch (e) { window.SAS.utils.notify('error', 'Erro ao enviar.'); }
            });
        }

        loadSolicitacoes();
        setInterval(async () => {
            if (!currentSolicitacaoId) loadSolicitacoes();
            else {
                // Background chat update if modal is open
                const res = await fetch(`/api/solicitacoes/${currentSolicitacaoId}`);
                const data = await res.json();
                const currentCount = document.getElementById('chatMessages').children.length;
                if (data.comentarios.length > currentCount) {
                    renderChat(data.comentarios);
                }
            }
        }, 5000); // Poll every 5s for chat updates
    </script>
    <style>
        @keyframes scaleUp {
            from {
                transform: scale(0.98);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .animate-scale-up {
            animation: scaleUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        *::-webkit-scrollbar {
            width: 5px;
        }

        *::-webkit-scrollbar-track {
            background: #f8fafc;
        }

        *::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }

        *::-webkit-scrollbar-thumb:hover {
            background: #cbd5e1;
        }
    </style>
</body>

</html>
