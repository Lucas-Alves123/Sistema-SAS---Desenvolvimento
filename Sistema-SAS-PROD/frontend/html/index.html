<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        /* Custom Scrollbar for aesthetic */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Hide native password reveal button in Edge/IE */
        ::-ms-reveal,
        ::-ms-clear {
            display: none;
        }
    </style>
</head>

<body
    class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-500 via-blue-600 to-blue-900 p-4 font-sans">

    <!-- Main Card Container -->
    <div
        class="w-full max-w-5xl bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[600px]">

        <!-- LEFT SIDE: Login Form -->
        <div class="w-full md:w-1/2 p-8 md:p-12 flex flex-col justify-between relative z-20 shadow-xl">

            <!-- Spacer to push content to center/bottom -->
            <div></div>

            <div class="max-w-sm mx-auto w-full">
                <h1 class="text-3xl font-bold text-blue-900 mb-8 text-center">Seja bem-vindo</h1>

                <form id="loginForm" class="space-y-5">
                    <div class="space-y-2">
                        <label for="usuario" class="text-gray-600 font-medium text-sm ml-1">Login</label>
                        <input type="text" id="usuario" placeholder="Digite seu login"
                            class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all" />
                    </div>

                    <div class="space-y-2">
                        <label for="senha" class="text-gray-600 font-medium text-sm ml-1">Senha</label>
                        <div class="relative">
                            <input type="password" id="senha" placeholder="Digite sua senha"
                                class="w-full px-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent pr-10 transition-all" />
                            <button type="button" id="togglePassword"
                                class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 transition-colors">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>

                    <div class="flex items-center pt-1">
                        <input type="checkbox" id="remember"
                            class="w-4 h-4 rounded border-gray-300 text-blue-600 focus:ring-blue-500 cursor-pointer" />
                        <label for="remember"
                            class="text-sm text-gray-500 ml-2 cursor-pointer select-none">Lembrar-me</label>
                    </div>

                    <div id="errorMsg"
                        class="hidden text-red-600 text-sm bg-red-50 p-3 rounded-lg border border-red-100 flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-4 h-4"></i>
                        <span id="errorText">Erro ao entrar</span>
                    </div>

                    <button type="submit" id="submitBtn"
                        class="w-full bg-blue-900 hover:bg-blue-800 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg hover:shadow-blue-200 transform hover:-translate-y-0.5 mt-4">
                        Efetuar Login
                    </button>
                </form>

                <div class="mt-6 text-center">
                    <button type="button" onclick="openRecoveryModal()"
                        class="text-blue-600 hover:text-blue-800 text-sm font-medium hover:underline transition-colors">
                        Esqueci a senha
                    </button>
                </div>
            </div>

            <div class="mt-12 pt-6 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">
                    © 2025 SAS — Sistema de Atendimento ao Servidor<br>Governo de Pernambuco
                </p>
            </div>
        </div>

        <!-- RIGHT SIDE: Branding (Light Background for Contrast) -->
        <div class="hidden md:flex w-1/2 bg-slate-100 relative items-center justify-center overflow-hidden">
            <!-- Background Effects (Subtle) -->
            <div
                class="absolute -top-24 -right-24 w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob">
            </div>
            <div
                class="absolute -bottom-24 -left-24 w-96 h-96 bg-blue-200 rounded-full mix-blend-multiply filter blur-3xl opacity-50 animate-blob animation-delay-2000">
            </div>

            <!-- Content -->
            <div class="relative z-10 flex flex-col items-center text-center p-12 pt-24"> <!-- Reverted to pt-24 -->

                <!-- Main Logo Construction -->
                <div class="flex items-center gap-4 mb-6 transform scale-125">
                    <div class="relative">
                        <!-- Monitor Icon Base -->
                        <div
                            class="w-24 h-20 border-4 border-blue-900 rounded-xl bg-white flex items-center justify-center shadow-lg relative z-10">
                            <!-- Screen Content -->
                            <div class="flex gap-1">
                                <i data-lucide="users" class="w-10 h-10 text-blue-900"></i>
                            </div>
                        </div>
                        <!-- Stand -->
                        <div class="w-8 h-4 bg-blue-900 mx-auto mt-[-2px]"></div>
                        <div class="w-16 h-1.5 bg-blue-900 mx-auto rounded-full"></div>

                        <!-- Chat Bubbles Decoration -->
                        <div
                            class="absolute -top-4 -right-4 bg-yellow-400 p-2 rounded-lg shadow-lg transform rotate-12 z-20 border-2 border-white">
                            <i data-lucide="message-square" class="w-5 h-5 text-blue-900"></i>
                        </div>
                    </div>

                    <div class="text-left">
                        <h1 class="text-6xl font-black text-blue-900 tracking-tighter leading-none drop-shadow-sm"
                            style="font-family: 'Arial Black', sans-serif;">SAS</h1>
                    </div>
                </div>

                <div class="text-center mb-16">
                    <h2 class="text-2xl font-bold text-red-500 tracking-widest uppercase mb-1 drop-shadow-sm">Sistema de
                    </h2>
                    <h2 class="text-2xl font-bold text-red-500 tracking-widest uppercase drop-shadow-sm">Atendimento
                    </h2>
                    <h2 class="text-2xl font-bold text-red-500 tracking-widest uppercase drop-shadow-sm">Ao Servidor
                    </h2>
                </div>

                <!-- Government Footer Image -->
                <div class="mt-auto flex flex-col items-center gap-2 opacity-90 pt-12">
                    <img src="images/govpe.png" alt="Governo de Pernambuco" class="h-64 object-contain">
                </div>

            </div>
        </div>
    </div>

    <!-- Modal Recuperação de Senha -->
    <div id="modalRecuperacao" class="fixed inset-0 bg-black/50 z-[100] hidden flex items-center justify-center p-4">
        <div
            class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden animate-fade-in border-4 border-blue-600/20">
            <div class="p-8">
                <div class="flex flex-col items-center text-center mb-6">
                    <div class="bg-blue-100 p-3 rounded-full mb-3">
                        <i data-lucide="key-round" class="w-6 h-6 text-blue-600"></i>
                    </div>
                    <h3 class="text-2xl font-bold text-slate-800">Recuperar Senha</h3>
                    <p class="text-slate-500 text-sm mt-1" id="recoveryStepText">Passo 1: Verifique sua identidade</p>
                </div>

                <!-- Step 1: Verification -->
                <form id="step1Form" class="space-y-4">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Login (Usuário)</label>
                        <div class="relative">
                            <i data-lucide="user"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" id="recUsuario" placeholder="Seu login no sistema" required
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">E-mail Cadastrado</label>
                        <div class="relative">
                            <i data-lucide="mail"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="email" id="recEmail" placeholder="exemplo@email.com" required
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                    <div id="recError1"
                        class="hidden text-red-600 text-xs bg-red-50 p-2 rounded border border-red-100 italic flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-3 h-3"></i>
                        <span></span>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeRecoveryModal()"
                            class="flex-1 px-4 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition-all">Cancelar</button>
                        <button type="submit"
                            class="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-blue-200">Verificar</button>
                    </div>
                </form>

                <!-- Step 2: Reset -->
                <form id="step2Form" class="space-y-4 hidden">
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Nova Senha</label>
                        <div class="relative">
                            <i data-lucide="lock"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="recNovaSenha" placeholder="Min. 4 caracteres" required
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-medium text-gray-700">Confirmar Nova Senha</label>
                        <div class="relative">
                            <i data-lucide="shield-check"
                                class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="password" id="recConfirmarSenha" placeholder="Repita a nova senha" required
                                class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>
                    <div id="recError2"
                        class="hidden text-red-600 text-xs bg-red-50 p-2 rounded border border-red-100 italic flex items-center gap-2">
                        <i data-lucide="alert-circle" class="w-3 h-3"></i>
                        <span></span>
                    </div>
                    <div class="flex gap-3 pt-2">
                        <button type="button" onclick="closeRecoveryModal()"
                            class="flex-1 px-4 py-3 border border-gray-300 text-gray-700 font-bold rounded-xl hover:bg-gray-50 transition-all">Cancelar</button>
                        <button type="submit"
                            class="flex-1 bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg hover:shadow-green-200">Redefinir</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>

    <script>
        lucide.createIcons();

        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');
        const errorText = document.getElementById('errorText');
        const submitBtn = document.getElementById('submitBtn');
        const togglePassword = document.getElementById('togglePassword');
        const senhaInput = document.getElementById('senha');

        // Check if already logged in - DISABLED
        // if (localStorage.getItem('sas_user')) {
        //     window.location.href = window.SAS.utils.createPageUrl('Home');
        // }

        togglePassword.addEventListener('click', () => {
            const type = senhaInput.getAttribute('type') === 'password' ? 'text' : 'password';
            senhaInput.setAttribute('type', type);
            // Update icon
            const iconName = type === 'password' ? 'eye' : 'eye-off';
            togglePassword.innerHTML = `<i data-lucide="${iconName}" class="w-5 h-5"></i>`;
            lucide.createIcons();
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorMsg.classList.add('hidden');

            const usuario = document.getElementById('usuario').value.trim();
            const senha = document.getElementById('senha').value.trim();

            if (!usuario || !senha) {
                errorText.textContent = 'Preencha todos os campos para continuar.';
                errorMsg.classList.remove('hidden');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i data-lucide="loader-2" class="w-5 h-5 animate-spin"></i> Entrando...';
            lucide.createIcons();

            try {
                // Simulate network delay for better UX feel
                await new Promise(resolve => setTimeout(resolve, 800));

                const users = await window.SAS.base44.entities.SystemUser.filter({ usuario });

                if (users.length === 0 || users[0].senha !== senha) {
                    throw new Error('Usuário ou senha incorretos.');
                }

                if (users[0].situacao === 'inativo') {
                    throw new Error('Usuário inativo. Contate o administrador.');
                }

                localStorage.setItem('sas_user', JSON.stringify(users[0]));
                window.location.href = window.SAS.utils.createPageUrl('Home');

            } catch (err) {
                errorText.textContent = err.message || 'Erro ao fazer login.';
                errorMsg.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Efetuar Login';
            }
        });
        // Recovery Modal Logic
        const modalRecuperacao = document.getElementById('modalRecuperacao');
        const step1Form = document.getElementById('step1Form');
        const step2Form = document.getElementById('step2Form');
        const recoveryStepText = document.getElementById('recoveryStepText');
        const recError1 = document.getElementById('recError1');
        const recError2 = document.getElementById('recError2');
        let currentRecoveryId = null;

        window.openRecoveryModal = () => {
            step1Form.reset();
            step2Form.reset();
            step1Form.classList.remove('hidden');
            step2Form.classList.add('hidden');
            recError1.classList.add('hidden');
            recError2.classList.add('hidden');
            recoveryStepText.textContent = 'Passo 1: Verifique sua identidade';
            modalRecuperacao.classList.remove('hidden');
            lucide.createIcons();
        };

        window.closeRecoveryModal = () => {
            modalRecuperacao.classList.add('hidden');
        };

        // Step 1: Verification Logic
        step1Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            recError1.classList.add('hidden');
            const usuario = document.getElementById('recUsuario').value.trim();
            const email = document.getElementById('recEmail').value.trim();

            const btn = step1Form.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Verificando...';

            try {
                const response = await fetch('/api/usuarios/recovery/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ usuario, email })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Dados não encontrados.');
                }

                const data = await response.json();
                currentRecoveryId = data.id;

                // Move to Step 2
                step1Form.classList.add('hidden');
                step2Form.classList.remove('hidden');
                recoveryStepText.textContent = 'Passo 2: Defina sua nova senha';
                lucide.createIcons();
            } catch (err) {
                recError1.querySelector('span').textContent = err.message;
                recError1.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

        // Step 2: Reset Logic
        step2Form.addEventListener('submit', async (e) => {
            e.preventDefault();
            recError2.classList.add('hidden');
            const novaSenha = document.getElementById('recNovaSenha').value;
            const confirmarSenha = document.getElementById('recConfirmarSenha').value;

            if (novaSenha.length < 4) {
                recError2.querySelector('span').textContent = 'A senha deve ter pelo menos 4 caracteres.';
                recError2.classList.remove('hidden');
                return;
            }

            if (novaSenha !== confirmarSenha) {
                recError2.querySelector('span').textContent = 'As senhas não coincidem.';
                recError2.classList.remove('hidden');
                return;
            }

            const btn = step2Form.querySelector('button[type="submit"]');
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = 'Redefinindo...';

            try {
                const response = await fetch('/api/usuarios/recovery/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentRecoveryId, password: novaSenha })
                });

                if (!response.ok) throw new Error('Erro ao redefinir senha.');

                alert('Senha redefinida com sucesso! Você já pode entrar com sua nova senha.');
                closeRecoveryModal();
            } catch (err) {
                recError2.querySelector('span').textContent = err.message;
                recError2.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.textContent = originalText;
            }
        });

    </script>
</body>

</html>
