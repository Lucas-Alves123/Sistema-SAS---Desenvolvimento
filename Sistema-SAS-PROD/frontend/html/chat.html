<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat SAS — Protótipo Interno</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <style>
        .chat-container { height: calc(100vh - 180px); }
        .message-bubble { max-width: 75%; white-space: pre-wrap; padding: 6px 12px !important; border-radius: 16px !important; box-shadow: 0 2px 5px rgba(0,0,0,0.05) !important; min-height: unset !important; display: inline-block; }
        .message-bubble img { max-width: 100%; width: 280px; height: auto; border-radius: 12px; margin: 4px 0; display: block; }
        .message-bubble p { margin: 0 !important; padding: 0 !important; line-height: 1.3 !important; font-size: 13px !important; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        .chat-bg { background: #f8fafc url("https://www.transparenttextures.com/patterns/cubes.png"); }
        
        #previewView {
            display: none; position: absolute; inset: 0; background: #ffffff; z-index: 50; flex-direction: column;
        }
        .drawing-canvas { position: absolute; top: 0; left: 0; cursor: crosshair; z-index: 10; }
        .tool-btn.active { background-color: #3b82f6; color: white; }
        .color-dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid white; box-shadow: 0 0 0 1px #cbd5e1; cursor: pointer; transition: transform 0.2s; }
        .color-dot:hover { transform: scale(1.2); }
        .color-dot.selected { box-shadow: 0 0 0 2px #3b82f6; }
    </style>
</head>
<body class="bg-slate-50 font-sans overflow-hidden">
    <div id="app"></div>

    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>

    <script>
        const auth = window.SAS.utils.checkAuth();
        if (!auth || auth.tipo !== 'dev') { window.location.href = 'home'; throw new Error('Acesso restrito'); }
        window.SAS.layout.renderLayout('Chat');

        function getNowTime() {
            const now = new Date();
            return now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        const content = document.getElementById('page-content');
        content.innerHTML = `
            <div class="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl border border-slate-200 overflow-hidden flex chat-container animate-fade-in relative">
                
                <!-- Sidebar -->
                <div class="w-80 border-r border-slate-100 flex flex-col bg-slate-50/30 shrink-0">
                    <div class="p-5 border-b border-slate-100 bg-white">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-xl font-black text-slate-800 tracking-tight">Conversas</h2>
                        </div>
                        
                        <!-- Tabs -->
                        <div class="flex bg-slate-100 p-1 rounded-xl mb-4">
                            <button id="tabActive" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all bg-white text-blue-600 shadow-sm">Ativos</button>
                            <button id="tabHistory" class="flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-slate-400 hover:text-slate-600">Histórico</button>
                        </div>

                        <div class="relative">
                            <i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                            <input type="text" id="sidebarSearch" placeholder="Buscar servidor..." class="w-full pl-10 pr-4 py-2.5 bg-slate-100 border-none rounded-2xl text-sm outline-none">
                        </div>
                    </div>
                    <div id="sessionList" class="flex-1 overflow-y-auto custom-scrollbar p-3 space-y-1">
                        <!-- Dynamic Sessions Load Here -->
                        <div class="flex items-center justify-center p-8 opacity-50"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>
                    </div>
                </div>

                <!-- Chat Pane -->
                <div class="flex-1 flex flex-col bg-white relative min-w-0">
                    
                    <!-- ADVANCED PREVIEW EDITOR -->
                    <div id="previewView" class="flex flex-col">
                        <div class="px-6 py-4 flex items-center justify-between border-b border-slate-100">
                            <div class="flex items-center gap-6">
                                <button id="closePreview" class="p-2 text-slate-500 hover:bg-slate-100 rounded-full transition-all"><i data-lucide="x" class="w-6 h-6"></i></button>
                                <!-- Tool Group -->
                                <div id="mainTools" class="flex items-center gap-3 text-slate-400">
                                    <button id="btnCrop" class="p-2 hover:bg-slate-50 rounded-lg status-tool" title="Recortar"><i data-lucide="crop" class="w-5 h-5"></i></button>
                                    <button id="btnPencil" class="p-2 hover:bg-slate-50 rounded-lg status-tool" title="Lápis"><i data-lucide="pencil" class="w-5 h-5"></i></button>
                                    <button id="btnEraser" class="p-2 hover:bg-slate-50 rounded-lg status-tool" title="Borracha"><i data-lucide="eraser" class="w-5 h-5"></i></button>
                                </div>

                                <!-- Crop Specific Toolbar -->
                                <div id="cropTools" class="hidden flex items-center gap-2 border-l border-slate-100 pl-4">
                                    <button id="btnResetCrop" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500" title="Resetar Tamanho"><i data-lucide="refresh-cw" class="w-4 h-4"></i></button>
                                    <button id="btnRotateLeft" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500" title="Girar para Esquerda"><i data-lucide="rotate-ccw" class="w-5 h-5"></i></button>
                                    <button id="btnRotateRight" class="p-2 hover:bg-slate-100 rounded-lg text-slate-500" title="Girar para Direita"><i data-lucide="rotate-cw" class="w-5 h-5"></i></button>
                                    <button id="btnConfirmCrop" class="ml-2 flex items-center gap-2 bg-green-600 hover:bg-green-700 text-white px-4 py-1.5 rounded-full font-bold text-xs shadow-lg shadow-green-100">
                                        <i data-lucide="check" class="w-4 h-4"></i> OK
                                    </button>
                                </div>

                                <!-- Color Picker (Visible when Pencil active) -->
                                <div id="colorPicker" class="hidden flex items-center gap-2 pl-4 border-l border-slate-100">
                                    <div class="color-dot bg-red-500 selected" data-color="#ef4444"></div>
                                    <div class="color-dot bg-green-500" data-color="#22c55e"></div>
                                    <div class="color-dot bg-blue-500" data-color="#3b82f6"></div>
                                    <div class="color-dot bg-yellow-500" data-color="#eab308"></div>
                                    <div class="color-dot bg-black" data-color="#000000"></div>
                                </div>
                            </div>

                        <div class="flex-1 flex flex-col items-center justify-center bg-slate-50/70 p-12 overflow-hidden relative">
                            <div id="editorWorkspace" class="relative max-w-full max-h-full flex items-center justify-center">
                                <img id="editorImg" src="" class="max-w-full max-h-[45vh] object-contain shadow-2xl rounded-lg border-2 border-white">
                                <canvas id="editorCanvas" class="drawing-canvas hidden"></canvas>
                                
                                <div id="docPlaceholder" class="hidden flex flex-col items-center gap-6">
                                    <div class="bg-blue-600 p-12 rounded-[2.5rem] shadow-2xl shadow-blue-100"><i data-lucide="file-text" class="w-20 h-20 text-white"></i></div>
                                    <div class="text-center px-4">
                                        <h2 id="docTitle" class="text-lg font-black text-slate-800">filename.pdf</h2>
                                        <p id="docInfo" class="text-xs font-bold text-slate-400 mt-1 uppercase tracking-widest">0.0 MB</p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div class="p-6 bg-white border-t border-slate-100">
                            <div class="max-w-3xl mx-auto flex flex-col gap-6">
                                <div class="flex items-center gap-4">
                                    <div class="flex-1">
                                        <input type="text" id="editorCaption" placeholder="Adicione uma legenda..." 
                                            class="w-full bg-slate-100 border-none rounded-2xl py-4 px-6 text-sm font-medium outline-none focus:ring-2 focus:ring-blue-400 transition-all">
                                    </div>

                                </div>
                                <div class="flex items-center justify-center sm:justify-start gap-4">

                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Chat Header -->
                    <div id="chatHeader" class="px-6 py-4 border-b border-slate-100 flex items-center justify-between bg-white z-10">

                                <div id="hdrStatus" class="absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 bg-slate-400 border-2 border-white rounded-full"></div>
                            </div>
                            <div>

                        <div class="flex items-center gap-2">

                    <!-- History -->

                        <div class="flex justify-center mb-8"><span class="bg-blue-100 text-blue-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Hoje</span></div>
                    </div>

                    <!-- Bottom Input -->
                    <div class="p-6 bg-white border-t border-slate-100">
                        <input type="file" id="mainFileInput" class="hidden" multiple>
                        <input type="file" id="mainImgInput" class="hidden" accept="image/*" multiple>
                        <div class="flex items-center gap-4 bg-slate-100/60 p-2 rounded-[2.5rem] border border-slate-200 focus-within:bg-white focus-within:border-blue-300 transition-all shadow-inner">
                            <div class="flex items-center gap-1 pl-2 border-r border-slate-200 pr-2">
                                <button id="atClip" class="p-3 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all"><i data-lucide="paperclip" class="w-5 h-5"></i></button>
                                <button id="atCam" class="p-3 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-all"><i data-lucide="camera" class="w-5 h-5"></i></button>
                            </div>
                            <input type="text" id="mainInput" placeholder="Escreva uma mensagem..." class="flex-1 bg-transparent border-none focus:ring-0 text-sm py-3 px-2 text-slate-700">
                            <button id="mainSend" class="bg-blue-600 hover:bg-blue-700 text-white p-4 rounded-2xl transition-all active:scale-95"><i data-lucide="send" class="w-5 h-5"></i></button>
                        </div>
                    </div>
                </div>

                <div id="actionPanel" class="w-80 border-l border-slate-100 flex flex-col bg-slate-50/50 hidden animate-fade-in-right">
                    <div class="p-6 border-b border-slate-100 bg-white">
                        <div class="flex items-center gap-3">
                            <div class="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-white shadow-lg shadow-blue-100">
                                <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                            </div>
                            <h2 class="text-xs font-black text-slate-800 uppercase tracking-widest">Painel de Ação</h2>
                        </div>
                    </div>

                    <div class="flex-1 overflow-y-auto custom-scrollbar">
                        <div id="panelUserInfo" class="p-4 space-y-3">
                            
                            <!-- Grupo 1: Identificação -->
                            <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                                <button class="w-full flex items-center justify-between p-4 bg-slate-50/50 hover:bg-slate-50 transition-all group" onclick="this.nextElementSibling.classList.toggle('hidden')">
                                    <div class="flex items-center gap-3">
                                        <i data-lucide="user" class="w-4 h-4 text-blue-600"></i>
                                        <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">Identificação</span>
                                    </div>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300 group-hover:text-blue-400 transition-colors"></i>
                                </button>
                                <div class="p-4 space-y-4 border-t border-slate-50">
                                    <input type="text" id="panelName" placeholder="Nome Completo" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                    <div class="grid grid-cols-2 gap-2">
                                        <input type="text" id="panelCPF" placeholder="CPF" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                        <input type="text" id="panelMatricula" placeholder="Matrícula" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                    </div>
                                    <input type="email" id="panelEmail" placeholder="E-mail" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                </div>
                            </div>

                            <!-- Grupo 2: Vínculo e Trabalho -->
                            <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                                <button class="w-full flex items-center justify-between p-4 bg-slate-50/50 hover:bg-slate-50 transition-all group" onclick="this.nextElementSibling.classList.toggle('hidden')">
                                    <div class="flex items-center gap-3">
                                        <i data-lucide="briefcase" class="w-4 h-4 text-blue-600"></i>
                                        <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">Vínculo Profissional</span>
                                    </div>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300 group-hover:text-blue-400 transition-colors"></i>
                                </button>
                                <div class="p-4 space-y-4 border-t border-slate-50 hidden">
                                    <input type="text" id="panelCargo" placeholder="Cargo / Função" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                    <select id="panelVinculo" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                        <option value="">Selecione...</option>
                                        <option value="Comissionado">Comissionado</option>
                                        <option value="Concurso (Nomeado)">Concurso (Nomeado)</option>
                                        <option value="CTD (Contrato)">CTD (Contrato)</option>
                                        <option value="Estatutário">Estatutário</option>
                                        <option value="Extraquadro">Extraquadro</option>
                                        <option value="Ex-servidor">Ex-servidor</option>
                                        <option value="Extra – Sem vínculo">Extra – Sem vínculo</option>
                                        <option value="Seleção (Convocado)">Seleção (Convocado)</option>
                                        <option value="Outros">Outros</option>
                                    </select>
                                    <input type="text" id="panelLocal" placeholder="Local de Trabalho" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                </div>
                            </div>

                            <!-- Grupo 3: Detalhes do Serviço -->
                            <div class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white">
                                <button class="w-full flex items-center justify-between p-4 bg-slate-50/50 hover:bg-slate-50 transition-all group" onclick="this.nextElementSibling.classList.toggle('hidden')">
                                    <div class="flex items-center gap-3">
                                        <i data-lucide="calendar" class="w-4 h-4 text-blue-600"></i>
                                        <span class="text-[10px] font-black text-slate-700 uppercase tracking-widest">Agendamento</span>
                                    </div>
                                    <i data-lucide="chevron-down" class="w-4 h-4 text-slate-300 group-hover:text-blue-400 transition-colors"></i>
                                </button>
                                <div class="p-4 space-y-4 border-t border-slate-50">
                                    <select id="panelService" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">

                                            <option value="WhatsApp/Sistema">WhatsApp/Sistema</option>
                                            <option value="Online">Online</option>
                                        </select>
                                        <select id="panelPriority" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                            <option value="Normal">Normal</option>
                                            <option value="Preferencial">Preferencial</option>
                                        </select>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <input type="date" id="panelDate" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                        <input type="time" id="panelTime" class="w-full px-4 py-2.5 bg-slate-50 border-none rounded-xl text-xs font-bold text-slate-700 outline-none focus:ring-2 focus:ring-blue-100 transition-all">
                                    </div>
                                </div>
                            </div>

                            <!-- Grupo 4: Observações -->
                            <div id="groupObservations" class="border border-slate-100 rounded-2xl overflow-hidden shadow-sm bg-white hidden">
                                <button class="w-full flex items-center justify-between p-4 bg-slate-50/50 hover:bg-slate-50 transition-all group" onclick="this.nextElementSibling.classList.toggle('hidden')">
                                    <div class="flex items-center gap-3">
                                        <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>

                                    <div>
                                        <label class="text-[9px] font-black text-slate-400 uppercase mb-1 block">Obs 2 - Solução</label>

        lucide.createIcons();

        // System Core
        const chatHistory = document.getElementById('chatHistory');
        const mainInput = document.getElementById('mainInput');
        const mainSend = document.getElementById('mainSend');
        const atClip = document.getElementById('atClip');
        const atCam = document.getElementById('atCam');
        const mainFileInput = document.getElementById('mainFileInput');
        const mainImgInput = document.getElementById('mainImgInput');

        // Holidays 2026
        const holidays = [
            "2026-01-01", "2026-03-06", "2026-04-03", "2026-04-21",
            "2026-05-01", "2026-06-04", "2026-06-24", "2026-09-07",
            "2026-10-12", "2026-11-02", "2026-11-15", "2026-12-25"
        ];

        const panelDate = document.getElementById('panelDate');
        panelDate.min = new Date().toISOString().split('T')[0];

        panelDate.onchange = (e) => {
            const val = e.target.value;
            if (!val) return;
            const date = new Date(val + 'T12:00:00'); 
            const dayOfWeek = date.getDay();
            
            // Validate Weekends
            if (dayOfWeek === 0 || dayOfWeek === 6) {
                alert('Agendamentos não são permitidos aos finais de semana.');
                e.target.value = '';
                return;
            }

            // Validate Holidays
            if (holidays.includes(val)) {
                alert('Esta data é um feriado. Por favor, escolha outro dia útil.');
                e.target.value = '';
                return;
            }
        };

        const previewView = document.getElementById('previewView');

        // Right Panel Handlers
        document.getElementById('btnOpenAction').onclick = () => {
            const panel = document.getElementById('actionPanel');
            panel.classList.toggle('hidden');
        };

        const closePreview = document.getElementById('closePreview');
        const finalSend = document.getElementById('finalSend');
        const editorImg = document.getElementById('editorImg');
        const canvas = document.getElementById('editorCanvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('colorPicker');
        const thumbStrip = document.getElementById('thumbStrip');
        const btnAddFiles = document.getElementById('btnAddFiles');
        const editorCaption = document.getElementById('editorCaption');

        const btnPencil = document.getElementById('btnPencil');
        const btnEraser = document.getElementById('btnEraser');
        const btnCrop = document.getElementById('btnCrop');

        const btnConfirmCrop = document.getElementById('btnConfirmCrop');
        const btnResetCrop = document.getElementById('btnResetCrop');
        const btnRotateLeft = document.getElementById('btnRotateLeft');
        const btnRotateRight = document.getElementById('btnRotateRight');
        const mainTools = document.getElementById('mainTools');
        const cropTools = document.getElementById('cropTools');

        let pendingFiles = [];
        let currIdx = 0;
        let drawing = false;
        let mode = 'none'; // 'pencil', 'eraser', 'crop'
        let strokeColor = '#ef4444';
        let cropper = null;
        let currentSessionId = null;
        let sessions = [];
        let sidebarMode = 'active'; // 'active' ou 'history'

        const scrollEnd = () => { chatHistory.scrollTop = chatHistory.scrollHeight; };
        window.SAS.chat = { scrollEnd, down: (u,n) => { let a=document.createElement('a'); a.href=u; a.download=n; a.click(); }};

        // Utility: Input Masking
        const maskCPF = (v) => {
            v = v.replace(/\D/g, "");
            if (v.length > 11) v = v.substring(0, 11);
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d)/, "$1.$2");
            v = v.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
            return v;
        };

        // UI Appenders
        const addMessage = (msg, align='right', meta={}) => {
            const isAttendant = align === 'right';
            const d = document.createElement('div'); 
            d.className = `flex flex-col ${isAttendant ? 'items-end' : 'items-start'} animate-fade-in-up`;
            
            const time = meta.time || getNowTime();
            const bubbleClass = isAttendant 
                ? 'bg-blue-600 text-white rounded-tr-none border-blue-500 shadow-blue-100' 
                : 'bg-white text-slate-700 rounded-tl-none border-slate-100 shadow-slate-100';
            const textClass = isAttendant ? 'text-blue-100' : 'text-slate-400';

            let content = '';
            let finalMsg = msg;
            const midiaUrl = meta.midia_url || (msg.startsWith('data:') ? msg : null);

            if (midiaUrl && midiaUrl.length > 50) {
                const isImg = midiaUrl.startsWith('data:image/');
                const isDoc = msg.startsWith('DOC:');

                if (isImg) {
                    content = `
                        <div class="mb-1 overflow-hidden rounded-xl cursor-pointer" onclick="window.SAS.chat.down('${midiaUrl}', 'imagem.png')">
                            <img src="${midiaUrl}" class="max-w-full rounded-xl" onload="window.SAS.chat.scrollEnd()">
                        </div>
                    `;
                } else {
                    // LÓGICA INTELIGENTE: Detecta documento mesmo sem DOC: se for Base64 não-imagem
                    let displayFileName = 'Documento Recebido';
                    if (msg.includes('|')) {
                        displayFileName = msg.split('|')[0].replace('DOC:', '');
                        finalMsg = msg.split('|')[1];
                    }
                    content = `
                        <div class="mb-2 p-3 ${isAttendant ? 'bg-white/10' : 'bg-slate-50'} rounded-xl flex items-center gap-3 cursor-pointer hover:opacity-80 transition-all border ${isAttendant ? 'border-white/10' : 'border-slate-100'}" onclick="const a = document.createElement('a'); a.href='${midiaUrl}'; a.download='${displayFileName}'; a.click();">
                            <div class="w-10 h-10 ${isAttendant ? 'bg-white text-blue-600' : 'bg-blue-600 text-white'} rounded-lg flex items-center justify-center shadow-sm shrink-0">
                                <i data-lucide="file-text" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1 overflow-hidden">
                                <p class="text-[11px] font-bold truncate ${isAttendant ? 'text-white' : 'text-slate-800'}">${displayFileName}</p>
                                <p class="text-[9px] font-black uppercase ${isAttendant ? 'text-blue-200' : 'text-slate-400'}">Clique para baixar</p>
                            </div>
                        </div>
                    `;
                }
            }

            d.innerHTML = `
                <div class="message-bubble ${bubbleClass} px-3 py-1.5 rounded-[1.1rem] shadow-lg border flex flex-col" style="width: fit-content; height: auto; min-width: 60px; max-width: 80%;">
                    ${content}
                    <p class="text-sm font-medium leading-tight m-0 p-0">${finalMsg}</p>
                    <div class="flex ${isAttendant ? 'justify-end' : 'justify-start'} gap-1 mt-1 opacity-70">
                        <span class="text-[9px] ${textClass} font-bold uppercase">${time}</span>
                        ${isAttendant ? '<i data-lucide="check" class="w-2.5 h-2.5"></i>' : ''}
                    </div>
                </div>`;

            chatHistory.appendChild(d); 
            if (window.lucide) lucide.createIcons(); 
            scrollEnd();
        };

        // API Integration
        const loadSessions = async () => {
            try {
                const res = await fetch(`/api/chat/sessoes${sidebarMode === 'history' ? '?history=true' : ''}`, { cache: "no-store" });
                sessions = await res.json();
                renderSessionList();
            } catch (err) { console.error('Erro ao carregar sessões:', err); }
        };

        const renderSessionList = () => {
            const list = document.getElementById('sessionList');
            const search = document.getElementById('sidebarSearch').value.toLowerCase();
            list.innerHTML = '';
            
            const filtered = sessions.filter(s => s.participante_nome.toLowerCase().includes(search));
            
            if (filtered.length === 0) {
                list.innerHTML = `<div class="text-center p-8 text-xs font-bold text-slate-400 uppercase tracking-widest">Nenhum chat ${sidebarMode === 'history' ? 'no histórico' : 'ativo'}</div>`;
                return;
            }

            filtered.forEach(s => {
                const initials = s.participante_nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
                const isActive = currentSessionId === s.id;
                const lastTime = s.ultima_msg_time ? s.ultima_msg_time.split(' ')[1].substring(0,5) : '';
                
                let statusColor = 'bg-red-500 animate-pulse';
                let statusLabelBadge = '';
                
                if (s.status === 'em_atendimento') {
                    statusColor = 'bg-green-500';
                } else if (s.status === 'standby') {
                    statusColor = 'bg-blue-400';
                } else if (s.status === 'aguardando') {
                    statusLabelBadge = '<span class="px-1.5 py-0.5 bg-red-100 text-red-600 text-[8px] font-black rounded-md ml-2 border border-red-200">NOVA SOLICITAÇÃO</span>';
                } else if (s.status === 'finalizado') {
                    statusColor = 'bg-slate-400';
                    statusLabelBadge = '<span class="px-1.5 py-0.5 bg-slate-100 text-slate-400 text-[8px] font-black rounded-md ml-2 border border-slate-200">ENCERRADO</span>';
                }

                const item = document.createElement('div');
                item.className = `flex items-center gap-3 p-3.5 rounded-2xl cursor-pointer transition-all ${isActive ? 'bg-blue-600 text-white shadow-xl shadow-blue-100' : 'hover:bg-white hover:shadow-md text-slate-600'}`;
                item.onclick = () => selectSession(s);
                
                item.innerHTML = `
                    <div class="relative shrink-0">
                        <div class="w-12 h-12 rounded-full ${isActive ? 'bg-white/20' : 'bg-blue-100 text-blue-600'} flex items-center justify-center font-black">${initials}</div>
                        <div class="absolute -bottom-1 -right-1 w-4 h-4 ${statusColor} border-2 border-white rounded-full flex items-center justify-center">
                            ${s.status === 'finalizado' ? '<i data-lucide="lock" class="w-2 h-2 text-white"></i>' : ''}
                        </div>
                        ${s.notificacao_pendente ? '<div class="absolute -top-1 -right-0.5 w-3.5 h-3.5 bg-green-500 border-2 border-white rounded-full animate-pulse shadow-sm"></div>' : ''}
                    </div>
                    <div class="flex-1 min-w-0">
                        <div class="flex justify-between items-baseline mb-0.5">
                            <h4 class="text-sm font-bold truncate flex items-center">${s.participante_nome}${statusLabelBadge}</h4>
                            <span class="text-[9px] font-bold ${isActive ? 'opacity-80' : 'text-slate-400'}">${lastTime}</span>
                        </div>
                        <p class="text-xs ${isActive ? 'opacity-90' : 'text-slate-400'} truncate font-medium">${s.status === 'standby' ? '⏱️ EM ESPERA - ' : ''}${s.ultima_msg || s.assunto || 'Iniciando conversa...'}</p>
                    </div>
                `;
                list.appendChild(item);
            });
            lucide.createIcons();
        };

        const updateHeaderUI = (sessao) => {
            if (!sessao) return;
            const initials = sessao.participante_nome.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
            document.getElementById('hdrAvatar').textContent = initials;
            document.getElementById('hdrName').textContent = sessao.participante_nome;
            
            const statusLabel = { 'aguardando': 'Aguardando', 'em_atendimento': 'Em Atendimento', 'standby': 'Em Espera', 'finalizado': 'Encerrada' };
            const statusColor = { 'aguardando': 'bg-orange-400', 'em_atendimento': 'bg-green-500', 'standby': 'bg-blue-400', 'finalizado': 'bg-slate-400' };
            
            document.getElementById('hdrStatusText').textContent = statusLabel[sessao.status] || 'Offline';
            document.getElementById('hdrStatus').className = `absolute -bottom-0.5 -right-0.5 w-3.5 h-3.5 border-2 border-white rounded-full ${statusColor[sessao.status] || 'bg-slate-400'}`;
            
            // Toggle Standby/Resume Button
            const btnStandby = document.getElementById('btnStandbyChat');
            const btnEnd = document.getElementById('btnEndChat');
            const inputArea = document.getElementById('mainInput').parentElement.parentElement;

            if (sessao.status === 'finalizado') {
                btnStandby.classList.add('hidden');
                btnEnd.classList.add('hidden');
                inputArea.classList.add('opacity-50', 'pointer-events-none');
                document.getElementById('mainInput').placeholder = "Chat encerrado (Apenas leitura)";
            } else {
                btnStandby.classList.remove('hidden');
                btnEnd.classList.remove('hidden');
                inputArea.classList.remove('opacity-50', 'pointer-events-none');
                document.getElementById('mainInput').placeholder = "Escreva uma mensagem...";

                if (sessao.status === 'standby') {
                    btnStandby.innerHTML = '<i data-lucide="play-circle" class="w-4 h-4"></i> Retomar Atendimento';
                    btnStandby.classList.remove('text-blue-500');
                    btnStandby.classList.add('text-green-500');
                    btnStandby.classList.remove('border-blue-50');
                    btnStandby.classList.add('border-green-50');
                } else {
                    btnStandby.innerHTML = '<i data-lucide="pause-circle" class="w-4 h-4"></i> Colocar em Espera';
                    btnStandby.classList.remove('text-green-500');
                    btnStandby.classList.add('text-blue-500');
                    btnStandby.classList.remove('border-green-50');
                    btnStandby.classList.add('border-blue-50');
                }
            }
            lucide.createIcons();
        };

        const loadActiveChatMessages = async () => {
            if (!currentSessionId) return;
            try {
                const res = await fetch(`/api/chat/mensagens/${currentSessionId}`, { cache: "no-store" });
                const history = await res.json();
                
                const validMsgs = history.filter(m => !(m.remetente_tipo === 'sistema' && m.mensagem.includes('Bem-vindo ao atendimento SAS')));
                const currentCount = chatHistory.querySelectorAll('.message-bubble').length;
                
                if (validMsgs.length > currentCount) {
                    if (currentCount === 0 || chatHistory.querySelector('.animate-spin')) {
                        chatHistory.innerHTML = '<div class="flex justify-center mb-8"><span class="bg-blue-100 text-blue-700 text-[10px] font-black px-4 py-1.5 rounded-full uppercase tracking-widest">Hoje</span></div>';
                    }
                    const newMsgs = validMsgs.slice(currentCount);
                    newMsgs.forEach(m => {
                        const align = m.remetente_tipo === 'atendente' ? 'right' : 'left';
                        const time = m.created_at.split(' ')[1].substring(0,5);
                        addMessage(m.mensagem, align, { time, midia_url: m.midia_url });
                    });
                }
            } catch (err) { console.error('Erro ao buscar mensagens:', err); }
        };

        const selectSession = async (sessao) => {
            currentSessionId = sessao.id;
            renderSessionList();
            
            // Update Header
            updateHeaderUI(sessao);
            
            // Reset and Fill basic info only (manual conference preferred)
            document.getElementById('panelName').value = sessao.participante_nome || '';
            document.getElementById('panelCPF').value = sessao.participante_cpf || '';
            document.getElementById('panelMatricula').value = '';
            document.getElementById('panelEmail').value = '';
            document.getElementById('panelCargo').value = '';
            document.getElementById('panelVinculo').value = '';
            document.getElementById('panelLocal').value = '';
            
            // Re-init date/time
            document.getElementById('panelDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('panelTime').value = getNowTime();
            
            // Load History
            chatHistory.innerHTML = '<div class="flex justify-center p-8 opacity-50"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600"></div></div>';
            loadActiveChatMessages();
        };

        const sendMessage = async (text, midiaUrl = null) => {
            if (!currentSessionId) {
                alert('Selecione uma conversa na barra lateral antes de enviar.');
                return;
            }
            try {
                await fetch('/api/chat/mensagem', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        sessao_id: currentSessionId,
                        remetente_tipo: 'atendente',
                        atendente_id: auth.id,
                        mensagem: text,
                        midia_url: midiaUrl
                    })
                });
                if (!midiaUrl) addMessage(text, 'right');
                loadSessions(); // Update last message in sidebar
            } catch (err) { console.error('Erro ao enviar mensagem:', err); }
        };

        // Editor Logic
        const saveCurrentState = (targetIdx = currIdx) => {
            if (pendingFiles.length === 0 || targetIdx < 0 || targetIdx >= pendingFiles.length) return;
            const pf = pendingFiles[targetIdx];
            if (!pf || !pf.file.type.startsWith('image/')) return;
            
            // Only save if the image is actually loaded and visible
            if (editorImg.complete && editorImg.naturalWidth > 0 && !editorImg.classList.contains('hidden')) {
                const drawingData = canvas.toDataURL('image/png');
                pf.drawingsData = drawingData;

                const finalC = document.createElement('canvas');
                // Use a reliable source for the merge
                const targetImg = (mode === 'crop' && cropper) ? cropper.getCroppedCanvas() : editorImg;
                
                finalC.width = targetImg.naturalWidth || targetImg.width;
                finalC.height = targetImg.naturalHeight || targetImg.height;
                const fctx = finalC.getContext('2d');
                fctx.drawImage(targetImg, 0, 0, finalC.width, finalC.height);
                if (mode !== 'crop') {
                    fctx.drawImage(canvas, 0, 0, finalC.width, finalC.height);
                }
                pf.editedData = finalC.toDataURL('image/png');
            }
        };

        const defaultOnLoad = () => {
            canvas.width = editorImg.clientWidth; canvas.height = editorImg.clientHeight;
            canvas.style.top = editorImg.offsetTop + 'px'; canvas.style.left = editorImg.offsetLeft + 'px';
            canvas.classList.remove('hidden'); 
            ctx.clearRect(0,0,canvas.width,canvas.height);
            ctx.globalCompositeOperation = 'source-over';
            
            const pf = pendingFiles[currIdx];
            if (pf && pf.drawingsData) {
                const img = new Image();
                img.src = pf.drawingsData;
                img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            }
        };

        const refreshEditor = (i) => {
            if (currIdx !== i) saveCurrentState(currIdx);
            currIdx = i; 
            const pf = pendingFiles[i];
            if (!pf) return;

            editorImg.classList.add('hidden'); 
            document.getElementById('docPlaceholder').classList.add('hidden'); 
            canvas.classList.add('hidden');
            editorCaption.value = pf.cap || '';
            
            if (pf.file.type.startsWith('image/')) {
                editorImg.src = pf.editedData || pf.url; 
                editorImg.classList.remove('hidden');
                editorImg.onload = defaultOnLoad;
            } else {
                document.getElementById('docTitle').textContent = pf.file.name;
                document.getElementById('docInfo').textContent = (pf.file.size/1024/1024).toFixed(1)+' MB';
                document.getElementById('docPlaceholder').classList.remove('hidden');
            }
            renderThumbs();
        };

        const removeFile = (i) => {
            pendingFiles.splice(i, 1);
            if (pendingFiles.length === 0) {
                previewView.style.display = 'none';
                currIdx = -1;
            } else {
                const next = (i >= pendingFiles.length) ? pendingFiles.length - 1 : i;
                refreshEditor(next);
            }
        };

        const renderThumbs = () => {
            thumbStrip.innerHTML = '';
            pendingFiles.forEach((pf, i) => {
                const dv = document.createElement('div');
                dv.className = `group relative w-14 h-14 rounded-xl border-2 overflow-hidden shadow-sm cursor-pointer transition-all ${i===currIdx?'border-blue-500 ring-2 ring-blue-50 scale-105':'border-transparent opacity-60'}`;
                
                let content = '';
                if (pf.file.type.startsWith('image/')) {
                    content = `<img src="${pf.editedData || pf.url}" class="w-full h-full object-cover">`;
                } else {
                    content = `<div class="w-full h-full bg-blue-600 flex items-center justify-center text-white"><i data-lucide="file-text" class="w-5 h-5"></i></div>`;
                }
                
                dv.innerHTML = `
                    ${content}
                    <div class="remove-file absolute top-0.5 right-0.5 bg-red-500 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm hover:bg-red-600" onclick="event.stopPropagation(); removeFile(${i})">
                        <i data-lucide="x" class="w-2.5 h-2.5"></i>
                    </div>
                `;
                
                dv.onclick = () => { if(currIdx!==-1) pendingFiles[currIdx].cap = editorCaption.value; refreshEditor(i); };
                thumbStrip.appendChild(dv);
            });
            document.getElementById('fileSummary').textContent = `${pendingFiles.length} Selecionado${pendingFiles.length>1?'s':''}`;
            lucide.createIcons();
        };

        // Tool Handlers
        const applyCrop = () => {
            if (cropper) {
                const pf = pendingFiles[currIdx];
                pf.lastCropData = cropper.getData();
                const croppedCanvas = cropper.getCroppedCanvas();
                pf.editedData = croppedCanvas.toDataURL();
                
                // Restore default onload before updating src
                editorImg.onload = defaultOnLoad;
                editorImg.src = pf.editedData;
                
                editorImg.classList.add('rounded-lg', 'border-2', 'border-white', 'shadow-2xl');
                cropper.destroy();
                cropper = null;
                setTimeout(() => {
                    canvas.width = editorImg.clientWidth;
                    canvas.height = editorImg.clientHeight;
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    if (pf.drawingsData) {
                        const img = new Image();
                        img.src = pf.drawingsData;
                        img.onload = () => ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    }
                }, 100);
            }
        };

        btnPencil.onclick = () => { 
            applyCrop();
            mode = (mode === 'pencil' ? 'none' : 'pencil'); 
            updateTools(); 
        };
        
        btnEraser.onclick = () => { 
            applyCrop();
            mode = (mode === 'eraser' ? 'none' : 'eraser'); 
            updateTools(); 
        };

        btnCrop.onclick = () => {
            if (mode === 'crop') {
                applyCrop();
                mode = 'none';
            } else {
                const pf = pendingFiles[currIdx];
                mode = 'crop';
                saveCurrentState(); // Save sketches before entering crop mode
                canvas.classList.add('hidden');
                
                // Always load ORIGINAL file for cropping
                editorImg.src = URL.createObjectURL(pf.file);
                // Remove decorative styles that might interfere with cropper bounds
                editorImg.classList.remove('rounded-lg', 'border-2', 'border-white', 'shadow-2xl');
                
                editorImg.onload = () => {
                    cropper = new Cropper(editorImg, {
                        autoCropArea: 1,
                        viewMode: 0,
                        movable: true,
                        zoomable: true,
                        scalable: true,
                        rotatable: true,
                        background: false,
                        data: pf.lastCropData || null,
                        ready() {
                            if (pf.lastCropData && pf.lastCropData.rotate) {
                                cropper.rotateTo(pf.lastCropData.rotate);
                            }
                        }
                    });
                };
            }
            updateTools();
        };

        btnConfirmCrop.onclick = () => {
            applyCrop();
            mode = 'none';
            updateTools();
        };

        btnResetCrop.onclick = () => cropper && cropper.reset();
        btnRotateLeft.onclick = () => cropper && cropper.rotate(-90);
        btnRotateRight.onclick = () => cropper && cropper.rotate(90);

        const updateTools = () => {
            // Toggle Toolbars
            mainTools.classList.toggle('hidden', mode === 'crop');
            cropTools.classList.toggle('hidden', mode !== 'crop');

            colorPicker.classList.toggle('hidden', mode !== 'pencil');
            btnPencil.classList.toggle('active', mode === 'pencil');
            btnEraser.classList.toggle('active', mode === 'eraser');
            btnCrop.classList.toggle('active', mode === 'crop');
            
            if (mode === 'pencil' || mode === 'eraser') {
                canvas.classList.remove('hidden');
                ctx.globalCompositeOperation = mode === 'eraser' ? 'destination-out' : 'source-over';
            }
        };

        document.querySelectorAll('.color-dot').forEach(dot => {
            dot.onclick = () => {
                document.querySelector('.color-dot.selected').classList.remove('selected');
                dot.classList.add('selected'); 
                strokeColor = dot.dataset.color;
            };
        });

        canvas.onmousedown = (e) => { 
            if (mode !== 'pencil' && mode !== 'eraser') return; 
            drawing = true; 
            ctx.beginPath(); 
            ctx.moveTo(e.offsetX, e.offsetY); 
            ctx.strokeStyle = strokeColor; 
            ctx.lineWidth = mode === 'eraser' ? 20 : 5; 
            ctx.lineCap = 'round'; 
        };
        canvas.onmousemove = (e) => { if (!drawing) return; ctx.lineTo(e.offsetX, e.offsetY); ctx.stroke(); };
        canvas.onmouseup = () => drawing = false;

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Delete' && previewView.style.display === 'flex' && mode === 'none') {
                if (currIdx !== -1) removeFile(currIdx);
            }
        });

        // Integration
        const openSelection = (fs) => { 
            const isFirst = pendingFiles.length === 0;
            Array.from(fs).forEach(f => {
                const pf = {file:f, cap:'', editedData: null, drawingsData: null, lastCropData: null};
                if (f.type.startsWith('image/')) pf.url = URL.createObjectURL(f);
                pendingFiles.push(pf);
            }); 
            previewView.style.display='flex'; 
            refreshEditor(isFirst ? 0 : pendingFiles.length - fs.length); 
            mainFileInput.value = '';
            mainImgInput.value = '';
        };
        atClip.onclick = () => mainFileInput.click();
        atCam.onclick = () => mainImgInput.click();
        mainFileInput.onchange = (e) => openSelection(e.target.files);
        mainImgInput.onchange = (e) => openSelection(e.target.files);
        btnAddFiles.onclick = () => mainFileInput.click(); // Now allows all files

        const fileToBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.onload = () => resolve(reader.result);
            reader.onerror = reject;
            reader.readAsDataURL(file);
        });

        closePreview.onclick = () => { previewView.style.display='none'; pendingFiles=[]; };
        finalSend.onclick = async () => {
            saveCurrentState();
            const pfCurrent = pendingFiles[currIdx];
            if (pfCurrent) pfCurrent.cap = editorCaption.value;
            
            const btn = document.getElementById('finalSend');
            btn.disabled = true;
            btn.innerHTML = '<div class="w-6 h-6 border-2 border-white border-t-transparent rounded-full animate-spin"></div>';

            for (const pf of pendingFiles) {
                const isImg = pf.file.type.startsWith('image/');
                let midia = null;
                
                if (isImg && pf.editedData) {
                    midia = pf.editedData;
                } else {
                    midia = await fileToBase64(pf.file);
                }
                
                const textMsg = isImg ? (pf.cap || 'Imagem enviada') : `DOC:${pf.file.name}|${pf.cap || 'Documento enviado'}`;
                
                await sendMessage(textMsg, midia);
                addMessage(textMsg, 'right', { midia_url: midia, time: getNowTime() });
            }
            previewView.style.display='none'; pendingFiles=[];
            btn.disabled = false;
            btn.innerHTML = '<i data-lucide="send" class="w-7 h-7 -translate-x-1 translate-y-1"></i>';
            lucide.createIcons();
        };

        mainInput.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                mainSend.click();
            }
        };

        mainSend.onclick = () => { 
            if(mainInput.value.trim()){ 
                sendMessage(mainInput.value.trim()); 
                mainInput.value=''; 
            } 
        };

        document.getElementById('btnOpenAction').onclick = async () => {
            if (!currentSessionId) return;
            const sessao = sessions.find(s => s.id === currentSessionId);
            
            // If it's a new session, "take" it
            if (sessao && sessao.status === 'aguardando') {
                const btn = document.getElementById('btnOpenAction');
                btn.disabled = true; // Trava para evitar cliques duplos
                try {
                    // Atualização Otimista
                    sessao.status = 'em_atendimento';
                    updateHeaderUI(sessao);
                    renderSessionList();
                    
                    await fetch(`/api/chat/atribuir/${currentSessionId}`, {
                        method: 'PUT',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ atendente_id: auth.id })
                    });
                    
                    loadSessions(); // Sync with server backup
                } catch (e) { 
                    console.error(e); 
                    btn.disabled = false;
                }
            }

            // Always toggle/open the action panel
            const panel = document.getElementById('actionPanel');
            if (panel) panel.classList.toggle('hidden');
        };

        document.getElementById('btnCreateAppointment').onclick = async () => {
            if (!currentSessionId) return;
            const nome = document.getElementById('panelName').value;
            const cpf = document.getElementById('panelCPF').value;
            const matricula = document.getElementById('panelMatricula').value;
            const email = document.getElementById('panelEmail').value;
            const cargo = document.getElementById('panelCargo').value;
            const vinculo = document.getElementById('panelVinculo').value;
            const local = document.getElementById('panelLocal').value;
            const servico = document.getElementById('panelService').value;
            const tipo_at = document.getElementById('panelTypeAt').value;
            const prioridade = document.getElementById('panelPriority').value;
            const data_ag = document.getElementById('panelDate').value;
            const hora_ag = document.getElementById('panelTime').value;
            const obs1 = document.getElementById('panelObs1').value;
            const obs2 = document.getElementById('panelObs2').value;

            if (!nome || !cpf || !servico || !data_ag || !hora_ag) {
                alert('Preencha os campos obrigatórios (Nome, CPF, Serviço, Data e Hora).');
                return;
            }

            try {
                const res = await fetch('/api/agendamentos', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        nome_completo: nome,
                        cpf: cpf,
                        matricula: matricula,
                        cargo: cargo,
                        vinculo: vinculo,
                        local_trabalho: local,
                        email: email,
                        tipo_servico: servico,
                        data_agendamento: data_ag,
                        hora_inicio: hora_ag,
                        observacao_problema: obs1,
                        observacao_solucao: obs2,
                        status: 'chegou', 
                        tipo_atendimento: tipo_at,
                        prioridade: prioridade,
                        atendente_id: auth.id,
                        sessao_id: currentSessionId
                    })
                });
                const data = await res.json();
                if (data.id) {
                    alert('Agendamento criado com sucesso!');
                    sendMessage(`✅ Seu agendamento foi realizado com sucesso! Para continuarmos o atendimento, daremos prosseguimento por aqui.`);
                    
                    // Mostrar campo de observações após confirmar
                    document.getElementById('groupObservations').classList.remove('hidden');
                    document.getElementById('observationsContent').classList.remove('hidden');
                    // Opcional: esconder o botão de confirmar agendamento já que já foi feito
                    document.getElementById('btnCreateAppointment').classList.add('hidden');
                } else {
                    alert('NÃO FOI POSSÍVEL CONFIRMAR: ' + (data.error || data.message || 'Erro desconhecido'));
                }
            } catch (err) { 
                alert('Erro de conexão ou no servidor ao tentar confirmar.'); 
            }
        };

        document.getElementById('btnEndChat').onclick = async () => {
            if (!currentSessionId) return;
            if (confirm('Deseja finalizar esta conversa?')) {
                await fetch(`/api/chat/finalizar/${currentSessionId}`, { method: 'PUT' });
                // currentSessionId = null; // Don't nullify so user can still see it in history
                loadSessions();
                // Find and update status locally in sessions array for immediate UI update
                const sessao = sessions.find(s => s.id === currentSessionId);
                if (sessao) {
                    sessao.status = 'finalizado';
                    updateHeaderUI(sessao);
                }
            }
        };

        // Tab Switching Logic
        const tabActive = document.getElementById('tabActive');
        const tabHistory = document.getElementById('tabHistory');

        const updateTabs = () => {
            if (sidebarMode === 'active') {
                tabActive.className = 'flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all bg-white text-blue-600 shadow-sm';
                tabHistory.className = 'flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-slate-400 hover:text-slate-600';
            } else {
                tabHistory.className = 'flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all bg-white text-blue-600 shadow-sm';
                tabActive.className = 'flex-1 py-2 text-[10px] font-black uppercase tracking-widest rounded-lg transition-all text-slate-400 hover:text-slate-600';
            }
            loadSessions();
        };

        tabActive.onclick = () => { sidebarMode = 'active'; updateTabs(); };
        tabHistory.onclick = () => { sidebarMode = 'history'; updateTabs(); };

        document.getElementById('btnStandbyChat').onclick = async () => {
            if (!currentSessionId) return;
            const sessao = sessions.find(s => s.id === currentSessionId);
            const isStandby = sessao && sessao.status === 'standby';

            if (confirm(isStandby ? 'Deseja retomar este atendimento?' : 'Deseja colocar este atendimento em espera?')) {
                const endpoint = isStandby ? `/api/chat/atribuir/${currentSessionId}` : `/api/chat/standby/${currentSessionId}`;
                const method = isStandby ? 'PUT' : 'PUT';
                const body = isStandby ? JSON.stringify({ atendente_id: auth.id }) : null;

                await fetch(endpoint, { 
                    method, 
                    headers: isStandby ? {'Content-Type': 'application/json'} : {},
                    body
                });
                
                // Atualizar o status localmente para refletir na UI instantaneamente
                sessao.status = isStandby ? 'em_atendimento' : 'standby';
                updateHeaderUI(sessao);
                renderSessionList();
                
                if (isStandby) {
                    sendMessage('✅ Este atendimento foi retomado.');
                } else {
                    sendMessage('⚠️ Este atendimento foi colocado em espera. Assim que possível retornaremos o contato.');
                }
                
                loadSessions();
            }
        };

        document.getElementById('sidebarSearch').oninput = renderSessionList;

        // Auto-fill logic
        const panelCPF = document.getElementById('panelCPF');
        const panelMatricula = document.getElementById('panelMatricula');

        const lookupServer = async (val) => {
            if (!val || (val.length < 11 && isNaN(val))) return;
            try {
                const res = await fetch(`/api/identificacao/validar?valor=${val}`);
                const json = await res.json();
                if (json.success && json.data.length > 0) {
                    const d = json.data[0];
                    document.getElementById('panelName').value = d.nome_completo || '';
                    document.getElementById('panelCPF').value = maskCPF(d.cpf || '');
                    document.getElementById('panelMatricula').value = d.matricula || '';
                    document.getElementById('panelEmail').value = d.email || '';
                    document.getElementById('panelCargo').value = d.cargo || '';
                    document.getElementById('panelVinculo').value = d.vinculo || '';
                    // Format initial message for the attendant
                    const initialMsg = `🔹 *DADOS DO SERVIDOR* 🔹\n` +
                                     `👤 *Nome:* ${d.nome_completo}\n` +
                                     `🆔 *CPF:* ${d.cpf}\n` +
                                     `🔢 *Matrícula:* ${d.matricula}\n` +
                                     `💼 *Cargo:* ${d.cargo}\n` +
                                     `🔗 *Vínculo:* ${d.vinculo}\n` +
                                     `📍 *Local:* ${d.local_trabalho}\n` +
                                     `📧 *E-mail:* ${d.email}`;
                    document.getElementById('panelLocal').value = d.local_trabalho || '';
                    
                    // Open sections to show data
                    document.querySelectorAll('#panelUserInfo > div > div').forEach(div => div.classList.remove('hidden'));
                }
            } catch (err) { console.error('Erro na busca:', err); }
        };

        panelCPF.oninput = (e) => {
            e.target.value = maskCPF(e.target.value);
            if (e.target.value.length === 14) lookupServer(e.target.value);
        };

        panelMatricula.onblur = (e) => { if(e.target.value) lookupServer(e.target.value); };

        // Startup
        loadSessions();
        setInterval(loadSessions, 3000); // Poll for sessions every 3s
        setInterval(loadActiveChatMessages, 2000); // Poll for current chat messages every 2s

    </script>
</body>
</html>
