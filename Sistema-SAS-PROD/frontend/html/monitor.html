<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <div id="app"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/layout.js"></script>

    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Monitor');

        const content = document.getElementById('page-content');

        content.innerHTML = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 animate-fade-in">
                <div class="flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <i data-lucide="monitor" class="w-8 h-8 text-blue-700"></i>
                        <h1 class="text-3xl font-bold text-blue-700">Monitor de Atendimentos</h1>
                    </div>
                    <!-- Decorative Line (Pernambuco Colors) -->
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>

                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border">
                    <span class="text-sm text-gray-600">Filtrar por:</span>
                    <select id="attendantFilter" class="border-none bg-transparent font-medium text-blue-700 focus:ring-0 cursor-pointer">
                        <option value="all">Todos os Atendentes</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- Status Cards -->
                <div class="space-y-4">
                    ${renderStatusCard('Agendados', 'clock', 'blue', 'agendado')}
                    ${renderStatusCard('Aguardando', 'clock', 'yellow', 'chegou')}
                    ${renderStatusCard('Pendentes', 'alert-circle', 'orange', 'pendente')}
                    ${renderStatusCard('Em Andamento', 'play', 'blue', 'em_andamento')}
                    ${renderStatusCard('Concluídos', 'check-circle', 'green', 'concluido')}
                    ${renderStatusCard('Cancelados', 'x-circle', 'red', 'cancelado')}
                </div>

                <!-- Table -->
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="font-bold text-gray-800">Todos os Atendimentos</h3>
                            <button id="refreshBtn" class="text-blue-600 hover:bg-blue-50 p-2 rounded-full transition-colors">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-600 font-medium border-b border-slate-200">
                                    <tr>
                                        <th class="px-4 py-3">Nome</th>
                                        <th class="px-4 py-3">Data/Hora</th>
                                        <th class="px-4 py-3">Serviço</th>
                                        <th class="px-4 py-3">Atendente</th>
                                        <th class="px-4 py-3">Guichê</th>
                                        <th class="px-4 py-3">Status</th>
                                        <th class="px-4 py-3">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody" class="divide-y divide-slate-100">
                                    <!-- Rows injected here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        `;

        function renderStatusCard(label, icon, color, statusKey) {
            return `
                <div class="bg-white border-l-4 border-${color}-400 rounded-lg p-4 shadow-sm flex items-center gap-3">
                    <div class="p-2 bg-${color}-50 rounded-full text-${color}-600">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div id="count-${statusKey}" class="text-2xl font-bold text-${color}-600">0</div>
                        <div class="text-sm text-gray-600">${label}</div>
                    </div>
                </div>
            `;
        }

        lucide.createIcons();

        // Logic
        const attendantFilter = document.getElementById('attendantFilter');
        const refreshBtn = document.getElementById('refreshBtn');
        const tableBody = document.getElementById('tableBody');

        // Filter Logic
        if (attendantFilter) {
            attendantFilter.addEventListener('change', () => loadData());
        }

        const loadData = async () => {
            if (attendantFilter && attendantFilter.options.length === 1) {
                const users = await window.SAS.base44.entities.SystemUser.list();
                users.forEach(u => {
                    const option = document.createElement('option');
                    option.value = u.id;
                    option.textContent = u.nome_completo;
                    attendantFilter.appendChild(option);
                });
            }
            let atendimentos = await window.SAS.base44.entities.Agendamento.list('-created_date');

            if (attendantFilter && attendantFilter.value !== 'all') {
                atendimentos = atendimentos.filter(a => String(a.atendente_id) === String(attendantFilter.value));
            }

            const counts = {
                agendado: 0, chegou: 0, pendente: 0, em_andamento: 0, concluido: 0, cancelado: 0
            };

            atendimentos.forEach(a => {
                if (counts[a.status] !== undefined) counts[a.status]++;
                else if (a.status === 'nao_compareceu') counts.cancelado++;
            });

            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = counts[key];
            });

            tableBody.innerHTML = '';
            if (atendimentos.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">Nenhum registro encontrado.</td></tr>';
            } else {
                atendimentos.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 transition-colors';

                    let statusColor = 'bg-gray-100 text-gray-800';
                    if (item.status === 'concluido') statusColor = 'bg-green-100 text-green-800';
                    else if (item.status === 'em_andamento') statusColor = 'bg-blue-100 text-blue-800';
                    else if (item.status === 'pendente') statusColor = 'bg-orange-100 text-orange-800';
                    else if (item.status === 'cancelado' || item.status === 'nao_compareceu') statusColor = 'bg-red-100 text-red-800';

                    let actionBtn = '';
                    if (item.status === 'concluido' || item.status === 'cancelado' || item.status === 'nao_compareceu') {
                        actionBtn = `
                            <button onclick="openDetailsModal('${item.id}')" class="text-blue-600 hover:bg-blue-100 p-1.5 rounded-lg transition-colors" title="Ver Detalhes">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        `;
                    }

                    tr.innerHTML = `
                        <td class="px-4 py-3 font-medium text-gray-900">${item.nome_completo}</td>
                        <td class="px-4 py-3 text-gray-600">${window.SAS.utils.formatDate(item.data_agendamento)} ${item.hora_inicio || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${item.tipo_servico}</td>
                        <td class="px-4 py-3 text-gray-600">${item.atendente_nome || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${item.guiche || '-'}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusColor} capitalize">
                                ${item.status.replace('_', ' ')}
                            </span>
                        </td>
                        <td class="px-4 py-3">
                            ${actionBtn}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                lucide.createIcons();
            }
        };

        window.openDetailsModal = async (id) => {
            try {
                const all = await window.SAS.base44.entities.Agendamento.list();
                const item = all.find(a => a.id == id);

                if (!item) return;

                const html = `
                    <div class="space-y-10">
                        <!-- Section 1: Identificação do Servidor -->
                        <div>
                            <div class="flex items-center gap-2 mb-6 pb-2 border-b border-slate-100">
                                <i data-lucide="user" class="w-5 h-5 text-blue-600"></i>
                                <h4 class="text-sm font-bold text-blue-900 uppercase tracking-widest">Identificação do Servidor</h4>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="md:col-span-2 text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Nome Completo</label>
                                    <div class="text-base text-gray-800 font-bold">${item.nome_completo}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">CPF</label>
                                    <div class="text-base text-gray-800 font-medium">${window.SAS.utils.formatCPF(item.cpf || '') || '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Matrícula</label>
                                    <div class="text-base text-gray-800 font-medium">${item.matricula || '-'}</div>
                                </div>
                                <div class="md:col-span-2 text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">E-mail</label>
                                    <div class="text-base text-gray-800 font-medium">${item.email || '-'}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 2: Vínculo Profissional -->
                        <div>
                            <div class="flex items-center gap-2 mb-6 pb-2 border-b border-slate-100">
                                <i data-lucide="briefcase" class="w-5 h-5 text-blue-600"></i>
                                <h4 class="text-sm font-bold text-blue-900 uppercase tracking-widest">Vínculo Profissional</h4>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Cargo</label>
                                    <div class="text-base text-gray-800 font-medium">${item.cargo || '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Tipo de Vínculo</label>
                                    <div class="text-base text-gray-800 font-medium capitalize">${item.vinculo || '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Local de Trabalho</label>
                                    <div class="text-base text-gray-800 font-medium">${item.local_trabalho || '-'}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 3: Dados do Atendimento -->
                        <div>
                            <div class="flex items-center gap-2 mb-6 pb-2 border-b border-slate-100">
                                <i data-lucide="calendar" class="w-5 h-5 text-blue-600"></i>
                                <h4 class="text-sm font-bold text-blue-900 uppercase tracking-widest">Dados do Atendimento</h4>
                            </div>
                            <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Serviço</label>
                                    <div class="text-base text-blue-700 font-bold">${item.tipo_servico}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Atendimento</label>
                                    <div class="text-base text-gray-800 font-medium">${item.tipo_atendimento || '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Nível de Atendimento</label>
                                    <div class="text-base text-gray-800 font-medium">${item.prioridade || 'Normal'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Atendente</label>
                                    <div class="text-base text-gray-800 font-medium">${item.atendente_nome || '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Data/Hora</label>
                                    <div class="text-base text-gray-800 font-medium">${window.SAS.utils.formatDate(item.data_agendamento)} às ${item.hora_inicio ? item.hora_inicio.substring(0, 5) : '-'}</div>
                                </div>
                                <div class="text-center">
                                    <label class="block text-xs font-bold text-gray-400 uppercase mb-1.5">Status</label>
                                    <div class="text-base font-bold capitalize ${item.status === 'concluido' ? 'text-green-600' : 'text-blue-600'}">${item.status.replace('_', ' ')}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Observations -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 bg-slate-50 p-8 rounded-2xl border border-slate-100 shadow-sm">
                            <div class="space-y-3">
                                <label class="block text-xs font-bold text-blue-700 uppercase tracking-widest">Observação 1 — Problema</label>
                                <p class="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.observacao_problema || 'Nenhuma observação registrada.'}</p>
                            </div>
                            <div class="space-y-3 md:border-l md:border-slate-200/60 md:pl-8">
                                <label class="block text-xs font-bold text-green-700 uppercase tracking-widest">Observação 2 — Solução</label>
                                <p class="text-sm text-gray-600 whitespace-pre-wrap leading-relaxed">${item.observacao_solucao || 'Nenhuma solução registrada.'}</p>
                            </div>
                        </div>
                    </div>
                `;

                window.SAS.utils.modal.alert('Detalhes do Atendimento', html, 'info-no-icon');
            } catch (e) {
                console.error('Error opening modal:', e);
                window.SAS.utils.modal.alert('Erro', 'Erro ao carregar detalhes.', 'danger');
            }
        };

        window.deleteItem = async (id) => {
            window.SAS.utils.modal.confirm('Excluir Registro', 'Tem certeza que deseja excluir este registro permanentemente?', async () => {
                await window.SAS.base44.entities.Agendamento.delete(id);
                loadData();
                window.SAS.utils.notify('success', 'Registro excluído!');
            }, 'danger');
        };

        refreshBtn.addEventListener('click', () => {
            refreshBtn.classList.add('animate-spin');
            loadData().then(() => setTimeout(() => refreshBtn.classList.remove('animate-spin'), 500));
        });

        loadData();
    </script>
</body>

</html>
