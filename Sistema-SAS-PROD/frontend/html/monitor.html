<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
    <div id="app"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ai_assistant.js"></script>
    <script src="js/pdf_generator.js"></script>
    <script src="js/layout.js"></script>

    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Monitor');

        const content = document.getElementById('page-content');

        content.innerHTML = `
            <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-6 animate-fade-in">
                <div class="flex flex-col gap-2">
                    <div class="flex items-center gap-3">
                        <i data-lucide="monitor" class="w-8 h-8 text-blue-700"></i>
                        <h1 class="text-3xl font-bold text-blue-700">Monitor de Atendimentos</h1>
                    </div>
                    <!-- Decorative Line (Pernambuco Colors) -->
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>

                <div class="flex items-center gap-2 bg-white p-2 rounded-lg shadow-sm border">
                    <span class="text-sm text-gray-600">Filtrar por:</span>
                    <select id="attendantFilter" class="border-none bg-transparent font-medium text-blue-700 focus:ring-0 cursor-pointer">
                        <option value="all">Todos os Atendentes</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                <!-- Status Cards -->
                <div class="space-y-4">
                    ${renderStatusCard('Agendados', 'clock', 'blue', 'agendado')}
                    ${renderStatusCard('Aguardando', 'clock', 'yellow', 'chegou')}
                    ${renderStatusCard('Pendentes', 'alert-circle', 'orange', 'pendente')}
                    ${renderStatusCard('Em Andamento', 'play', 'blue', 'em_andamento')}
                    ${renderStatusCard('Concluídos', 'check-circle', 'green', 'concluido')}
                    ${renderStatusCard('Cancelados', 'x-circle', 'red', 'cancelado')}
                </div>

                <!-- Table -->
                <div class="lg:col-span-3">
                    <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                        <div class="p-4 border-b border-slate-100 flex justify-between items-center">
                            <h3 class="font-bold text-gray-800">Todos os Atendimentos</h3>
                            <button id="refreshBtn" class="text-blue-600 hover:bg-blue-50 p-2 rounded-full transition-colors">
                                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm text-left">
                                <thead class="bg-slate-50 text-slate-600 font-medium border-b border-slate-200">
                                    <tr>
                                        <th class="px-4 py-3">Nome</th>
                                        <th class="px-4 py-3">Data/Hora</th>
                                        <th class="px-4 py-3">Serviço</th>
                                        <th class="px-4 py-3">Atendente</th>
                                        <th class="px-4 py-3">Guichê</th>
                                        <th class="px-4 py-3">Status</th>
                                        <th class="px-4 py-3">Ações</th>
                                    </tr>
                                </thead>
                                <tbody id="tableBody" class="divide-y divide-slate-100">
                                    <!-- Rows injected here -->
                                </tbody>
                            </table>
                        </div>
                        <div id="paginationContainer" class="bg-slate-50 border-t border-slate-100 flex justify-center">
                            <!-- Pagination buttons here -->
                        </div>
                    </div>
                </div>
            </div>
        `;

        function renderStatusCard(label, icon, color, statusKey) {
            return `
                <div class="bg-white border-l-4 border-${color}-400 rounded-lg p-4 shadow-sm flex items-center gap-3">
                    <div class="p-2 bg-${color}-50 rounded-full text-${color}-600">
                        <i data-lucide="${icon}" class="w-5 h-5"></i>
                    </div>
                    <div>
                        <div id="count-${statusKey}" class="text-2xl font-bold text-${color}-600">0</div>
                        <div class="text-sm text-gray-600">${label}</div>
                    </div>
                </div>
            `;
        }

        lucide.createIcons();

        // Logic
        const attendantFilter = document.getElementById('attendantFilter');
        const refreshBtn = document.getElementById('refreshBtn');
        const tableBody = document.getElementById('tableBody');

        let currentPage = 1;
        const itemsPerPage = 10;
        let fullFilteredData = [];

        // Filter Logic
        if (attendantFilter) {
            attendantFilter.addEventListener('change', () => loadData());
        }

        const loadData = async () => {
            if (attendantFilter && attendantFilter.options.length === 1) {
                const users = await window.SAS.base44.entities.SystemUser.list();
                const attendants = users.filter(u => u.tipo === 'usuario' && u.situacao === 'ativo');
                attendants.forEach(u => {
                    const option = document.createElement('option');
                    option.value = u.id;
                    option.textContent = u.nome_completo;
                    attendantFilter.appendChild(option);
                });
            }
            let atendimentos = await window.SAS.base44.entities.Agendamento.list('-created_date');

            if (attendantFilter && attendantFilter.value !== 'all') {
                atendimentos = atendimentos.filter(a => String(a.atendente_id) === String(attendantFilter.value));
            }

            const counts = {
                agendado: 0, chegou: 0, pendente: 0, em_andamento: 0, concluido: 0, cancelado: 0
            };

            atendimentos.forEach(a => {
                if (counts[a.status] !== undefined) counts[a.status]++;
                else if (a.status === 'nao_compareceu') counts.cancelado++;
            });

            Object.keys(counts).forEach(key => {
                const el = document.getElementById(`count-${key}`);
                if (el) el.textContent = counts[key];
            });

            fullFilteredData = atendimentos;
            renderTable();
        };

        const renderTable = () => {
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const atendimentos = fullFilteredData.slice(start, end);

            tableBody.innerHTML = '';
            if (atendimentos.length === 0) {
                tableBody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">Nenhum registro encontrado.</td></tr>';
            } else {
                atendimentos.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.className = 'hover:bg-slate-50 transition-colors';

                    let statusColor = 'bg-gray-100 text-gray-800';
                    if (item.status === 'concluido') statusColor = 'bg-green-100 text-green-800';
                    else if (item.status === 'em_andamento') statusColor = 'bg-blue-100 text-blue-800';
                    else if (item.status === 'pendente') statusColor = 'bg-orange-100 text-orange-800';
                    else if (item.status === 'cancelado' || item.status === 'nao_compareceu') statusColor = 'bg-red-100 text-red-800';

                    let actionBtn = '';
                    if (item.status === 'concluido') {
                        actionBtn = `
                            <div class="flex items-center gap-1">
                                <button onclick="openDetailsModal('${item.id}')" class="text-blue-600 hover:bg-blue-100 p-1.5 rounded-lg transition-colors" title="Ver Detalhes">
                                    <i data-lucide="eye" class="w-4 h-4"></i>
                                </button>
                                <button onclick="downloadComprovante('${item.id}')" class="text-emerald-600 hover:bg-emerald-100 p-1.5 rounded-lg transition-colors" title="Baixar Comprovante">
                                    <i data-lucide="file-text" class="w-4 h-4"></i>
                                </button>
                                <button onclick="downloadRequerimento('${item.id}')" class="text-blue-600 hover:bg-blue-100 p-1.5 rounded-lg transition-colors" title="Baixar Requerimento A">
                                    <i data-lucide="clipboard-list" class="w-4 h-4"></i>
                                </button>
                            </div>
                        `;
                    } else if (item.status === 'cancelado' || item.status === 'nao_compareceu') {
                        actionBtn = `
                            <button onclick="openDetailsModal('${item.id}')" class="text-blue-600 hover:bg-blue-100 p-1.5 rounded-lg transition-colors" title="Ver Detalhes">
                                <i data-lucide="eye" class="w-5 h-5"></i>
                            </button>
                        `;
                    }

                    tr.innerHTML = `
                        <td class="px-4 py-3 font-medium text-gray-900">${item.nome_completo}</td>
                        <td class="px-4 py-3 text-gray-600">${window.SAS.utils.formatDate(item.data_agendamento)} ${item.hora_inicio || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${item.tipo_servico}</td>
                        <td class="px-4 py-3 text-gray-600">${item.atendente_nome || '-'}</td>
                        <td class="px-4 py-3 text-gray-600">${item.guiche || '-'}</td>
                        <td class="px-4 py-3">
                            <span class="px-2 py-1 rounded-full text-xs font-medium ${statusColor} capitalize">
                                ${item.status.replace('_', ' ')}
                            </span>
                        </td>
                        <td class="px-4 py-3">
                            ${actionBtn}
                        </td>
                    `;
                    tableBody.appendChild(tr);
                });
                lucide.createIcons();
                renderPagination();
            }
        };

        const renderPagination = () => {
            const container = document.getElementById('paginationContainer');
            if (!container) return;
            container.innerHTML = '';
            
            const totalPages = Math.ceil(fullFilteredData.length / itemsPerPage);
            if (totalPages <= 1) return;

            const nav = document.createElement('div');
            nav.className = 'flex items-center justify-center gap-1 mt-4 py-4';

            const createBtn = (label, page, disabled = false, active = false) => {
                const btn = document.createElement('button');
                btn.className = `min-w-[32px] h-8 flex items-center justify-center rounded-lg text-xs font-bold transition-all border
                    ${active ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:border-blue-400 hover:text-blue-600 shadow-sm'}
                    ${disabled ? 'opacity-30 cursor-not-allowed' : 'cursor-pointer'}`;
                btn.innerHTML = label;
                if (!disabled) btn.onclick = () => { currentPage = page; renderTable(); };
                return btn;
            };

            nav.appendChild(createBtn('<i data-lucide="chevron-left" class="w-4 h-4"></i>', currentPage - 1, currentPage === 1));
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 2 && i <= currentPage + 2)) {
                    nav.appendChild(createBtn(i, i, false, i === currentPage));
                } else if (i === currentPage - 3 || i === currentPage + 3) {
                    const span = document.createElement('span');
                    span.className = 'px-1 text-slate-400';
                    span.textContent = '...';
                    nav.appendChild(span);
                }
            }

            nav.appendChild(createBtn('<i data-lucide="chevron-right" class="w-4 h-4"></i>', currentPage + 1, currentPage === totalPages));
            container.appendChild(nav);
            lucide.createIcons();
        };

        window.openDetailsModal = async (id) => {
            try {
                const all = await window.SAS.base44.entities.Agendamento.list();
                const item = all.find(a => String(a.id) === String(id));

                if (!item) return;

                const html = `
                    <div class="space-y-6">
                    <div class="space-y-5">
                        <!-- Section 1: Identificação -->
                        <div>
                            <div class="flex items-center gap-2 mb-2 pb-0.5 border-b border-slate-100">
                                <i data-lucide="user" class="w-3.5 h-3.5 text-blue-600"></i>
                                <h4 class="text-[10px] font-bold text-blue-900 uppercase tracking-widest">Identificação</h4>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-2">
                                <div class="col-span-2">
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Nome Completo</label>
                                    <div class="text-[11px] text-gray-800 font-bold">${item.nome_completo}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">CPF</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${window.SAS.utils.formatCPF(item.cpf || '') || '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Matrícula</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.matricula || '-'}</div>
                                </div>
                                <div class="col-span-2">
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">E-mail</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.email || '-'}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 2: Vínculo -->
                        <div>
                            <div class="flex items-center gap-2 mb-2 pb-0.5 border-b border-slate-100">
                                <i data-lucide="briefcase" class="w-3.5 h-3.5 text-blue-600"></i>
                                <h4 class="text-[10px] font-bold text-blue-900 uppercase tracking-widest">Vínculo</h4>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-3 gap-x-4 gap-y-2">
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Cargo</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.cargo || '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Tipo</label>
                                    <div class="text-[11px] text-gray-800 font-medium capitalize">${item.vinculo || '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Local</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.local_trabalho || '-'}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Section 3: Dados do Atendimento -->
                        <div>
                            <div class="flex items-center gap-2 mb-2 pb-0.5 border-b border-slate-100">
                                <i data-lucide="calendar" class="w-3.5 h-3.5 text-blue-600"></i>
                                <h4 class="text-[10px] font-bold text-blue-900 uppercase tracking-widest">Atendimento</h4>
                            </div>
                            <div class="grid grid-cols-2 md:grid-cols-4 gap-x-4 gap-y-2">
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Serviço</label>
                                    <div class="text-[11px] text-blue-700 font-bold">${item.tipo_servico}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Atendimento</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.tipo_atendimento || '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Nível</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.prioridade || 'Normal'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Atendente</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${item.atendente_nome || '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Data/Hora</label>
                                    <div class="text-[11px] text-gray-800 font-medium">${window.SAS.utils.formatDate(item.data_agendamento)} às ${item.hora_inicio ? item.hora_inicio.substring(0, 5) : '-'}</div>
                                </div>
                                <div>
                                    <label class="block text-[9px] font-bold text-gray-400 uppercase">Status</label>
                                    <div class="text-[11px] font-bold capitalize ${item.status === 'concluido' ? 'text-green-600' : 'text-blue-600'}">${item.status.replace('_', ' ')}</div>
                                </div>
                            </div>
                        </div>

                        <!-- Observations -->
                        <div class="space-y-6 bg-slate-50 p-4 rounded-xl border border-slate-100">
                            <!-- Obs 1 -->
                            <div class="space-y-1.5 border-b border-slate-200/60 pb-4">
                                <label class="block text-[9px] font-bold text-blue-700 uppercase tracking-widest px-1">Obs 1 — Problema</label>
                                <div class="bg-white/60 p-2.5 rounded-lg border border-slate-200/60 max-h-24 overflow-y-auto custom-scrollbar shadow-sm">
                                    <p class="text-[11px] text-gray-600 whitespace-pre-wrap leading-relaxed">${item.observacao_problema || 'Nenhuma registrada.'}</p>
                                </div>
                            </div>
                            <!-- Obs 2 -->
                            <div class="space-y-1.5">
                                <label class="block text-[9px] font-bold text-green-700 uppercase tracking-widest px-1">Obs 2 — Solução</label>
                                <div class="bg-white/60 p-2.5 rounded-lg border border-slate-200/60 max-h-24 overflow-y-auto custom-scrollbar shadow-sm">
                                    <p class="text-[11px] text-gray-600 whitespace-pre-wrap leading-relaxed">${item.observacao_solucao || 'Nenhuma registrada.'}</p>
                                </div>
                            </div>
                        </div>

                    </div>
                `;

                window.SAS.utils.modal.alert('Detalhes do Atendimento', html, 'info-no-icon');
                lucide.createIcons();
            } catch (e) {
                console.error('Error opening modal:', e);
                window.SAS.utils.modal.alert('Erro', 'Erro ao carregar detalhes.', 'danger');
            }
        };

        window.deleteItem = async (id) => {
            window.SAS.utils.modal.confirm('Excluir Registro', 'Tem certeza que deseja excluir este registro permanentemente?', async () => {
                await window.SAS.base44.entities.Agendamento.delete(id);
                loadData();
                window.SAS.utils.notify('success', 'Registro excluído!');
            }, 'danger');
        };

        refreshBtn.addEventListener('click', () => {
            refreshBtn.classList.add('animate-spin');
            loadData().then(() => setTimeout(() => refreshBtn.classList.remove('animate-spin'), 500));
        });

        // PDF Download Handlers
        window.downloadComprovante = async (id) => {
            const all = await window.SAS.base44.entities.Agendamento.list();
            const ag = all.find(a => String(a.id) === String(id));
            if (ag) window.SAS.pdf.generateComprovante(ag);
        };

        window.downloadRequerimento = async (id) => {
            const all = await window.SAS.base44.entities.Agendamento.list();
            const ag = all.find(a => String(a.id) === String(id));
            if (ag) window.SAS.pdf.generateRequerimentoA(ag);
        };

        loadData();
    </script>
</body>

</html>
