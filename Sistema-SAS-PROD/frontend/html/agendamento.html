<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sonner@1.4.0/dist/sonner.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div id="app"></div>

    <!-- Scripts -->
    <script src="js/utils.js?v=5"></script>
    <script src="js/api.js?v=5"></script>
    <script src="js/ai_assistant.js"></script>
    <script src="js/layout.js?v=5"></script>

    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Agendamento');

        const content = document.getElementById('page-content');

        content.innerHTML = `
            <div class="flex flex-col items-center justify-center mb-8 animate-fade-in">
                <div class="flex items-center gap-3 mb-2">
                    <i data-lucide="calendar" class="w-8 h-8 text-blue-700"></i>
                    <h1 class="text-3xl font-bold text-blue-700">Agendamento</h1>
                </div>
                <!-- Decorative Line (Pernambuco Colors) -->
                <div class="flex justify-center items-center">
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-200 border-t-4 border-t-blue-600 p-8 max-w-6xl mx-auto">
                <form id="agendamentoForm" class="space-y-6">
                    
                    <!-- Row 1 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Nome</label>
                            <input type="text" id="nome" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="Ex.: Maria">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">CPF</label>
                            <input type="text" id="cpf" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="000.000.000-00" maxlength="14">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Matrícula</label>
                            <input type="text" id="matricula" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="Apenas números">
                        </div>
                    </div>

                    <!-- Row 2 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Cargo</label>
                            <input type="text" id="cargo" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="Ex.: Analista Administrativo">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Tipo de Vínculo</label>
                            <div class="relative">
                                <select id="vinculo" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-gray-600 appearance-none">
                                    <option value="">Selecione...</option>
                                    <option value="Comissionado">Comissionado</option>
                                    <option value="Concurso (Nomeado)">Concurso (Nomeado)</option>
                                    <option value="CTD (Contrato)">CTD (Contrato)</option>
                                    <option value="Estatutário">Estatutário</option>
                                    <option value="Extraquadro">Extraquadro</option>
                                    <option value="Ex-servidor">Ex-servidor</option>
                                    <option value="Extra – Sem vínculo">Extra – Sem vínculo</option>
                                    <option value="Seleção (Convocado)">Seleção (Convocado)</option>
                                    <option value="Outros">Outros</option>
                                </select>
                                <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-600">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Local de trabalho</label>
                            <input type="text" id="local_trabalho" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="Ex.: Sede - Boa Vista">
                        </div>
                    </div>

                    <!-- Row 3 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">E-mail</label>
                            <input type="email" id="email" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none placeholder-gray-400" placeholder="seuemail@dominio.pe.gov.br">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Tipo de serviço</label>
                            <div class="relative">
                                <select id="servico" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-gray-600 appearance-none">
                                    <option value="">Selecione...</option>
                                    <option value="Aposentadoria">Aposentadoria</option>
                                    <option value="Atendimento Geral">Atendimento Geral</option>
                                    <option value="Seleção Pública Simplificada">Seleção Pública Simplificada</option>
                                    <option value="Certidão">Certidão</option>
                                    <option value="Licença">Licença</option>
                                    <option value="Pagamento">Pagamento</option>
                                    <option value="Plantão Extraordinário">Plantão Extraordinário</option>
                                </select>
                                <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-600">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Tipo de atendimento</label>
                            <div class="relative">
                                <select id="tipo_atendimento" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-gray-600 appearance-none">
                                    <option value="">Selecione...</option>
                                    <option value="Presencial">Presencial</option>
                                    <option value="Whatsapp">Whatsapp</option>
                                    <option value="E-mail">E-mail</option>
                                    <option value="Telefônico">Telefônico</option>
                                    <option value="Online">Online</option>
                                </select>
                                <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-600">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Row 4 -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Nível de Atendimento</label>
                            <div class="relative">
                                <select id="prioridade" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white text-gray-600 appearance-none">
                                    <option value="Normal">Normal</option>
                                    <option value="Preferencial">Preferencial</option>
                                </select>
                                <div class="pointer-events-none absolute right-4 top-1/2 -translate-y-1/2 text-gray-700">
                                    <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Data do agendamento</label>
                            <input type="date" id="data" class="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-gray-600">
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-semibold text-gray-700">Hora de inicio</label>
                            <div class="relative" id="horaContainer">
                                <div class="flex items-center border border-gray-300 rounded-lg overflow-hidden focus-within:ring-2 focus-within:ring-blue-500 bg-white">
                                    <input type="text" id="hora" placeholder="00:00" maxlength="5" autocomplete="off"
                                        class="flex-1 p-2.5 outline-none text-gray-600 border-none">
                                    <div id="horaChevron" class="pr-4 pl-1 flex items-center justify-center text-gray-600 cursor-pointer hover:text-gray-900 transition-colors">
                                        <i data-lucide="chevron-down" class="w-4 h-4"></i>
                                    </div>
                                </div>
                                <!-- Custom Dropdown List - Positioned Above -->
                                <div id="horaCustomList" class="hidden absolute left-0 right-0 bottom-full mb-1 bg-white border border-gray-200 rounded-lg shadow-xl z-[100] max-h-60 overflow-y-auto animate-fade-in custom-scrollbar">
                                    <!-- Options populated via JS -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Buttons -->
                    <div class="pt-8 flex flex-col md:flex-row justify-between items-center gap-4">
                        <button type="submit" class="w-full md:w-auto px-12 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-bold shadow-lg hover:shadow-blue-200 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="check" class="w-5 h-5"></i>
                            Confirmar Agendamento
                        </button>

                        <button type="button" id="clearBtn" class="w-full md:w-auto px-6 py-2.5 border border-gray-300 text-gray-600 rounded-lg font-medium hover:bg-gray-50 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="trash-2" class="w-5 h-5"></i>
                            Limpar Campos
                        </button>
                    </div>
                </form>
            </div>

            <!-- Modal Seleção de Vínculo -->
            <div id="modalVinculos" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center p-4">
                <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg overflow-hidden animate-fade-in">
                    <div class="bg-blue-600 p-4 flex items-center gap-3">
                        <i data-lucide="layers" class="w-6 h-6 text-white"></i>
                        <h3 class="text-white font-bold text-lg">Selecione o Vínculo</h3>
                    </div>
                    <div class="p-6">
                        <p class="text-gray-600 mb-4">Encontramos mais de um vínculo para este CPF. Escolha qual deseja utilizar:</p>
                        <div id="listaVinculos" class="space-y-3 max-h-60 overflow-y-auto pr-2 custom-scrollbar">
                            <!-- Vínculos injetados via JS -->
                        </div>
                    </div>
                    <div class="bg-gray-50 p-4 flex justify-end">
                        <button type="button" onclick="fecharModalVinculos()" class="bg-white border border-gray-300 text-gray-700 px-6 py-2 rounded-lg font-bold hover:bg-gray-50 transition-colors">
                            Cancelar
                        </button>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        // Logic
        const form = document.getElementById('agendamentoForm');
        const dataInput = document.getElementById('data');
        const horaSelect = document.getElementById('hora');
        const cpfInput = document.getElementById('cpf');
        const clearBtn = document.getElementById('clearBtn');
        const modalVinculos = document.getElementById('modalVinculos');
        const listaVinculos = document.getElementById('listaVinculos');
        
        // State for search results
        let searchResults = [];
        let isSearching = false;

        // CPF Mask
        cpfInput.addEventListener('input', (e) => {
            e.target.value = window.SAS.utils.formatCPF(e.target.value);
        });

        const preencherForm = (dados) => {
            if (!dados) return;
            document.getElementById('nome').value = dados.nome_completo || '';
            document.getElementById('matricula').value = dados.matricula || '';
            document.getElementById('cargo').value = dados.cargo || '';
            document.getElementById('email').value = dados.email || '';
            document.getElementById('local_trabalho').value = dados.local_trabalho || '';
            
            const vinculoSelect = document.getElementById('vinculo');
            // Try to match the incoming vinculo string with select options
            const val = (dados.vinculo || '').toUpperCase();
            
            if (val === 'EST') vinculoSelect.value = 'Estatutário';
            else if (val === 'EXQ') vinculoSelect.value = 'Extraquadro';
            else if (val === 'CTD') vinculoSelect.value = 'CTD (Contrato)';
            else {
                const options = Array.from(vinculoSelect.options).map(o => o.value);
                if (options.includes(dados.vinculo)) {
                    vinculoSelect.value = dados.vinculo;
                } else if (dados.vinculo) {
                    if (dados.vinculo.toLowerCase().includes('contrato')) vinculoSelect.value = 'CTD (Contrato)';
                    else if (dados.vinculo.toLowerCase().includes('concurso')) vinculoSelect.value = 'Concurso (Nomeado)';
                    else if (dados.vinculo.toLowerCase().includes('estatut')) vinculoSelect.value = 'Estatutário';
                    else if (dados.vinculo.toLowerCase().includes('extraquadro')) vinculoSelect.value = 'Extraquadro';
                }
            }
        };

        window.selecionarVinculo = async (index) => {
            const dados = searchResults[index];
            preencherForm(dados);
            fecharModalVinculos();
            window.SAS.utils.notify('success', 'Dados preenchidos com sucesso!');
            await buscarAgendamentosFuturos(dados.cpf, dados.matricula);
        };

        window.fecharModalVinculos = () => {
            modalVinculos.classList.add('hidden');
        };

        const buscarAgendamentosFuturos = async (cpf, matricula) => {
            try {
                const today = new Date().toISOString().split('T')[0];
                const queryParam = cpf ? `cpf=${encodeURIComponent(cpf)}` : `matricula=${encodeURIComponent(matricula)}`;
                const res = await fetch(`/api/agendamentos?${queryParam}`);
                if (res.ok) {
                    const appointments = await res.json();
                    const futureAppt = appointments.find(a => 
                        a.data_agendamento >= today && 
                        ['agendado', 'chegou', 'pendente', 'em_andamento'].includes(a.status)
                    );

                    if (futureAppt) {
                        const dateFmt = new Date(futureAppt.data_agendamento + 'T12:00:00').toLocaleDateString('pt-BR');
                        const timeFmt = futureAppt.hora_inicio ? futureAppt.hora_inicio.substring(0, 5) : '--:--';
                        const detailMsg = `Este servidor já possui um agendamento ativo:<br><br>
                                          <b>Data:</b> ${dateFmt}<br>
                                          <b>Horário:</b> ${timeFmt}<br>
                                          <b>Serviço:</b> ${futureAppt.tipo_servico}<br><br>
                                          Deseja realizar um novo agendamento mesmo assim?`;

                        // Since agendamento.html is internal, we just warn. 
                        // If they say no, should we clear? Usually not, they just might want to know.
                        window.SAS.utils.modal.confirm('Agendamento Já Existente', detailMsg, () => {
                            // Proceed (do nothing, just close modal)
                        }, 'warning');
                    }
                }
            } catch (err) {
                console.error('Error checking future appointments:', err);
            }
        };

        const buscarServidor = async () => {
            const valor = cpfInput.value.replace(/\D/g, '');
            if (valor.length < 5 || isSearching) return; 

            isSearching = true;
            try {
                const res = await fetch(`/api/identificacao/validar?valor=${encodeURIComponent(valor)}`);
                if (res.status === 404) {
                    window.SAS.utils.notify('warning', 'Servidor não encontrado no banco de dados. Você pode preencher os dados manualmente.');
                    return;
                }
                
                const data = await res.json();
                if (data.success && data.data) {
                    const results = Array.isArray(data.data) ? data.data : [data.data];
                    searchResults = results;

                    if (results.length === 1) {
                        preencherForm(results[0]);
                        window.SAS.utils.notify('success', 'Dados carregados automaticamente!');
                        // Check for future appointments
                        await buscarAgendamentosFuturos(results[0].cpf, results[0].matricula);
                    } else if (results.length > 1) {
                        // Modal selection will handle preencherForm which should check future appts too
                        listaVinculos.innerHTML = '';
                        results.forEach((item, index) => {
                            const div = document.createElement('div');
                            div.className = 'p-4 bg-blue-50 border border-blue-100 rounded-xl hover:bg-blue-100 transition-colors cursor-pointer group flex justify-between items-center';
                            div.onclick = () => selecionarVinculo(index);
                            div.innerHTML = `
                                <div>
                                    <p class="font-bold text-blue-900 group-hover:text-blue-700">${item.cargo || 'Cargo não informado'}</p>
                                    <p class="text-sm text-blue-600">Matrícula: ${item.matricula || '-'} | Vínculo: ${item.vinculo || '-'}</p>
                                </div>
                                <i data-lucide="chevron-right" class="w-5 h-5 text-blue-400"></i>
                            `;
                            listaVinculos.appendChild(div);
                        });
                        lucide.createIcons();
                        modalVinculos.classList.remove('hidden');
                    }
                }
            } catch (err) {
                console.error('Error fetching server data:', err);
            } finally {
                isSearching = false;
            }
        };

        cpfInput.addEventListener('blur', buscarServidor);

        // Prevent Enter from submitting the form in fields
        form.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && e.target.tagName === 'INPUT') {
                e.preventDefault();
                if (e.target.id === 'cpf') {
                    buscarServidor();
                }
            }
        });

        // Date Logic
        const today = new Date().toISOString().split('T')[0];
        dataInput.min = today;

        const populateSlots = (filterTerm = '') => {
            const list = document.getElementById('horaCustomList');
            if (!list) return;
            list.innerHTML = '';
            
            const startTime = 8 * 60; // 08:00
            const endTime = 16 * 60 + 45; // 16:45

            let hasMatches = false;
            for (let time = startTime; time <= endTime; time += 15) {
                const hours = Math.floor(time / 60);
                const minutes = time % 60;
                const timeString = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}`;

                if (filterTerm && !timeString.includes(filterTerm)) continue;

                hasMatches = true;
                const item = document.createElement('div');
                item.className = 'px-4 py-2.5 hover:bg-blue-600 hover:text-white cursor-pointer transition-colors text-sm text-gray-700';
                item.textContent = timeString;
                item.onclick = (e) => {
                    e.stopPropagation();
                    horaSelect.value = timeString;
                    toggleHoraList(false);
                };
                list.appendChild(item);
            }

            if (!hasMatches && filterTerm) {
                const item = document.createElement('div');
                item.className = 'px-4 py-2.5 text-sm text-gray-500 italic';
                item.textContent = 'Nenhum horário sugerido';
                list.appendChild(item);
            }
        };

        const updateTimeSlots = (showAlert = false) => {
            const dateValue = dataInput.value;

            // Only validate if date is complete (YYYY-MM-DD has 10 chars)
            if (!dateValue || dateValue.length < 10) {
                populateSlots();
                return;
            }

            const [year, month, day] = dateValue.split('-').map(Number);
            
            const todayObj = new Date();
            const isToday = year === todayObj.getFullYear() && (month - 1) === todayObj.getMonth() && day === todayObj.getDate();

            const date = new Date(year, month - 1, day);
            if (isNaN(date.getTime())) {
                populateSlots();
                return;
            }

            const dayOfWeek = date.getDay();

            if (!isToday && (dayOfWeek === 0 || dayOfWeek === 6)) {
                if (showAlert) {
                    window.SAS.utils.modal.alert('Dia Não Útil', 'Agendamentos não podem ser realizados aos finais de semana ou feriados.', 'info');
                    dataInput.value = '';
                    horaSelect.value = '';
                }
                return;
            }

            populateSlots();
        };

        // Use change and blur for final validation (with alert)
        dataInput.addEventListener('change', () => updateTimeSlots(true));
        dataInput.addEventListener('blur', () => updateTimeSlots(true));
        
        // Input only for immediate slot updates (no intrusive alerts)
        dataInput.addEventListener('input', (e) => {
            if (e.target.value.length === 10) {
                updateTimeSlots(false);
            }
            if (window.lucide) window.lucide.createIcons();
        });

        // Custom Dropdown Logic
        const horaCustomList = document.getElementById('horaCustomList');
        const horaChevron = document.getElementById('horaChevron');

        const toggleHoraList = (show) => {
            if (show) {
                populateSlots();
                horaCustomList.classList.remove('hidden');
            } else {
                horaCustomList.classList.add('hidden');
            }
        };

        horaSelect.addEventListener('focus', () => toggleHoraList(true));
        horaChevron.addEventListener('click', (e) => {
            e.stopPropagation();
            const isHidden = horaCustomList.classList.contains('hidden');
            toggleHoraList(isHidden);
        });

        document.addEventListener('click', (e) => {
            const container = document.getElementById('horaContainer');
            if (container && !container.contains(e.target)) {
                toggleHoraList(false);
            }
        });

        // Time Input Mask and Filtering
        horaSelect.addEventListener('input', (e) => {
            let val = e.target.value.replace(/\D/g, '');
            if (val.length > 4) val = val.substring(0, 4);
            if (val.length > 2) {
                val = val.substring(0, 2) + ':' + val.substring(2);
            }
            e.target.value = val;
            
            // Re-filter list based on what user typed
            populateSlots(e.target.value);
            // Show list if it was hidden
            if (val.length > 0) {
                horaCustomList.classList.remove('hidden');
            }
        });

        updateTimeSlots(false);


        clearBtn.addEventListener('click', () => {
            window.SAS.utils.modal.confirm('Limpar Campos', 'Deseja limpar todos os campos?', () => {
                form.reset();
                updateTimeSlots();
            });
        });



        form.addEventListener('submit', async (e) => {
            e.preventDefault();


            const payload = {
                nome_completo: document.getElementById('nome').value,
                cpf: document.getElementById('cpf').value,
                matricula: document.getElementById('matricula').value,
                cargo: document.getElementById('cargo').value,
                vinculo: document.getElementById('vinculo').value,
                local_trabalho: document.getElementById('local_trabalho').value,
                email: document.getElementById('email').value,
                tipo_servico: document.getElementById('servico').value,
                tipo_atendimento: document.getElementById('tipo_atendimento').value,
                prioridade: document.getElementById('prioridade').value,
                data_agendamento: document.getElementById('data').value,
                hora_inicio: document.getElementById('hora').value || null,
                status: 'agendado',
                created_by: user.id
            };

            if (payload.hora_inicio) {
                const now = new Date();
                const [year, month, day] = payload.data_agendamento.split('-').map(Number);
                const [hours, minutes] = payload.hora_inicio.split(':').map(Number);
                const selectedDate = new Date(year, month - 1, day, hours, minutes);

            if (selectedDate < now) {
                    window.SAS.utils.modal.alert('Horário Inválido', 'Não é possível realizar agendamentos para horários que já passaram.', 'danger');
                    return;
                }
            }

            // Validation before submit
            if (!payload.data_agendamento || !payload.tipo_servico) {
                window.SAS.utils.notify('warning', 'Por favor, informe ao menos a Data e o Tipo de Serviço para realizar o agendamento.');
                return;
            }

            const submitAppointment = async (data) => {
                try {
                    await window.SAS.base44.entities.Agendamento.create(data);
                    window.SAS.utils.modal.alert('Sucesso', 'Agendamento feito com sucesso!', 'info');
                    form.reset();
                    updateTimeSlots();
                } catch (err) {
                    console.error('Submit Error:', err);
                    const errorData = err.data || {};
                    const errorMessage = err.message || '';

                    if (errorData.code === 'DUPLICATE_APPOINTMENT' || errorMessage.includes('Duplicate appointment')) {
                        const d = errorData.details || {}; const dateFormatted = d.data ? new Date(d.data + "T12:00:00").toLocaleDateString("pt-BR") : "Data desconhecida"; const detailMsg = `Este servidor já possui um agendamento ativo:<br><br><b>Data:</b> ${dateFormatted}<br><b>Horário:</b> ${d.hora || "--:--"}<br><b>Serviço:</b> ${d.tipo_servico || "-"}<br><b>Atendente:</b> ${d.atendente || "-"}<br><br>Deseja realizar este novo agendamento mesmo assim?`; window.SAS.utils.modal.confirm("Agendamento Já Existente", detailMsg, async () => {
                            data.force_duplicate = true; await submitAppointment(data); }, "warning");
                    } else if (errorData.code === 'SLOT_CONFLICT' || errorMessage.includes('Slot conflict')) {
                        window.SAS.utils.modal.alert('Horário Ocupado', 'Este horário já está ocupado. Por favor, escolha outro horário.', 'danger');
                    } else {
                        window.SAS.utils.modal.alert('Erro', 'Erro ao realizar agendamento: ' + errorMessage, 'danger');
                    }
                }
            };

            await submitAppointment(payload);
        });
    </script>
</body>

</html>
