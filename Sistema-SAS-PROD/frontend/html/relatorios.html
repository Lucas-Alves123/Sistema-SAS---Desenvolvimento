<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>

<body>
    <div id="app"></div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ai_assistant.js"></script>
    <script src="js/layout.js"></script>

    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Relatórios');

        const content = document.getElementById('page-content');

        content.innerHTML = `
            <div class="flex flex-col items-center gap-2 mb-8 animate-fade-in">
                <div class="flex items-center gap-3">
                    <i data-lucide="file-text" class="w-8 h-8 text-blue-700"></i>
                    <h1 class="text-3xl font-bold text-blue-700">Relatórios e Gráficos</h1>
                </div>
                <!-- Decorative Line (Pernambuco Colors) -->
                <div class="flex justify-center items-center">
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>
            </div>

            <div class="max-w-6xl mx-auto">
                <!-- Tabs -->
                <div class="flex gap-4 mb-6 border-b border-gray-200">
                    <button id="tabCharts" class="px-6 py-3 font-bold text-blue-600 border-b-2 border-blue-600 transition-colors">
                        Gráficos
                    </button>
                    <button id="tabDetailed" class="px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors">
                        Relatório Detalhado
                    </button>
                    <button id="tabEvaluations" class="px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors">
                        Avaliações de Satisfação
                    </button>
                </div>

                <!-- Charts View -->
                <div id="viewCharts" class="bg-white rounded-xl shadow-lg border border-slate-100 p-6 animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                        <!-- Controls -->
                        <div class="space-y-4">
                            <div class="space-y-2">
                                <label class="text-blue-700 font-medium">Tipo de Visualização</label>
                                <select id="chartType" class="w-full border p-2 rounded">
                                    <option value="bar">Barras</option>
                                    <option value="pie">Pizza</option>
                                    <option value="doughnut">Rosca</option>
                                    <option value="line">Linha</option>
                                </select>
                            </div>

                            <div class="space-y-2">
                                <label class="text-blue-700 font-medium">Métrica</label>
                                <select id="metricType" class="w-full border p-2 rounded">
                                    <option value="status">Por Status</option>
                                    <option value="service">Por Serviço</option>
                                    <option value="attendant">Por Atendente</option>
                                </select>
                            </div>

                            <button id="generateBtn" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-bold transition-colors">
                                Gerar Gráfico
                            </button>
                        </div>

                        <!-- Chart Area -->
                        <div class="flex items-center justify-center bg-slate-50 rounded-lg p-4 border border-slate-200 min-h-[300px]">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
                </div>

                <!-- Detailed Report View -->
                <div id="viewDetailed" class="bg-white rounded-xl shadow-lg border border-slate-100 p-6 hidden animate-fade-in">
                    <!-- Filters -->
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6 bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">Data Início</label>
                            <input type="date" id="filterStartDate" class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">Data Fim</label>
                            <input type="date" id="filterEndDate" class="w-full border rounded p-2 text-sm">
                        </div>
                        <div>
                            <label class="block text-sm font-bold text-gray-600 mb-1">Atendente</label>
                            <select id="filterAttendant" class="w-full border rounded p-2 text-sm">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="flex items-end gap-2">
                            <button id="filterBtn" class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded font-bold transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="filter" class="w-4 h-4"></i> Filtrar
                            </button>
                            <button id="exportDetailedBtn" class="flex-1 border-2 border-blue-600 text-blue-600 hover:bg-blue-50 py-1.5 rounded font-bold transition-colors flex items-center justify-center gap-2">
                                <i data-lucide="download" class="w-4 h-4"></i> Exportar
                            </button>
                        </div>
                    </div>

                    <!-- Table -->
                    <div class="overflow-x-auto">
                        <table class="w-full text-sm text-left border-collapse">
                            <thead class="bg-slate-100 text-slate-700 font-bold border-b border-slate-300">
                                <tr>
                                    <th class="px-3 py-3 border-r border-slate-200">Data/Hora</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Nome</th>
                                    <th class="px-3 py-3 border-r border-slate-200">CPF</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Matrícula</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Cargo</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Tipo de Vínculo</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Local</th>
                                    <th class="px-3 py-3 border-r border-slate-200">E-mail</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Serviço</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Atendimento</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Nível de Atendimento</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Status</th>
                                    <th class="px-3 py-3 border-r border-slate-200">Obs 1 (Prob)</th>
                                    <th class="px-3 py-3">Obs 2 (Sol)</th>
                                </tr>
                            </thead>
                            <tbody id="reportTableBody" class="divide-y divide-slate-200">
                                <!-- Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <!-- Evaluations View -->
                <div id="viewEvaluations" class="bg-white rounded-xl shadow-lg border border-slate-100 p-6 hidden animate-fade-in">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 text-center">
                            <div class="text-3xl font-bold text-blue-700" id="avgTotal">-</div>
                            <div class="text-sm font-medium text-blue-600">Média Geral</div>
                        </div>
                        <div class="bg-green-50 p-4 rounded-xl border border-green-100 text-center">
                            <div class="text-3xl font-bold text-green-700" id="totalEvals">0</div>
                            <div class="text-sm font-medium text-green-600">Total de Avaliações</div>
                        </div>
                        <div class="bg-yellow-50 p-4 rounded-xl border border-yellow-100 text-center">
                            <div class="text-3xl font-bold text-yellow-700" id="avgService">-</div>
                            <div class="text-sm font-medium text-yellow-600">Satisfação Atendimento</div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">
                            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                                <i data-lucide="bar-chart-3" class="w-5 h-5"></i> Média por Categoria
                            </h3>
                            <canvas id="evalChart"></canvas>
                        </div>
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-200 overflow-y-auto max-h-[400px]">
                            <h3 class="font-bold text-gray-700 mb-4 flex items-center gap-2">
                                <i data-lucide="message-square" class="w-5 h-5"></i> Comentários Recentes
                            </h3>
                            <div id="evalComments" class="space-y-3">
                                <p class="text-gray-400 italic text-center py-4">Carregando comentários...</p>
                            </div>
                        </div>
                    </div>

                    <div class="overflow-x-auto border rounded-lg">
                        <table class="w-full text-sm text-center">
                            <thead class="bg-slate-100 border-b">
                                <tr>
                                    <th class="px-4 py-3">Data</th>
                                    <th class="px-4 py-3">Servidor</th>
                                    <th class="px-4 py-3">Espera</th>
                                    <th class="px-4 py-3">Atendimento</th>
                                    <th class="px-4 py-3">Estrutura</th>
                                    <th class="px-4 py-3">Limpeza</th>
                                    <th class="px-4 py-3">Resolução</th>
                                </tr>
                            </thead>
                            <tbody id="evalTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        // Logic
        const generateBtn = document.getElementById('generateBtn');
        const chartTypeSelect = document.getElementById('chartType');
        const metricTypeSelect = document.getElementById('metricType');
        let myChart = null;

        // Tabs Logic
        const tabCharts = document.getElementById('tabCharts');
        const tabDetailed = document.getElementById('tabDetailed');
        const viewCharts = document.getElementById('viewCharts');
        const viewDetailed = document.getElementById('viewDetailed');

        tabCharts.addEventListener('click', () => {
            tabCharts.className = 'px-6 py-3 font-bold text-blue-600 border-b-2 border-blue-600 transition-colors';
            tabDetailed.className = 'px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors';
            viewCharts.classList.remove('hidden');
            viewDetailed.classList.add('hidden');
        });

        tabDetailed.addEventListener('click', () => {
            tabDetailed.className = 'px-6 py-3 font-bold text-blue-600 border-b-2 border-blue-600 transition-colors';
            tabCharts.className = 'px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors';
            tabEvaluations.className = 'px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors';
            viewDetailed.classList.remove('hidden');
            viewCharts.classList.add('hidden');
            viewEvaluations.classList.add('hidden');
            loadReportTable(); // Load data when tab is opened
        });

        const tabEvaluations = document.getElementById('tabEvaluations');
        const viewEvaluations = document.getElementById('viewEvaluations');

        tabEvaluations.addEventListener('click', () => {
            tabEvaluations.className = 'px-6 py-3 font-bold text-blue-600 border-b-2 border-blue-600 transition-colors';
            tabCharts.className = 'px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors';
            tabDetailed.className = 'px-6 py-3 font-medium text-gray-500 hover:text-blue-600 transition-colors';
            viewEvaluations.classList.remove('hidden');
            viewCharts.classList.add('hidden');
            viewDetailed.classList.add('hidden');
            loadEvaluations();
        });

        // Chart Logic
        generateBtn.addEventListener('click', async () => {
            const chartType = chartTypeSelect.value;
            const metric = metricTypeSelect.value;

            const data = await window.SAS.base44.entities.Agendamento.list();

            let labels = [];
            let values = [];
            let backgroundColors = [
                '#3b82f6', '#ef4444', '#eab308', '#22c55e', '#a855f7', '#ec4899', '#6366f1'
            ];

            if (metric === 'status') {
                const counts = {};
                data.forEach(d => {
                    const s = d.status.replace('_', ' ').toUpperCase();
                    counts[s] = (counts[s] || 0) + 1;
                });
                labels = Object.keys(counts);
                values = Object.values(counts);
            } else if (metric === 'service') {
                const counts = {};
                data.forEach(d => {
                    const s = d.tipo_servico;
                    counts[s] = (counts[s] || 0) + 1;
                });
                labels = Object.keys(counts);
                values = Object.values(counts);
            } else if (metric === 'attendant') {
                const counts = {};
                data.forEach(d => {
                    const s = d.atendente_nome || 'Não Atribuído';
                    counts[s] = (counts[s] || 0) + 1;
                });
                labels = Object.keys(counts);
                values = Object.values(counts);
            }

            if (myChart) {
                myChart.destroy();
            }

            const ctx = document.getElementById('myChart').getContext('2d');
            myChart = new Chart(ctx, {
                type: chartType,
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Quantidade',
                        data: values,
                        backgroundColor: backgroundColors.slice(0, labels.length),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: {
                            position: 'bottom',
                        }
                    }
                }
            });
        });

        // Report Logic
        const filterStartDate = document.getElementById('filterStartDate');
        const filterEndDate = document.getElementById('filterEndDate');
        const filterAttendant = document.getElementById('filterAttendant');
        const filterBtn = document.getElementById('filterBtn');
        const reportTableBody = document.getElementById('reportTableBody');

        // Populate Attendant Filter
        (async () => {
            const users = await window.SAS.base44.entities.SystemUser.list();
            users.forEach(u => {
                const option = document.createElement('option');
                option.value = u.id;
                option.textContent = u.usuario;
                filterAttendant.appendChild(option);
            });
        })();

        const loadReportTable = async () => {
            let data = await window.SAS.base44.entities.Agendamento.list('-created_date');

            // Filter only Completed or Cancelled
            data = data.filter(d => d.status === 'concluido' || d.status === 'cancelado' || d.status === 'nao_compareceu');

            // Apply Filters
            const start = filterStartDate.value;
            const end = filterEndDate.value;
            const attendant = filterAttendant.value;

            if (start) {
                data = data.filter(d => d.data_agendamento >= start);
            }
            if (end) {
                data = data.filter(d => d.data_agendamento <= end);
            }
            if (attendant) {
                data = data.filter(d => d.atendente_id == attendant);
            }

            reportTableBody.innerHTML = '';

            if (data.length === 0) {
                reportTableBody.innerHTML = '<tr><td colspan="7" class="px-4 py-8 text-center text-gray-500">Nenhum registro encontrado para os filtros selecionados.</td></tr>';
                return;
            }

            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.className = 'hover:bg-slate-50 transition-colors text-xs text-center';

                let statusColor = 'text-gray-600';
                if (item.status === 'concluido') statusColor = 'text-green-600 font-bold';
                else if (item.status === 'cancelado' || item.status === 'nao_compareceu' || item.status === 'cancelado_pelo_servidor') statusColor = 'text-red-600 font-bold';
                else if (item.status === 'em_atendimento') statusColor = 'text-blue-600 font-bold';

                tr.innerHTML = `
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600 whitespace-nowrap">${window.SAS.utils.formatDate(item.data_agendamento)} ${item.hora_inicio ? item.hora_inicio.substring(0, 5) : ''}</td>
                    <td class="px-2 py-3 border-r border-slate-100 font-medium text-gray-800">${item.nome_completo || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${window.SAS.utils.formatCPF(item.cpf || '') || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.matricula || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.cargo || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600 capitalize">${item.vinculo || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.local_trabalho || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.email || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.tipo_servico || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600 capitalize">${item.tipo_atendimento || '-'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-600">${item.prioridade || 'Normal'}</td>
                    <td class="px-2 py-3 border-r border-slate-100 ${statusColor} capitalize">${item.status.replace(/_/g, ' ')}</td>
                    <td class="px-2 py-3 border-r border-slate-100 text-gray-500 text-[10px] italic min-w-[250px] whitespace-normal text-left">${item.observacao_problema || '-'}</td>
                    <td class="px-2 py-3 text-gray-500 text-[10px] italic min-w-[250px] whitespace-normal text-left">${item.observacao_solucao || '-'}</td>
                `;
                reportTableBody.appendChild(tr);
            });
        };

        const exportDetailedBtn = document.getElementById('exportDetailedBtn');
        exportDetailedBtn.addEventListener('click', async () => {
            try {
                let data = await window.SAS.base44.entities.Agendamento.list('-created_date');

                // Apply same filters as table
                const start = filterStartDate.value;
                const end = filterEndDate.value;
                const attendant = filterAttendant.value;

                if (start) data = data.filter(d => d.data_agendamento >= start);
                if (end) data = data.filter(d => d.data_agendamento <= end);
                if (attendant) data = data.filter(d => d.atendente_id == attendant);

                if (data.length === 0) {
                    window.SAS.utils.modal.alert('Exportar', 'Não há dados para exportar com estes filtros.', 'info');
                    return;
                }

                const dataToExport = data.map(a => ({
                    'Data/Hora': `${window.SAS.utils.formatDate(a.data_agendamento)} ${a.hora_inicio || ''}`,
                    'Nome Completo': a.nome_completo,
                    'CPF': a.cpf,
                    'Matrícula': a.matricula,
                    'Cargo': a.cargo,
                    'Tipo de Vínculo': a.vinculo,
                    'Local de Trabalho': a.local_trabalho,
                    'E-mail': a.email,
                    'Serviço': a.tipo_servico,
                    'Atendimento': a.tipo_atendimento,
                    'Nível de Atendimento': a.prioridade,
                    'Status': a.status.replace(/_/g, ' ').toUpperCase(),
                    'Obsservação 1 - Problema': a.observacao_problema,
                    'Observação 2 - Solução': a.observacao_solucao
                }));

                const ws = XLSX.utils.json_to_sheet(dataToExport);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Relatorio_Detalhado");
                XLSX.writeFile(wb, "Relatorio_SAS.xlsx");

            } catch (err) {
                console.error(err);
                window.SAS.utils.modal.alert('Erro', 'Erro ao exportar dados: ' + err.message, 'danger');
            }
        });

        filterBtn.addEventListener('click', loadReportTable);

        // Evaluations Logic
        let evalChart = null;

        async function loadEvaluations() {
            try {
                const data = await window.SAS.base44.entities.Avaliacao.list();

                document.getElementById('totalEvals').textContent = data.length;

                if (data.length === 0) {
                    document.getElementById('evalComments').innerHTML = '<p class="text-gray-400 italic text-center py-4">Nenhuma avaliação recebida ainda.</p>';
                    return;
                }

                // Calculate Averages
                const sum = (arr) => arr.reduce((a, b) => a + b, 0);
                const avg = (arr) => (arr.length ? (sum(arr) / arr.length).toFixed(1) : 0);

                const esperas = data.map(d => d.tempo_espera);
                const atendimentos = data.map(d => d.atendimento);
                const estruturas = data.map(d => d.estrutura_fisica);
                const limpezas = data.map(d => d.limpeza);
                const resolucoes = data.map(d => d.resolucao_problema);

                const generalAvg = avg([...esperas, ...atendimentos, ...estruturas, ...limpezas, ...resolucoes]);
                document.getElementById('avgTotal').textContent = generalAvg;
                document.getElementById('avgService').textContent = avg(atendimentos);

                // Render Chart
                if (evalChart) evalChart.destroy();
                const ctx = document.getElementById('evalChart').getContext('2d');
                evalChart = new Chart(ctx, {
                    type: 'radar',
                    data: {
                        labels: ['Espera', 'Atendimento', 'Estrutura', 'Limpeza', 'Resolução'],
                        datasets: [{
                            label: 'Média de Notas',
                            data: [avg(esperas), avg(atendimentos), avg(estruturas), avg(limpezas), avg(resolucoes)],
                            backgroundColor: 'rgba(59, 130, 246, 0.2)',
                            borderColor: 'rgba(59, 130, 246, 1)',
                            pointBackgroundColor: 'rgba(59, 130, 246, 1)',
                            borderWidth: 2
                        }]
                    },
                    options: {
                        scales: {
                            r: {
                                beginAtZero: true,
                                max: 5,
                                ticks: { stepSize: 1 }
                            }
                        }
                    }
                });

                // Render Comments
                const commentsContainer = document.getElementById('evalComments');
                commentsContainer.innerHTML = '';
                data.filter(d => d.comentarios).slice(0, 5).forEach(d => {
                    const div = document.createElement('div');
                    div.className = 'bg-white p-3 rounded-lg border border-slate-200 shadow-sm';
                    div.innerHTML = `
                        <div class="flex justify-between items-center mb-1">
                            <span class="font-bold text-xs text-blue-800">${d.nome_completo || 'Anônimo'}</span>
                            <span class="text-[10px] text-gray-400">${window.SAS.utils.formatDate(d.created_at)}</span>
                        </div>
                        <p class="text-xs text-gray-600 italic">"${d.comentarios}"</p>
                    `;
                    commentsContainer.appendChild(div);
                });

                // Render Table
                const tableBody = document.getElementById('evalTableBody');
                tableBody.innerHTML = '';
                data.forEach(d => {
                    const tr = document.createElement('tr');
                    tr.className = 'border-b hover:bg-slate-50 transition-colors';
                    tr.innerHTML = `
                        <td class="px-4 py-3 text-xs text-gray-500">${window.SAS.utils.formatDate(d.created_at)}</td>
                        <td class="px-4 py-3 text-xs font-medium">${d.nome_completo || '-'}</td>
                        <td class="px-4 py-3 text-xs font-bold text-blue-600 text-center">${d.tempo_espera}</td>
                        <td class="px-4 py-3 text-xs font-bold text-blue-600 text-center">${d.atendimento}</td>
                        <td class="px-4 py-3 text-xs font-bold text-blue-600 text-center">${d.estrutura_fisica}</td>
                        <td class="px-4 py-3 text-xs font-bold text-blue-600 text-center">${d.limpeza}</td>
                        <td class="px-4 py-3 text-xs font-bold text-blue-600 text-center">${d.resolucao_problema}</td>
                    `;
                    tableBody.appendChild(tr);
                });
                lucide.createIcons();

            } catch (err) {
                console.error('Error loading evaluations:', err);
            }
        }

        // Generate initial chart
        generateBtn.click();
    </script>
</body>

</html>
