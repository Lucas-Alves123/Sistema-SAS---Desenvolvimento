<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sonner@1.4.0/dist/sonner.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/pdf_generator.js?v=1.1"></script>
</head>

<body>
    <div id="app"></div>
    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ai_assistant.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Atendimento');
        const content = document.getElementById('page-content');
        let currentGuiche = localStorage.getItem('sas_guiche') || '1';
        let currentQueueTab = 'Presencial';

        content.innerHTML = `
            <div class="flex flex-col items-center justify-center mb-6 animate-fade-in">
                <div class="flex items-center gap-3 mb-2">
                    <i data-lucide="headset" class="w-8 h-8 text-blue-700"></i>
                    <h1 class="text-3xl font-bold text-blue-700">Atendimentos</h1>
                </div>
                <div class="flex justify-center items-center">
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>
            </div>

            <div class="flex justify-center items-center gap-4 mb-6">
                <div class="bg-blue-800 text-white px-8 py-2 rounded-lg font-bold text-xl shadow-lg">
                    Guichê <span id="guicheDisplay">${currentGuiche}</span>
                </div>
                <button id="alterarGuicheBtn" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-50 transition-colors flex items-center gap-2 shadow-sm">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Alterar
                </button>
                <button id="statusToggleBtn" class="bg-green-100 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-bold hover:bg-green-200 transition-all flex items-center gap-2 shadow-sm">
                    <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                    <span>Online</span>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto mb-8">
                <div class="bg-blue-50 border-2 border-blue-400 rounded-xl p-6 text-center shadow-sm">
                    <div class="text-4xl font-bold text-blue-800 mb-1" id="totalAgendados">0</div>
                    <div class="text-blue-600 font-medium">Agendados para hoje</div>
                </div>
                <div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-6 text-center shadow-sm">
                    <div class="text-4xl font-bold text-yellow-800 mb-1" id="totalAguardando">0</div>
                    <div class="text-yellow-600 font-medium">Pessoas aguardando</div>
                </div>
            </div>

            <div id="mainArea" class="max-w-5xl mx-auto space-y-8">
                <div id="activeCallSection" class="hidden"></div>

                <!-- Nova Seção de Download do Último Atendimento -->
                <div id="lastServiceSection" class="hidden animate-fade-in">
                    <div class="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="bg-emerald-100 p-3 rounded-full text-emerald-600">
                                <i data-lucide="check-circle" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="text-emerald-800 font-bold text-lg" id="lastServiceName">NOME DO SERVIDOR</div>
                                <div class="text-emerald-600 text-sm">Atendimento concluído! Baixe os documentos se desejar:</div>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button id="lastBtnReq" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-md">
                                <i data-lucide="file-text" class="w-4 h-4"></i> Requerimento A
                            </button>
                            <button id="lastBtnComp" class="flex-1 md:flex-none bg-white border-2 border-emerald-200 hover:bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all">
                                <i data-lucide="award" class="w-4 h-4"></i> Comprovante
                            </button>
                            <button onclick="document.getElementById('lastServiceSection').classList.add('hidden')" class="p-2 text-emerald-400 hover:text-emerald-600">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="queueSection" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-bold text-gray-800">Fila de Espera</h2>
                        </div>
                        <button id="chamarProximoBtn" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-all flex items-center gap-2">
                            <i data-lucide="megaphone" class="w-5 h-5"></i>
                            Chamar Próximo
                        </button>
                    </div>

                    <!-- Abas de Canais -->
                    <div class="flex gap-2 mb-4 border-b border-gray-100 overflow-x-auto pb-1">
                        <button onclick="switchTab('Presencial')" id="tab-Presencial" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-blue-600 text-blue-700 whitespace-nowrap">
                            Presencial (<span id="count-Presencial">0</span>)
                        </button>
                        <button onclick="switchTab('Whatsapp')" id="tab-Whatsapp" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Whatsapp (<span id="count-Whatsapp">0</span>)
                        </button>
                        <button onclick="switchTab('E-mail')" id="tab-E-mail" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            E-mail (<span id="count-E-mail">0</span>)
                        </button>
                        <button onclick="switchTab('Telefônico')" id="tab-Telefônico" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Telefônico (<span id="count-Telefônico">0</span>)
                        </button>
                    </div>

                    <div id="queueList" class="space-y-2"></div>
                </div>

                <!-- Ferramentas de Suporte (Compacto) -->
                <div class="bg-white rounded-xl shadow-sm border border-slate-200 p-4 mb-4">
                    <div class="flex items-center justify-between mb-3 text-slate-400">
                        <span class="text-[10px] font-black uppercase tracking-wider">Suporte</span>
                        <i data-lucide="shield-plus" class="w-3 h-3"></i>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button onclick="window.SAS.pdf.generateRequerimentoA({})" 
                            title="Modelo em Branco"
                            class="flex items-center justify-center gap-2 p-2 border border-slate-100 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all">
                            <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                            <span class="text-[10px] font-bold text-slate-700">Modelo A</span>
                        </button>
                        <button onclick="resetPanel()" 
                            title="Destravar Painel"
                            class="flex items-center justify-center gap-2 p-2 border border-slate-100 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition-all">
                            <i data-lucide="zap" class="w-4 h-4 text-orange-500"></i>
                            <span class="text-[10px] font-bold text-slate-700">Reset</span>
                        </button>
                    </div>
                </div>

                <div id="arrivalsSection" class="bg-white rounded-xl shadow-sm border border-blue-200 p-6">
                    <h2 class="text-xl font-bold text-blue-700 mb-4">Agendamentos de Hoje - Confirmar Chegada</h2>
                    <div id="arrivalsList" class="space-y-2"></div>
                </div>
            </div>

            <!-- Transfer Modal -->
            <div id="transferModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="arrow-right-left" class="w-5 h-5 text-blue-600"></i>
                        Transferir Atendimento
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Selecione o Atendente</label>
                            <select id="transferUserSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="">Carregando usuários...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Motivo da Transferência</label>
                            <textarea id="transferObs" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Explique o motivo da transferência..."></textarea>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeTransferModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmTransfer()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Modal -->
            <div id="statusModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Alterar Status</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Novo Status</label>
                            <select id="newStatusSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="disponivel">Online (Disponível)</option>
                                <option value="pausa">Pausa</option>
                            </select>
                        </div>
                        <div id="statusReasonDiv" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Motivo da Pausa</label>
                            <textarea id="statusReason" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Ex: Almoço, Banheiro..."></textarea>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeStatusModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmStatusChange()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Download Modal -->
            <div id="downloadModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100] animate-fade-in p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
                    <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-8 text-white text-center relative">
                        <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                            <i data-lucide="check-circle" class="w-10 h-10 text-white"></i>
                        </div>
                        <h3 class="text-2xl font-bold">Atendimento Concluído!</h3>
                        <p class="opacity-80">O que você deseja fazer agora?</p>
                    </div>
                    
                    <div class="p-8">
                        <div class="grid grid-cols-1 gap-4">
                            <!-- Download Requerimento A -->
                            <button id="btnDownloadReq" class="group flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left">
                                <div class="bg-blue-100 p-3 rounded-lg text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <i data-lucide="file-text" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-800">Gerar Requerimento A</div>
                                    <div class="text-xs text-slate-500">Documento oficial SES-PE com checklist</div>
                                </div>
                                <i data-lucide="download" class="w-5 h-5 text-slate-300 group-hover:text-blue-600"></i>
                            </button>

                            <!-- Download Comprovante -->
                            <button id="btnDownloadComp" class="group flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left">
                                <div class="bg-green-100 p-3 rounded-lg text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                                    <i data-lucide="award" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-800">Baixar Comprovante</div>
                                    <div class="text-xs text-slate-500">Atestado simples de presença</div>
                                </div>
                                <i data-lucide="download" class="w-5 h-5 text-slate-300 group-hover:text-green-600"></i>
                            </button>
                        </div>

                        <button onclick="closeDownloadModal()" class="w-full mt-6 py-3 font-bold text-slate-500 hover:text-slate-800 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="x" class="w-4 h-4"></i>
                            Fechar e Continuar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Guiche Modal -->
            <div id="guicheModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Alterar Guichê</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Número do Guichê</label>
                            <input type="text" id="newGuicheInput" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Ex: 01">
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeGuicheModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmGuicheChange()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();

        const guicheDisplay = document.getElementById('guicheDisplay');
        const alterarGuicheBtn = document.getElementById('alterarGuicheBtn');
        const statusToggleBtn = document.getElementById('statusToggleBtn');
        const activeCallSection = document.getElementById('activeCallSection');
        const queueSection = document.getElementById('queueSection');
        const arrivalsSection = document.getElementById('arrivalsSection');
        const queueList = document.getElementById('queueList');
        const arrivalsList = document.getElementById('arrivalsList');
        const chamarBtn = document.getElementById('chamarProximoBtn');
        const totalAgendadosEl = document.getElementById('totalAgendados');
        const totalAguardandoEl = document.getElementById('totalAguardando');

        // Modals
        const statusModal = document.getElementById('statusModal');
        const newStatusSelect = document.getElementById('newStatusSelect');
        const statusReasonDiv = document.getElementById('statusReasonDiv');
        const statusReason = document.getElementById('statusReason');
        const guicheModal = document.getElementById('guicheModal');
        const newGuicheInput = document.getElementById('newGuicheInput');

        let currentActiveItem = null;


        window.closeDownloadModal = () => {
            document.getElementById('downloadModal').classList.add('hidden');
        };

        window.manualCall = async (id) => {
            if (currentStatus === 'pausa') {
                window.SAS.utils.notify('warning', 'Você está em pausa. Fique online para chamar o servidor.');
                return;
            }
            if (currentActiveItem) {
                window.SAS.utils.notify('warning', 'Você já tem um atendimento ativo. Encerre-o antes de chamar outro.');
                return;
            }
            window.SAS.utils.modal.confirm(
                'Chamar Servidor',
                'Deseja chamar este servidor agora?',
                async () => {
                    try {
                        const targetStatus = currentQueueTab === 'Presencial' ? 'na_fila_do_painel' : 'pendente';
                        await window.SAS.base44.entities.Agendamento.update(id, {
                            status: targetStatus,
                            atendente_id: user.id,
                            guiche: currentGuiche
                        });
                        loadData();
                        window.SAS.utils.notify('success', 'Chamando servidor...');
                    } catch (e) {
                        console.error(e);
                        window.SAS.utils.notify('error', 'Erro ao chamar servidor.');
                    }
                }
            );
        };

        // Guiche Logic
        alterarGuicheBtn.addEventListener('click', () => {
            newGuicheInput.value = currentGuiche;
            guicheModal.classList.remove('hidden');
        });

        window.closeGuicheModal = () => {
            guicheModal.classList.add('hidden');
        };

        window.confirmGuicheChange = () => {
            const newGuiche = newGuicheInput.value;
            if (newGuiche && newGuiche.trim() !== '') {
                currentGuiche = newGuiche.trim();
                localStorage.setItem('sas_guiche', currentGuiche);
                guicheDisplay.textContent = currentGuiche;
                window.SAS.utils.notify('success', `Guichê alterado para ${currentGuiche}`);
                closeGuicheModal();
            }
        };

        // Status Logic
        let currentStatus = 'disponivel';
        const updateStatusUI = (status, motivo = null) => {
            currentStatus = status;
            if (status === 'pausa') {
                statusToggleBtn.className = 'bg-red-100 text-red-700 border border-red-200 px-4 py-2 rounded-lg font-bold hover:bg-red-200 transition-all flex items-center gap-2 shadow-sm';
                statusToggleBtn.innerHTML = `<div class="w-3 h-3 rounded-full bg-red-500"></div><span>Pausa</span>`;
                statusToggleBtn.title = motivo || 'Em Pausa';
            } else {
                statusToggleBtn.className = 'bg-green-100 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-bold hover:bg-green-200 transition-all flex items-center gap-2 shadow-sm';
                statusToggleBtn.innerHTML = `<div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div><span>Online</span>`;
                statusToggleBtn.title = 'Online e disponível';
            }
        };

        const fetchStatus = async () => {
            try {
                const response = await fetch('/api/usuarios/online');
                const onlineUsers = await response.json();
                const me = onlineUsers.find(u => u.id === user.id);
                if (me && me.status_atendimento) {
                    updateStatusUI(me.status_atendimento, me.motivo_pausa);
                }
            } catch (e) {
                console.error('Error fetching status:', e);
            }
        };

        statusToggleBtn.addEventListener('click', () => {
            // Open Modal
            newStatusSelect.value = currentStatus === 'pausa' ? 'pausa' : 'disponivel';
            toggleReasonField();
            statusModal.classList.remove('hidden');
        });

        newStatusSelect.addEventListener('change', () => {
            toggleReasonField();
        });

        function toggleReasonField() {
            if (newStatusSelect.value === 'pausa') {
                statusReasonDiv.classList.remove('hidden');
            } else {
                statusReasonDiv.classList.add('hidden');
            }
        }

        window.closeStatusModal = () => {
            statusModal.classList.add('hidden');
        };

        window.confirmStatusChange = async () => {
            const newStatus = newStatusSelect.value;
            let motivo = statusReason.value.trim();

            if (newStatus === 'pausa' && !motivo) {
                window.SAS.utils.notify('warning', 'O motivo da pausa é obrigatório.');
                return;
            }

            updateStatusUI(newStatus, motivo);
            try {
                const response = await fetch(`/api/usuarios/${user.id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus, motivo: motivo })
                });
                if (!response.ok) throw new Error('Failed to update status');
                window.SAS.utils.notify('success', newStatus === 'pausa' ? 'Status definido como Pausa' : 'Status definido como Online');
                closeStatusModal();
            } catch (e) {
                console.error(e);
                updateStatusUI(currentStatus === 'disponivel' ? 'pausa' : 'disponivel'); // Revert
                window.SAS.utils.notify('error', 'Erro ao atualizar status');
            }
        };

        fetchStatus();

        const loadData = async () => {
            const all = await window.SAS.base44.entities.Agendamento.list();
            const today = new Date().toISOString().split('T')[0];
            const todayAppointments = all.filter(a => a.data_agendamento === today);
            totalAgendadosEl.textContent = todayAppointments.length;

            const arrivals = todayAppointments.filter(a => 
                a.status === 'agendado' &&
                (a.tipo_atendimento === currentQueueTab || (!a.tipo_atendimento && currentQueueTab === 'Presencial'))
            ).sort((a, b) => {
                const timeA = a.hora_inicio || '23:59';
                const timeB = b.hora_inicio || '23:59';
                return timeA.localeCompare(timeB);
            });

            const queue = todayAppointments.filter(a =>
                a.status === 'chegou' &&
                (a.tipo_atendimento === currentQueueTab || (!a.tipo_atendimento && currentQueueTab === 'Presencial'))
            ).sort((a, b) => {
                const timeA = a.hora_inicio || '00:00';
                const timeB = b.hora_inicio || '00:00';
                return timeA.localeCompare(timeB);
            });

            const active = todayAppointments.find(a =>
                (a.status === 'pendente' || a.status === 'em_andamento' || a.status === 'na_fila_do_painel') &&
                String(a.atendente_id) === String(user.id)
            );

            totalAguardandoEl.textContent = queue.length;

            // Atualiza contadores das abas
            const counts = { 'Presencial': 0, 'Whatsapp': 0, 'E-mail': 0, 'Telefônico': 0 };
            todayAppointments.filter(a => a.status === 'chegou').forEach(a => {
                const canal = a.tipo_atendimento || 'Presencial';
                if (counts[canal] !== undefined) counts[canal]++;
            });
            Object.keys(counts).forEach(canal => {
                const el = document.getElementById(`count-${canal}`);
                if (el) el.textContent = counts[canal];
            });

            renderArrivals(arrivals);
            renderQueue(queue);
            renderActiveCall(active);
        };

        window.switchTab = (tab) => {
            currentQueueTab = tab;
            ['Presencial', 'Whatsapp', 'E-mail', 'Telefônico'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (btn) {
                    if (t === tab) {
                        btn.className = 'px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-blue-600 text-blue-700 whitespace-nowrap';
                    } else {
                        btn.className = 'px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap';
                    }
                }
            });
            loadData();
        };

        const renderArrivals = (items) => {
            arrivalsList.innerHTML = '';
            if (items.length === 0) {
                arrivalsList.innerHTML = '<p class="text-gray-400 italic">Nenhum agendamento pendente de chegada.</p>';

            items.forEach(item => {

                    <div>
                        <div class="font-bold text-gray-800">${item.nome_completo}</div>

        const renderQueue = (items) => {
            queueSection.classList.remove('hidden');
            queueList.innerHTML = '';
            if (items.length === 0) {
                queueList.innerHTML = `
                    <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200 text-yellow-800 flex justify-between items-center">

            items.forEach(item => {
                const isUrgent = item.prioridade === 'Preferencial';

                const textClass = isUrgent ? 'text-red-800' : 'text-green-800';
                const badge = isUrgent ? '<span class="bg-red-200 text-red-800 text-xs px-2 py-0.5 rounded-full font-bold uppercase">PREFERENCIAL</span>' : '';

                const div = document.createElement('div');
                div.className = `${bgClass} border p-4 rounded-lg flex justify-between items-center`;
                div.innerHTML = `
                    <div class="flex-1">
                        <div class="font-bold ${textClass} text-lg">${item.nome_completo} ${badge}</div>
                        <div class="text-sm ${textClass} opacity-80">${item.tipo_servico}</div>

                    <div class="flex items-center gap-4">
                        <div class="text-right hidden md:block">
                            <div class="font-bold ${textClass}">Aguardando</div>
                            <div class="text-xs ${textClass} opacity-80">Nível: ${item.prioridade}</div>
                        </div>
                    </div>
                `;
                queueList.appendChild(div);

            lucide.createIcons();
        };

        const renderActiveCall = (item) => {
            if (currentActiveItem && item && currentActiveItem.id === item.id && currentActiveItem.status === item.status) return;
            currentActiveItem = item;
            if (!item) {
                activeCallSection.classList.add('hidden');
                queueSection.classList.remove('hidden');
                arrivalsSection.classList.remove('hidden');
                return;
            }
            activeCallSection.classList.remove('hidden');
            activeCallSection.innerHTML = '';
            if (item.status === 'pendente') {
                activeCallSection.innerHTML = `
                    <div class="bg-white rounded-xl shadow-lg border-2 border-blue-500 p-8 animate-fade-in relative">
                        ${item.observacao_transferencia ? `
                            <div class="mb-4 bg-blue-50 border border-blue-200 p-4 rounded-lg">
                                <div class="text-xs font-bold text-blue-800 uppercase mb-1">Motivo da Transferência</div>
                                <p class="text-blue-900 text-sm">${item.observacao_transferencia}</p>
                            </div>
                        ` : ''}
                        <div class="mb-6">
                            <h2 class="text-3xl font-bold text-blue-800 mb-1">${item.nome_completo}</h2>
                            <div class="text-gray-500 text-lg">${item.tipo_servico}</div>
                            <div class="flex gap-2 flex-wrap mt-3">
                                <span class="inline-flex items-center gap-1.5 bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold border border-blue-100">
                                    <i data-lucide="shield-check" class="w-3 h-3"></i> Vínculo: ${item.vinculo || '-'}
                                </span>
                                <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 px-3 py-1 rounded-full text-xs font-bold border border-slate-200">
                                    <i data-lucide="user" class="w-3 h-3"></i> Nível: ${item.prioridade}
                                </span>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="startService('${item.id}')" class="bg-green-600 hover:bg-green-700 text-white px-8 py-3 rounded-lg font-bold text-lg flex items-center gap-2 transition-all">
                                <i data-lucide="play" class="w-5 h-5"></i> Iniciar Atendimento
                            </button>
                            <button onclick="cancelService('${item.id}')" class="bg-white border border-gray-300 text-gray-600 px-6 py-3 rounded-lg font-bold text-lg hover:bg-gray-50 flex items-center gap-2">
                                <i data-lucide="x" class="w-5 h-5"></i> Cancelar
                            </button>
                        </div>
                    </div>
                `;
            } else if (item.status === 'na_fila_do_painel') {
                activeCallSection.innerHTML = `
                    <div class="bg-slate-50 rounded-xl shadow border-2 border-slate-300 p-8 animate-pulse relative">
                        <div class="absolute top-4 right-4 flex items-center gap-2 text-slate-500 font-bold text-sm bg-white px-3 py-1 rounded-full shadow-sm">
                             <div class="w-2 h-2 rounded-full bg-slate-400 animate-bounce"></div>
                             FILA DO PAINEL
                        </div>
                        <div class="mb-6">
                            <h2 class="text-3xl font-bold text-slate-700 mb-1 opacity-60">${item.nome_completo}</h2>
                            <div class="text-slate-400 text-lg">Aguardando liberação do painel...</div>
                        </div>
                        ${(() => {
                            // Check if there's REALLY a RECENT blocker
                            // We need access to all appointments. Fortunately loadData filters them.
                            // I'll add a check based on the current data state.
                            return `
                                <div class="bg-yellow-100 border-l-4 border-yellow-500 p-4 mb-6" id="panelBusyWarning">
                                    <p class="text-yellow-700 text-sm font-medium">
                                        <strong>Aviso:</strong> Há outra chamada ativa no painel no momento. 
                                        Aguarde alguns segundos para que o sistema libere o painel automaticamente para você.
                                    </p>
                                </div>
                            `;
                        })()}
                        <div class="flex gap-4">
                            <button onclick="cancelService('${item.id}')" class="bg-white border border-gray-300 text-gray-500 px-6 py-3 rounded-lg font-bold text-lg hover:bg-gray-50 flex items-center gap-2">
                                <i data-lucide="x" class="w-5 h-5"></i> Cancelar Chamada
                            </button>
                        </div>
                    </div>
                `;
            } else if (item.status === 'em_andamento') {
                activeCallSection.innerHTML = `
                    <div class="bg-white rounded-xl shadow-lg border-2 border-blue-500 p-8 animate-fade-in relative">
                        ${item.observacao_transferencia ? `
                            <div class="mb-4 bg-blue-50 border border-blue-200 p-4 rounded-lg">
                                <div class="text-xs font-bold text-blue-800 uppercase mb-1">Motivo da Transferência</div>
                                <p class="text-blue-900 text-sm">${item.observacao_transferencia}</p>
                            </div>
                        ` : ''}
                        <div class="mb-6 border-b pb-4">
                            <h2 class="text-3xl font-bold text-blue-800 mb-1">${item.nome_completo}</h2>
                            <div class="mt-2 group relative">
                                <label class="block text-xs font-bold text-gray-400 uppercase mb-1">Tipo de Serviço (Clique para alterar se necessário):</label>
                                <select id="servicoCorrigido" class="w-full p-2 border border-blue-200 rounded-lg bg-blue-50 text-blue-800 font-bold outline-none focus:ring-2 focus:ring-blue-500">
                                    <option value="">Selecione...</option>
                                    <option value="Aposentadoria" ${item.tipo_servico === 'Aposentadoria' ? 'selected' : ''}>Aposentadoria</option>
                                    <option value="Atendimento Geral" ${item.tipo_servico === 'Atendimento Geral' ? 'selected' : ''}>Atendimento Geral</option>
                                    <option value="Seleção Pública Simplificada" ${item.tipo_servico === 'Seleção Pública Simplificada' ? 'selected' : ''}>Seleção Pública Simplificada</option>
                                    <option value="Certidão" ${item.tipo_servico === 'Certidão' ? 'selected' : ''}>Certidão</option>
                                    <option value="Licença" ${item.tipo_servico === 'Licença' ? 'selected' : ''}>Licença</option>
                                    <option value="Pagamento" ${item.tipo_servico === 'Pagamento' ? 'selected' : ''}>Pagamento</option>
                                    <option value="Plantão Extraordinário" ${item.tipo_servico === 'Plantão Extraordinário' ? 'selected' : ''}>Plantão Extraordinário</option>
                                </select>
                            </div>
                            <div class="flex gap-2 flex-wrap mt-4">
                                <span class="inline-flex items-center gap-1.5 bg-blue-50 text-blue-700 px-4 py-1.5 rounded-full text-xs font-bold border border-blue-100 shadow-sm">
                                    <i data-lucide="shield-check" class="w-3.5 h-3.5"></i> Vínculo: ${item.vinculo || '-'}
                                </span>
                                <span class="inline-flex items-center gap-1.5 bg-slate-100 text-slate-700 px-4 py-1.5 rounded-full text-xs font-bold border border-slate-200 shadow-sm">
                                    <i data-lucide="star" class="w-3.5 h-3.5"></i> Nível: ${item.prioridade}
                                </span>
                            </div>
                        </div>
                        <div class="space-y-6">
                            <!-- Assuntos Dinâmicos -->
                            <div class="bg-slate-50 p-4 rounded-xl border border-slate-200">

                                    <label class="block text-blue-700 font-bold">O servidor precisou tratar de mais um assunto?</label>
                                    <button onclick="addAssuntoRow('${item.id}')" class="bg-blue-600 text-white text-xs px-3 py-1 rounded-md font-bold hover:bg-blue-700 transition-all flex items-center gap-1">
                                        <i data-lucide="plus" class="w-3 h-3"></i> Adicionar
                                    </button>
                                </div>
                                <div id="assuntosContainer" class="space-y-3">
                                    <!-- Linhas de assuntos aparecem aqui -->
                                </div>
                            </div>

                            <div>
                                <label class="block text-blue-700 font-bold mb-2">Observação 1 - Problema relatado pelo cliente</label>
                                <textarea id="obs1" oninput="saveServiceDraft('${item.id}')" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Descreva o problema relatado...">${item.observacao_problema || ''}</textarea>
                            </div>
                            <div>
                                <label class="block text-blue-700 font-bold mb-2">Observação 2 - Resposta/Solução dada pelo atendente</label>
                                <textarea id="obs2" oninput="saveServiceDraft('${item.id}')" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none" placeholder="Descreva a solução fornecida...">${item.observacao_solucao || ''}</textarea>
                            </div>

                            <button onclick="finishService('${item.id}')" class="w-full bg-gray-300 hover:bg-blue-600 hover:text-white text-gray-700 font-bold py-4 rounded-lg transition-all flex justify-center items-center gap-2 mt-4" id="finishBtn">
                                <i data-lucide="check-circle" class="w-5 h-5"></i> Encerrar Atendimento
                            </button>
                            <button onclick="openTransferModal('${item.id}')" class="w-full bg-white border-2 border-blue-100 hover:bg-blue-50 text-blue-700 font-bold py-3 rounded-lg transition-all flex justify-center items-center gap-2">
                                <i data-lucide="arrow-right-left" class="w-5 h-5"></i> Transferir Atendimento
                            </button>
                        </div>
                    </div>
                `;
                // Restaurar rascunho se existir
                restoreServiceDraft(item.id);
            }
            lucide.createIcons();
        };

        window.confirmArrival = (id) => {
            window.SAS.utils.modal.confirm(
                'Confirmar Chegada',
                'Deseja confirmar a chegada deste cidadão?',
                async () => {
                    try {
                        await window.SAS.base44.entities.Agendamento.update(id, { status: 'chegou' });
                        loadData();
                        window.SAS.utils.notify('success', 'Chegada confirmada!');
                    } catch (err) {
                        console.error(err);
                        window.SAS.utils.notify('error', 'Erro ao confirmar chegada.');
                    }
                }
            );
        };

        window.markNoShow = (id) => {
            window.SAS.utils.modal.confirm(
                'Não Compareceu',
                'Confirmar que o cidadão NÃO compareceu? Esta ação removerá o agendamento da lista de hoje.',
                async () => {
                    try {
                        await window.SAS.base44.entities.Agendamento.update(id, { status: 'nao_compareceu' });
                        loadData();
                        window.SAS.utils.notify('warning', 'Marcado como não compareceu.');
                    } catch (err) {
                        console.error(err);
                        window.SAS.utils.notify('error', 'Erro ao atualizar status.');
                    }
                },
                'danger'
            );
        };

        window.startService = async (id) => {
            await window.SAS.base44.entities.Agendamento.update(id, { status: 'em_andamento' });
            loadData();
        };

        window.cancelService = async (id) => {
            window.SAS.utils.modal.confirm(
                'Cancelar Chamado',
                'Deseja cancelar este chamado e devolver para a fila?',
                async () => {
                    await window.SAS.base44.entities.Agendamento.update(id, { status: 'chegou', atendente_id: null, guiche: null });
                    loadData();
                },
                'danger'
            );
        };

        window.toggleAssuntoSecundario = (show) => {
            const div = document.getElementById('assuntoSecundarioDiv');
            if (div) {
                if (show) div.classList.remove('hidden');
                else {
                    div.classList.add('hidden');
                    document.getElementById('assuntoSecundario').value = '';
                }
            }
        };

        // Lógica de Salvamento Automático (Draft)
        window.saveServiceDraft = (id) => {
            const obs1 = document.getElementById('obs1')?.value || '';
            const obs2 = document.getElementById('obs2')?.value || '';
            const servicoCorrigido = document.getElementById('servicoCorrigido')?.value || '';
            
            const assuntoRows = document.querySelectorAll('.assunto-row');
            const assuntosAdicionais = [];
            assuntoRows.forEach(row => {
                const categoria = row.querySelector('.assunto-categoria').value;
                const descricao = row.querySelector('.assunto-descricao').value;
                assuntosAdicionais.push({ categoria, descricao });
            });

            const draft = {
                obs1,
                obs2,
                servicoCorrigido,
                assuntosAdicionais,
                timestamp: new Date().getTime()
            };

            localStorage.setItem(`sas_draft_${id}`, JSON.stringify(draft));
        };

        window.restoreServiceDraft = (id) => {
            const rawDraft = localStorage.getItem(`sas_draft_${id}`);
            if (!rawDraft) return;

            try {
                const draft = JSON.parse(rawDraft);
                if (draft.obs1) document.getElementById('obs1').value = draft.obs1;
                if (draft.obs2) document.getElementById('obs2').value = draft.obs2;
                if (draft.servicoCorrigido) document.getElementById('servicoCorrigido').value = draft.servicoCorrigido;

                if (draft.assuntosAdicionais && draft.assuntosAdicionais.length > 0) {
                    const container = document.getElementById('assuntosContainer');
                    container.innerHTML = ''; // Limpa antes de restaurar
                    draft.assuntosAdicionais.forEach(a => {
                        window.addAssuntoRow(id, a.categoria, a.descricao);
                    });
                }
            } catch (e) {
                console.error("Erro ao restaurar rascunho:", e);
            }
        };

        window.addAssuntoRow = (id, initialCategoria = '', initialDescricao = '') => {
            const container = document.getElementById('assuntosContainer');
            const div = document.createElement('div');
            div.className = 'assunto-row bg-white p-3 rounded-lg border border-slate-200 flex gap-2 animate-fade-in mb-2';
            div.innerHTML = `
                <div class="flex-1">
                    <select onchange="saveServiceDraft('${id}')" class="assunto-categoria w-full p-2 border border-slate-300 rounded-md text-xs mb-1 outline-none">
                        <option value="">Selecione a categoria...</option>
                        <option value="Aposentadoria" ${initialCategoria === 'Aposentadoria' ? 'selected' : ''}>Aposentadoria</option>
                        <option value="Atendimento Geral" ${initialCategoria === 'Atendimento Geral' ? 'selected' : ''}>Atendimento Geral</option>
                        <option value="Seleção Pública Simplificada" ${initialCategoria === 'Seleção Pública Simplificada' ? 'selected' : ''}>Seleção Pública Simplificada</option>
                        <option value="Certidão" ${initialCategoria === 'Certidão' ? 'selected' : ''}>Certidão</option>
                        <option value="Licença" ${initialCategoria === 'Licença' ? 'selected' : ''}>Licença</option>
                        <option value="Pagamento" ${initialCategoria === 'Pagamento' ? 'selected' : ''}>Pagamento</option>
                        <option value="Plantão Extraordinário" ${initialCategoria === 'Plantão Extraordinário' ? 'selected' : ''}>Plantão Extraordinário</option>
                    </select>
                    <textarea oninput="saveServiceDraft('${id}')" class="assunto-descricao w-full p-2 border border-slate-300 rounded-md text-xs outline-none h-12" placeholder="Relate detalhadamente o que foi tratado neste assunto...">${initialDescricao}</textarea>
                </div>
                <button onclick="this.parentElement.remove(); saveServiceDraft('${id}')" class="text-red-500 p-1 self-start">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(div);
            lucide.createIcons();
            if (!initialCategoria) saveServiceDraft(id); // Salva que adicionou uma linha vazia
        };

        window.finishService = async (id) => {
            const obs1 = document.getElementById('obs1').value;
            const obs2 = document.getElementById('obs2').value;
            const servicoCorrigido = document.getElementById('servicoCorrigido').value;
            
            // Coleta de assuntos adicionais dinâmicos
            const assuntoRows = document.querySelectorAll('.assunto-row');
            const assuntosAdicionais = [];
            let validationFailed = false;

            assuntoRows.forEach(row => {
                const categoria = row.querySelector('.assunto-categoria').value;
                const descricao = row.querySelector('.assunto-descricao').value;
                if (!categoria || !descricao.trim()) {
                    validationFailed = true;
                }
                assuntosAdicionais.push({ categoria, descricao });
            });

            if (!obs1.trim() || !obs2.trim()) {
                window.SAS.utils.notify('warning', 'É preciso preencher as duas observações para encerrar.');
                return;
            }

            if (validationFailed) {
                window.SAS.utils.notify('warning', 'Por favor, preencha a categoria e a descrição de todos os assuntos adicionais.');
                return;
            }

            try {
                await window.SAS.base44.entities.Agendamento.update(id, {
                    status: 'concluido',
                    atendente_id: user.id,
                    tipo_servico: servicoCorrigido,
                    observacao_problema: obs1,
                    observacao_solucao: obs2,
                    assuntos_adicionais: assuntosAdicionais.length > 0 ? JSON.stringify(assuntosAdicionais) : null
                });

                // Carrega dados atualizados para download
                const respAll = await fetch('/api/agendamentos');
                const agAll = await respAll.json();
                const ag = agAll.find(a => String(a.id) === String(id));

                // Atualiza o painel de download manual (sem modal automático)
                const lastServiceSection = document.getElementById('lastServiceSection');
                const lastServiceName = document.getElementById('lastServiceName');
                const lastBtnReq = document.getElementById('lastBtnReq');
                const lastBtnComp = document.getElementById('lastBtnComp');

                lastServiceName.textContent = ag.nome_completo;
                lastBtnReq.onclick = () => window.SAS.pdf.generateRequerimentoA(ag);
                lastBtnComp.onclick = () => window.SAS.pdf.generateComprovante(ag, user.nome_completo || user.nome);

                lastServiceSection.classList.remove('hidden');
                lucide.createIcons();

                window.SAS.utils.notify('success', 'Atendimento encerrado com sucesso!');
                localStorage.removeItem(`sas_draft_${id}`); // Limpa rascunho ao finalizar
                loadData();
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao encerrar atendimento.');
            }
        };

        const transferModal = document.getElementById('transferModal');
        const transferUserSelect = document.getElementById('transferUserSelect');
        const transferObs = document.getElementById('transferObs');
        let itemToTransferId = null;

        window.openTransferModal = async (id) => {
            itemToTransferId = id;
            transferObs.value = '';

            try {
                const [users, onlineUsers] = await Promise.all([
                    window.SAS.base44.entities.SystemUser.list(),
                    fetch('/api/usuarios/online').then(res => res.json())
                ]);

                const excludedNames = [
                    'Administrador Sistema',
                    'Lara Lívia Agra Amaral',
                    'Williams Americo Sobrinho'
                ];

                const activeUsers = users.filter(u => {
                    const isSelf = String(u.id) === String(user.id);
                    const isAttendant = u.tipo === 'usuario';
                    const isAtivo = u.situacao === 'ativo';
                    const isExcluded = excludedNames.includes(u.nome_completo);
                    return !isSelf && isAttendant && isAtivo && !isExcluded;
                });

                transferUserSelect.innerHTML = '<option value="">Selecione um atendente...</option>';

                activeUsers.forEach(u => {
                    const onlineInfo = onlineUsers.find(ou => String(ou.id) === String(u.id));
                    let statusText = 'Offline';
                    let statusColor = '⚪';
                    let reasonSuffix = '';

                    if (onlineInfo) {
                        if (onlineInfo.status_atendimento === 'pausa') {
                            statusText = 'Pausa';
                            statusColor = '🔴';
                            reasonSuffix = onlineInfo.motivo_pausa ? ` (${onlineInfo.motivo_pausa})` : '';
                        } else if (onlineInfo.status_atendimento === 'offline') {
                            statusText = 'Offline';
                            statusColor = '⚪';
                        } else {
                            statusText = 'Online';
                            statusColor = '🟢';
                        }
                    }

                    const option = document.createElement('option');
                    option.value = u.id;
                    option.dataset.guiche = u.guiche_atual || '';
                    option.textContent = `${u.nome_completo || u.usuario} (Guichê ${u.guiche_atual || '?'}) - ${statusColor} ${statusText}${reasonSuffix}`;
                    option.title = onlineInfo && onlineInfo.motivo_pausa ? `Motivo da Pausa: ${onlineInfo.motivo_pausa}` : statusText;

                    if (statusText !== 'Online') {
                        option.disabled = true;
                        option.classList.add('text-gray-400');
                    }

                    transferUserSelect.appendChild(option);
                });
                transferModal.classList.remove('hidden');
            } catch (e) {
                console.error('Error loading users for transfer:', e);
                window.SAS.utils.notify('error', 'Erro ao carregar lista de atendentes.');
            }
        };

        window.closeTransferModal = () => {
            transferModal.classList.add('hidden');
            itemToTransferId = null;
        };

        window.confirmTransfer = async () => {
            if (!itemToTransferId) return;
            const targetUserId = transferUserSelect.value;
            const targetGuiche = transferUserSelect.options[transferUserSelect.selectedIndex].dataset.guiche;
            const obs = transferObs.value;
            if (!targetUserId) {
                window.SAS.utils.notify('warning', 'Selecione um atendente para transferir.');
                return;
            }
            if (!obs.trim()) {
                window.SAS.utils.notify('warning', 'Por favor, informe o motivo da transferência.');
                return;
            }

            const obs1 = document.getElementById('obs1') ? document.getElementById('obs1').value : null;
            const obs2 = document.getElementById('obs2') ? document.getElementById('obs2').value : null;

            window.SAS.utils.modal.confirm(
                'Transferir Atendimento',
                'Tem certeza que deseja transferir este atendimento?',
                async () => {
                    try {
                        await window.SAS.base44.entities.Agendamento.update(itemToTransferId, {
                            status: 'pendente',
                            atendente_id: targetUserId,
                            guiche: targetGuiche,
                            observacao_transferencia: obs,
                            observacao_problema: obs1,
                            observacao_solucao: obs2
                        });
                        window.SAS.utils.notify('success', 'Atendimento transferido com sucesso!');
                        closeTransferModal();
                        loadData();
                    } catch (e) {
                        window.SAS.utils.notify('error', 'Erro ao transferir atendimento.');
                    }
                }
            );
        };

        chamarBtn.addEventListener('click', async () => {
            if (currentStatus === 'pausa') {
                window.SAS.utils.notify('warning', 'Você está em pausa. Fique online para chamar o próximo.');
                return;
            }
            if (currentActiveItem) {
                window.SAS.utils.notify('warning', 'Você já tem um atendimento ativo. Encerre-o antes de chamar o próximo.');
                return;
            }

            try {
                const response = await fetch('/api/agendamentos/proximo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        atendente_id: user.id,
                        guiche: currentGuiche
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    window.SAS.utils.notify('success', 'Chamando próximo da fila...');
                    loadData();
                } else {
                    window.SAS.utils.notify('info', 'Não há ninguém aguardando na fila ou o painel está ocupado.');
                }
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao chamar próximo.');
            }
        });

        window.resetPanel = async () => {
            if (!confirm('Deseja realmente resetar o painel? Isso limpará qualquer chamado travado e atualizará a fila.')) return;
            
            try {
                const response = await fetch('/api/agendamentos/reset-painel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                if (result.success) {
                    window.SAS.utils.notify('success', 'Painel resetado e fila atualizada!');
                    loadData(); // Recarrega os dados para atualizar o aviso
                } else {
                    window.SAS.utils.notify('error', 'Erro ao resetar: ' + (result.error || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('Erro resetPanel:', error);
                window.SAS.utils.notify('error', 'Falha na comunicação com o servidor.');
            }
        };

        loadData();
        setInterval(loadData, 3000);
    </script>
</body>

</html>
