<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento - SAS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sonner@1.4.0/dist/sonner.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="js/pdf_generator.js?v=1.1"></script>
</head>

<body>
    <div id="app"></div>
    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ai_assistant.js"></script>
    <script src="js/layout.js"></script>
    <script>
        const user = window.SAS.utils.checkAuth();
        window.SAS.layout.renderLayout('Atendimento');
        const content = document.getElementById('page-content');
        let currentGuiche = localStorage.getItem('sas_guiche') || '1';
        let currentQueueTab = 'Presencial';
        let isResumedService = false; // Flag para controlar se é um retorno do histórico
        let resumedOriginalDate = null; // Armazena a data original para não perdê-la
        let shouldFocusResumed = false; // Flag para focar no campo após retomar
        let currentDonePage = 1;
        const doneItemsPerPage = 10;
        
        const todayStr = () => {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        };
        const formatInclusionDate = (createdAt) => {
            if (!createdAt) return '';
            const datePart = createdAt.includes('T') ? createdAt.split('T')[0] : createdAt.split(' ')[0];
            if (datePart === todayStr()) return '';
            return `<span class="text-orange-600 font-bold ml-1 text-[10px] italic">(incluído ${window.SAS.utils.formatDate(datePart)})</span>`;
        };

        content.innerHTML = `
            <div class="flex flex-col items-center justify-center mb-6 animate-fade-in">
                <div class="flex items-center gap-3 mb-2">
                    <i data-lucide="headset" class="w-8 h-8 text-blue-700"></i>
                    <h1 class="text-3xl font-bold text-blue-700">Atendimentos</h1>
                </div>
                <div class="flex justify-center items-center">
                    <div class="h-1.5 w-32 bg-gradient-to-r from-blue-600 via-yellow-400 to-red-500 rounded-full"></div>
                </div>
            </div>

            <div class="flex justify-center items-center gap-4 mb-6">
                <div id="guicheDisplay" class="bg-blue-800 text-white px-8 py-2 rounded-lg font-bold text-xl shadow-lg">
                    ${currentGuiche === 'Triagem' ? 'Triagem' : 'Guichê ' + currentGuiche}
                </div>
                <button id="alterarGuicheBtn" class="bg-white border border-gray-300 text-gray-700 px-4 py-2 rounded-lg font-medium hover:bg-gray-50 transition-colors flex items-center gap-2 shadow-sm">
                    <i data-lucide="settings" class="w-5 h-5"></i>
                    Alterar
                </button>
                <button id="statusToggleBtn" class="bg-green-100 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-bold hover:bg-green-200 transition-all flex items-center gap-2 shadow-sm">
                    <div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div>
                    <span>Online</span>
                </button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl mx-auto mb-8">
                <div class="bg-blue-50 border-2 border-blue-400 rounded-xl p-6 text-center shadow-sm">
                    <div class="text-4xl font-bold text-blue-800 mb-1" id="totalAgendados">0</div>
                    <div class="text-blue-600 font-medium">Movimentação do Dia</div>
                </div>
                <div class="bg-yellow-50 border-2 border-yellow-400 rounded-xl p-6 text-center shadow-sm">
                    <div class="text-4xl font-bold text-yellow-800 mb-1" id="totalAguardando">0</div>
                    <div class="text-yellow-600 font-medium">Pessoas aguardando</div>
                </div>
            </div>

            <div id="mainArea" class="max-w-5xl mx-auto space-y-8">
                <div id="activeCallSection" class="hidden"></div>

                <!-- Nova Seção de Download do Último Atendimento -->
                <div id="lastServiceSection" class="hidden animate-fade-in">
                    <div class="bg-emerald-50 border-2 border-emerald-200 rounded-xl p-6 flex flex-col md:flex-row items-center justify-between gap-4 shadow-sm">
                        <div class="flex items-center gap-4">
                            <div class="bg-emerald-100 p-3 rounded-full text-emerald-600">
                                <i data-lucide="check-circle" class="w-6 h-6"></i>
                            </div>
                            <div>
                                <div class="text-emerald-800 font-bold text-lg" id="lastServiceName">NOME DO SERVIDOR</div>
                                <div class="text-emerald-600 text-sm">Atendimento concluído! Baixe os documentos se desejar:</div>
                            </div>
                        </div>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button id="lastBtnReq" class="flex-1 md:flex-none bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all shadow-md">
                                <i data-lucide="file-text" class="w-4 h-4"></i> Requerimento A
                            </button>
                            <button id="lastBtnComp" class="flex-1 md:flex-none bg-white border-2 border-emerald-200 hover:bg-emerald-100 text-emerald-700 px-4 py-2 rounded-lg font-bold text-sm flex items-center justify-center gap-2 transition-all">
                                <i data-lucide="award" class="w-4 h-4"></i> Comprovante
                            </button>
                            <button onclick="document.getElementById('lastServiceSection').classList.add('hidden')" class="p-2 text-emerald-400 hover:text-emerald-600">
                                <i data-lucide="x" class="w-5 h-5"></i>
                            </button>
                        </div>
                    </div>
                </div>

                <div id="standbySection" class="bg-white rounded-xl shadow-sm border border-orange-200 p-6 hidden">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="timer" class="w-5 h-5 text-orange-600"></i>
                        <h2 class="text-xl font-bold text-gray-800">Atendimentos Aguardando Resposta</h2>
                    </div>
                    <div id="standbyList" class="space-y-2"></div>
                </div>

                <div id="queueSection" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6 hidden">
                    <div class="flex justify-between items-center mb-4">
                        <div class="flex items-center gap-4">
                            <h2 class="text-xl font-bold text-gray-800">Fila de Espera</h2>
                        </div>
                        <button id="chamarProximoBtn" class="bg-slate-800 hover:bg-slate-900 text-white px-6 py-2 rounded-lg font-bold shadow-lg transition-all flex items-center gap-2">
                            <i data-lucide="megaphone" class="w-5 h-5"></i>
                            Chamar Próximo
                        </button>
                    </div>

                    <!-- Abas de Canais -->
                    <div class="flex gap-2 mb-4 border-b border-gray-100 overflow-x-auto pb-1">
                        <button onclick="switchTab('Presencial')" id="tab-Presencial" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-blue-600 text-blue-700 whitespace-nowrap">
                            Presencial (<span id="count-Presencial">0</span>)
                        </button>
                        <button onclick="switchTab('Whatsapp')" id="tab-Whatsapp" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Whatsapp (<span id="count-Whatsapp">0</span>)
                        </button>
                        <button onclick="switchTab('E-mail')" id="tab-E-mail" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            E-mail (<span id="count-E-mail">0</span>)
                        </button>
                        <button onclick="switchTab('Telefônico')" id="tab-Telefônico" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Telefônico (<span id="count-Telefônico">0</span>)
                        </button>
                        <button onclick="switchTab('Externo')" id="tab-Externo" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Externo (<span id="count-Externo">0</span>)
                        </button>
                        <button onclick="switchTab('Ao Público')" id="tab-Ao Público" class="px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap">
                            Ao Público (<span id="count-Ao Público">0</span>)
                        </button>
                    </div>

                    <div id="queueList" class="space-y-2"></div>
                </div>

                <!-- Ferramentas de Suporte (Agora Retrátil) -->
                <div class="mb-4">
                    <button onclick="toggleSuporte()" 
                        class="flex items-center gap-2 text-slate-400 hover:text-blue-600 transition-all font-black text-[10px] uppercase tracking-widest px-1 py-2 group">
                        <i data-lucide="settings-2" class="w-3 h-3"></i>
                        <span>Ferramentas de Suporte</span>
                        <i id="suporteIcon" data-lucide="chevron-down" class="w-3 h-3 transition-transform duration-300"></i>
                    </button>
                    
                    <div id="suporteContent" class="hidden space-y-3 mt-2 animate-fade-in">
                        <div class="bg-slate-50 rounded-xl border border-dashed border-slate-200 p-4">
                            <div class="grid grid-cols-2 gap-2">
                                <button onclick="window.SAS.pdf.generateRequerimentoA({})" 
                                    title="Modelo em Branco"
                                    class="flex items-center justify-center gap-2 p-2 bg-white border border-slate-100 rounded-lg hover:border-blue-500 hover:bg-blue-50 transition-all shadow-sm">
                                    <i data-lucide="file-text" class="w-4 h-4 text-blue-600"></i>
                                    <span class="text-[10px] font-bold text-slate-700">Modelo A</span>
                                </button>
                                <button onclick="resetPanel()" 
                                    title="Destravar Painel"
                                    class="flex items-center justify-center gap-2 p-2 bg-white border border-slate-100 rounded-lg hover:border-orange-500 hover:bg-orange-50 transition-all shadow-sm">
                                    <i data-lucide="zap" class="w-4 h-4 text-orange-500"></i>
                                    <span class="text-[10px] font-bold text-slate-700">Reset Painel</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>



                <div id="arrivalsSection" class="bg-white rounded-xl shadow-sm border border-blue-200 p-6">
                    <h2 class="text-xl font-bold text-blue-700 mb-4">Agendamentos de Hoje - Confirmar Chegada</h2>
                    <div id="arrivalsList" class="space-y-2"></div>
                </div>

                <!-- Nova Seção: Atendidos Hoje -->
                <div id="doneTodaySection" class="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <i data-lucide="history" class="w-5 h-5 text-emerald-600"></i>
                        <h2 class="text-xl font-bold text-gray-800">Atendidos Hoje</h2>
                    </div>
                    <div id="doneTodayList" class="space-y-2"></div>
                    <div id="doneTodayPagination" class="flex justify-center items-center gap-2 mt-4 text-sm hidden"></div>
                </div>
            </div>

            <!-- Transfer Modal -->
            <div id="transferModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <i data-lucide="arrow-right-left" class="w-5 h-5 text-blue-600"></i>
                        Transferir Atendimento
                    </h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Selecione o Atendente</label>
                            <select id="transferUserSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="">Carregando usuários...</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Motivo da Transferência</label>
                            <textarea id="transferObs" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Explique o motivo da transferência..."></textarea>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeTransferModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmTransfer()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Status Modal -->
            <div id="statusModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-md animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Alterar Status</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Novo Status</label>
                            <select id="newStatusSelect" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none bg-white">
                                <option value="disponivel">Online (Disponível)</option>
                                <option value="pausa">Pausa</option>
                            </select>
                        </div>
                        <div id="statusReasonDiv" class="hidden">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Motivo da Pausa</label>
                            <textarea id="statusReason" class="w-full border border-gray-300 rounded-lg p-3 h-24 focus:ring-2 focus:ring-blue-500 outline-none resize-none" placeholder="Ex: Almoço, Banheiro..."></textarea>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeStatusModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmStatusChange()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Confirmar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Download Modal -->
            <div id="downloadModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[100] animate-fade-in p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-200">
                    <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-8 text-white text-center relative">
                        <div class="w-20 h-20 bg-white/10 rounded-full flex items-center justify-center mx-auto mb-4 backdrop-blur-sm">
                            <i data-lucide="check-circle" class="w-10 h-10 text-white"></i>
                        </div>
                        <h3 class="text-2xl font-bold">Atendimento Concluído!</h3>
                        <p class="opacity-80">O que você deseja fazer agora?</p>
                    </div>
                    
                    <div class="p-8">
                        <div class="grid grid-cols-1 gap-4">
                            <!-- Download Requerimento A -->
                            <button id="btnDownloadReq" class="group flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left">
                                <div class="bg-blue-100 p-3 rounded-lg text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                    <i data-lucide="file-text" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-800">Gerar Requerimento A</div>
                                    <div class="text-xs text-slate-500">Documento oficial SES-PE com checklist</div>
                                </div>
                                <i data-lucide="download" class="w-5 h-5 text-slate-300 group-hover:text-blue-600"></i>
                            </button>

                            <!-- Download Comprovante -->
                            <button id="btnDownloadComp" class="group flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left">
                                <div class="bg-green-100 p-3 rounded-lg text-green-600 group-hover:bg-green-600 group-hover:text-white transition-colors">
                                    <i data-lucide="award" class="w-6 h-6"></i>
                                </div>
                                <div class="flex-1">
                                    <div class="font-bold text-slate-800">Baixar Comprovante</div>
                                    <div class="text-xs text-slate-500">Atestado simples de presença</div>
                                </div>
                                <i data-lucide="download" class="w-5 h-5 text-slate-300 group-hover:text-green-600"></i>
                            </button>
                        </div>

                        <button onclick="closeDownloadModal()" class="w-full mt-6 py-3 font-bold text-slate-500 hover:text-slate-800 transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="x" class="w-4 h-4"></i>
                            Fechar e Continuar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Guiche Modal -->
            <div id="guicheModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-50">
                <div class="bg-white rounded-xl shadow-2xl p-6 w-full max-w-sm animate-fade-in">
                    <h3 class="text-xl font-bold text-gray-800 mb-4">Alterar Guichê</h3>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Número do Guichê</label>
                            <select id="newGuicheInput" class="w-full border border-gray-300 rounded-lg p-2.5 focus:ring-2 focus:ring-blue-500 outline-none">
                                <option value="0">0</option>
                                <option value="1">1</option>
                                <option value="2">2</option>
                                <option value="3">3</option>
                                <option value="4">4</option>
                                <option value="Triagem">Triagem</option>
                            </select>
                        </div>
                        <div class="flex gap-3 mt-6">
                            <button onclick="closeGuicheModal()" class="flex-1 bg-gray-100 text-gray-700 py-2 rounded-lg font-bold hover:bg-gray-200 transition-colors">Cancelar</button>
                            <button onclick="confirmGuicheChange()" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-bold hover:bg-blue-700 transition-colors">Salvar</button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Cancel Options Modal -->
            <div id="cancelModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[110] animate-fade-in p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-200">
                    <div class="bg-slate-50 p-6 border-b border-slate-100">
                        <h3 class="text-xl font-bold text-slate-800">Opções de Cancelamento</h3>
                        <p class="text-slate-500 text-sm">Escolha o que deseja fazer com este chamado:</p>
                    </div>
                    
                    <div class="p-6 space-y-3">
                        <button id="btnReturnToQueue" class="w-full flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-blue-500 hover:bg-blue-50 transition-all text-left group">
                            <div class="bg-blue-100 p-2.5 rounded-lg text-blue-600 group-hover:bg-blue-600 group-hover:text-white transition-colors">
                                <i data-lucide="rotate-ccw" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-bold text-slate-800 text-sm">Devolver para a Fila</div>
                                <div class="text-[10px] text-slate-500 uppercase font-bold tracking-wider">Status: Chegou</div>
                            </div>
                        </button>

                        <button id="btnCancelPermanent" class="w-full flex items-center gap-4 p-4 border-2 border-slate-100 rounded-xl hover:border-red-500 hover:bg-red-50 transition-all text-left group">
                            <div class="bg-red-100 p-2.5 rounded-lg text-red-600 group-hover:bg-red-600 group-hover:text-white transition-colors">
                                <i data-lucide="trash-2" class="w-5 h-5"></i>
                            </div>
                            <div class="flex-1">
                                <div class="font-bold text-slate-800 text-sm">Cancelar Agendamento</div>
                                <div class="text-[10px] text-red-500 uppercase font-bold tracking-wider">Status: Cancelado</div>
                            </div>
                        </button>

                        <button onclick="closeCancelModal()" class="w-full mt-4 py-2 text-slate-400 hover:text-slate-700 font-bold text-sm transition-colors flex items-center justify-center gap-2">
                            <i data-lucide="x" class="w-4 h-4"></i>
                            Fechar
                        </button>
                    </div>
                </div>
            </div>

            <!-- Modal de Anexos -->
            <div id="anexosModal" class="fixed inset-0 bg-black/60 hidden flex items-center justify-center z-[110] animate-fade-in p-4">
                <div class="bg-white rounded-2xl shadow-2xl w-full max-w-xl overflow-hidden border border-slate-200">
                    <div class="bg-slate-800 p-6 text-white flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold flex items-center gap-2">
                                <i data-lucide="paperclip" class="w-6 h-6"></i>
                                Anexos do Atendimento
                            </h3>
                            <p id="anexosNomeServidor" class="text-xs text-slate-400 mt-1 uppercase tracking-wider font-bold"></p>
                        </div>
                        <button onclick="closeAnexosModal()" class="p-2 hover:bg-white/10 rounded-full transition-colors">
                            <i data-lucide="x" class="w-6 h-6"></i>
                        </button>
                    </div>

                    <div class="p-6">
                        <!-- Upload Area -->
                        <div class="mb-6 p-6 border-2 border-dashed border-slate-200 rounded-xl bg-slate-50 flex flex-col items-center justify-center gap-3 group hover:border-blue-500 hover:bg-blue-50 transition-all cursor-pointer relative">
                            <input type="file" id="anexoFileInput" class="absolute inset-0 opacity-0 cursor-pointer" onchange="handleAnexoUpload()">
                            <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center text-slate-400 group-hover:text-blue-600 group-hover:scale-110 transition-all">
                                <i data-lucide="upload-cloud" class="w-6 h-6"></i>
                            </div>
                            <div class="text-center">
                                <p class="text-sm font-bold text-slate-700">Clique ou arraste arquivos aqui</p>
                                <p class="text-xs text-slate-500">PDF, Imagens, Documentos (Máx: 10MB)</p>
                            </div>
                        </div>

                        <!-- List Area -->
                        <div class="space-y-3">
                            <h4 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-2">Arquivos Anexados</h4>
                            <div id="anexosList" class="max-h-60 overflow-y-auto pr-2 space-y-2">
                                <!-- Anexos aparecem aqui -->
                                <div class="text-center py-8 text-slate-400 italic text-sm">Nenhum anexo encontrado.</div>
                            </div>
                        </div>
                    </div>

                    <div class="p-4 bg-slate-50 border-t border-slate-100 text-center">
                        <button onclick="closeAnexosModal()" class="px-6 py-2 bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold rounded-lg transition-all text-sm">Fechar</button>
                    </div>
                </div>
            </div>
        `;

        lucide.createIcons();
        
        window.toggleSuporte = () => {
            const content = document.getElementById('suporteContent');
            const icon = document.getElementById('suporteIcon');
            const isHidden = content.classList.contains('hidden');
            
            if (isHidden) {
                content.classList.remove('hidden');
                icon.style.transform = 'rotate(180deg)';
            } else {
                content.classList.add('hidden');
                icon.style.transform = 'rotate(0deg)';

        const guicheDisplay = document.getElementById('guicheDisplay');
        const alterarGuicheBtn = document.getElementById('alterarGuicheBtn');
        const statusToggleBtn = document.getElementById('statusToggleBtn');
        const activeCallSection = document.getElementById('activeCallSection');
        const queueSection = document.getElementById('queueSection');
        const arrivalsSection = document.getElementById('arrivalsSection');
        const queueList = document.getElementById('queueList');
        const arrivalsList = document.getElementById('arrivalsList');
        const chamarBtn = document.getElementById('chamarProximoBtn');
        const totalAgendadosEl = document.getElementById('totalAgendados');
        const totalAguardandoEl = document.getElementById('totalAguardando');

        // Modals
        const statusModal = document.getElementById('statusModal');
        const newStatusSelect = document.getElementById('newStatusSelect');
        const statusReasonDiv = document.getElementById('statusReasonDiv');
        const statusReason = document.getElementById('statusReason');
        const guicheModal = document.getElementById('guicheModal');
        const newGuicheInput = document.getElementById('newGuicheInput');

        let currentActiveItem = null;


        window.closeDownloadModal = () => {
            document.getElementById('downloadModal').classList.add('hidden');
        };

        window.manualCall = async (id) => {
            if (currentStatus === 'pausa') {
                window.SAS.utils.notify('warning', 'Você está em pausa. Fique online para chamar o servidor.');
                return;
            }
            if (currentActiveItem) {
                window.SAS.utils.notify('warning', 'Você já tem um atendimento ativo. Encerre-o antes de chamar outro.');
                return;
            }
            window.SAS.utils.modal.confirm(
                'Chamar Servidor',
                'Deseja chamar este servidor agora?',
                async () => {
                    try {
                        // Locate item to check its type
                        const item = await window.SAS.base44.entities.Agendamento.get(id);

                        const isDigital = currentQueueTab !== 'Presencial';
                        const targetStatus = isDigital ? 'em_andamento' : 'na_fila_do_painel';
                        
                        await window.SAS.base44.entities.Agendamento.update(id, {
                            status: targetStatus,
                            atendente_id: user.id,
                            guiche: currentGuiche
                        });
                        
                        if (item && item.tipo_atendimento === 'Ao Público') {
                            window.location.href = `atendimento_publico.html?id=${id}`;
                            return;
                        }

                        isResumedService = false; // Chamada normal, não é retorno
                        loadData();
                        window.SAS.utils.notify('success', isDigital ? 'Atendimento iniciado!' : 'Chamando servidor...');
                    } catch (e) {
                        console.error(e);
                        if (e.status === 409) {
                            window.SAS.utils.notify('warning', 'Painel ocupado. Aguarde o início do atendimento anterior ou tente em 3 min.');
                        } else {
                            window.SAS.utils.notify('error', 'Erro ao chamar servidor.');
                        }
                    }
                }
            );
        };

        // Guiche Logic
        alterarGuicheBtn.addEventListener('click', () => {
            newGuicheInput.value = currentGuiche;
            guicheModal.classList.remove('hidden');
        });

        window.closeGuicheModal = () => {
            guicheModal.classList.add('hidden');
        };

        window.confirmGuicheChange = () => {
            const newGuiche = newGuicheInput.value;
            if (newGuiche && newGuiche.trim() !== '') {
                currentGuiche = newGuiche.trim();
                localStorage.setItem('sas_guiche', currentGuiche);
                guicheDisplay.textContent = currentGuiche === 'Triagem' ? 'Triagem' : `Guichê ${currentGuiche}`;
                window.SAS.utils.notify('success', `Guichê alterado para ${currentGuiche}`);
                closeGuicheModal();
            }
        };

        // Status Logic
        let currentStatus = localStorage.getItem('sas_status') || 'disponivel';
        const currentMotivo = localStorage.getItem('sas_status_motivo');

        const updateStatusUI = (status, motivo = null) => {
            currentStatus = status;
            localStorage.setItem('sas_status', status);
            if (motivo) localStorage.setItem('sas_status_motivo', motivo);
            else localStorage.removeItem('sas_status_motivo');

            if (status === 'pausa') {
                statusToggleBtn.className = 'bg-red-100 text-red-700 border border-red-200 px-4 py-2 rounded-lg font-bold hover:bg-red-200 transition-all flex items-center gap-2 shadow-sm';
                statusToggleBtn.innerHTML = `<div class="w-3 h-3 rounded-full bg-red-500"></div><span>Pausa</span>`;
                statusToggleBtn.title = motivo || 'Em Pausa';
            } else {
                statusToggleBtn.className = 'bg-green-100 text-green-700 border border-green-200 px-4 py-2 rounded-lg font-bold hover:bg-green-200 transition-all flex items-center gap-2 shadow-sm';
                statusToggleBtn.innerHTML = `<div class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></div><span>Online</span>`;
                statusToggleBtn.title = 'Online e disponível';
            }
        };

        // Initialize UI from cache immediately
        updateStatusUI(currentStatus, currentMotivo);

        const fetchStatus = async () => {
            try {
                const response = await fetch('/api/usuarios/online');
                const onlineUsers = await response.json();
                // Use non-strict comparison to handle potential string/number ID differences
                const me = onlineUsers.find(u => u.id == user.id);
                if (me && me.status_atendimento) {
                    // Update if status changed or it's a fresh load
                    updateStatusUI(me.status_atendimento, me.motivo_pausa);
                }
            } catch (e) {
                console.error('Error fetching status:', e);
            }
        };

        statusToggleBtn.addEventListener('click', () => {
            // Open Modal
            newStatusSelect.value = currentStatus === 'pausa' ? 'pausa' : 'disponivel';
            toggleReasonField();
            statusModal.classList.remove('hidden');
        });

        newStatusSelect.addEventListener('change', () => {
            toggleReasonField();
        });

        function toggleReasonField() {
            if (newStatusSelect.value === 'pausa') {
                statusReasonDiv.classList.remove('hidden');
            } else {
                statusReasonDiv.classList.add('hidden');
            }
        }

        window.closeStatusModal = () => {
            statusModal.classList.add('hidden');
        };

        window.confirmStatusChange = async () => {
            const newStatus = newStatusSelect.value;
            let motivo = statusReason.value.trim();

            if (newStatus === 'pausa' && !motivo) {
                window.SAS.utils.notify('warning', 'O motivo da pausa é obrigatório.');
                return;
            }

            updateStatusUI(newStatus, motivo);
            try {
                const response = await fetch(`/api/usuarios/${user.id}/status`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ status: newStatus, motivo: motivo })
                });
                if (!response.ok) throw new Error('Failed to update status');
                window.SAS.utils.notify('success', newStatus === 'pausa' ? 'Status definido como Pausa' : 'Status definido como Online');
                closeStatusModal();
            } catch (e) {
                console.error(e);
                updateStatusUI(currentStatus === 'disponivel' ? 'pausa' : 'disponivel'); // Revert
                window.SAS.utils.notify('error', 'Erro ao atualizar status');
            }
        };

        fetchStatus();

        let currentAnexosAgendamentoId = null;

        window.openAnexosModal = async (id, nome) => {
            currentAnexosAgendamentoId = id;
            const nomeEl = document.getElementById('anexosNomeServidor');
            if (nomeEl) nomeEl.textContent = nome;
            document.getElementById('anexosModal').classList.remove('hidden');
            await loadAnexos(id);
        };

        window.closeAnexosModal = () => {
            document.getElementById('anexosModal').classList.add('hidden');
            currentAnexosAgendamentoId = null;
        };

        async function loadAnexos(id) {
            const listEl = document.getElementById('anexosList');
            if (!listEl) return;

            listEl.innerHTML = '<div class="text-center py-8"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto"></div></div>';
            
            try {
                const response = await fetch(`/api/agendamentos/${id}/anexos`);
                const anexos = await response.json();
                
                if (!anexos || anexos.length === 0) {
                    listEl.innerHTML = '<div class="text-center py-8 text-slate-400 italic text-sm">Nenhum anexo encontrado.</div>';
                    return;
                }
                
                listEl.innerHTML = '';
                anexos.forEach(anexo => {
                    const div = document.createElement('div');
                    div.className = 'flex items-center justify-between p-3 bg-white border border-slate-100 rounded-xl hover:shadow-sm transition-all group';
                    div.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="bg-blue-50 p-2 rounded-lg text-blue-600">
                                <i data-lucide="file" class="w-5 h-5"></i>
                            </div>
                            <div class="overflow-hidden">
                                <div class="font-bold text-slate-800 text-sm truncate" title="${anexo.file_name}">${anexo.file_name}</div>
                                <div class="text-[10px] text-slate-400">${new Date(anexo.created_at).toLocaleString()}</div>
                            </div>
                        </div>
                        <div class="flex items-center gap-2">
                            <a href="${anexo.file_path}" target="_blank" class="p-2 text-blue-600 hover:bg-blue-50 rounded-lg transition-colors" title="Baixar">
                                <i data-lucide="download" class="w-4 h-4"></i>
                            </a>
                            <button onclick="deleteAnexo(${anexo.id})" class="p-2 text-red-400 hover:bg-red-50 hover:text-red-600 rounded-lg transition-colors" title="Excluir">
                                <i data-lucide="trash-2" class="w-4 h-4"></i>
                            </button>
                        </div>
                    `;
                    listEl.appendChild(div);
                });
                lucide.createIcons();
            } catch (e) {
                console.error(e);
                listEl.innerHTML = '<div class="text-center py-8 text-red-500 text-sm">Erro ao carregar anexos.</div>';
            }
        }

        window.handleAnexoUpload = async () => {
            const input = document.getElementById('anexoFileInput');
            const file = input.files[0];
            if (!file) return;

            if (file.size > 10 * 1024 * 1024) {
                window.SAS.utils.notify('error', 'O arquivo é muito grande (máx 10MB)');
                return;
            }

            const formData = new FormData();
            formData.append('file', file);

            try {
                window.SAS.utils.notify('info', 'Enviando arquivo...');
                const response = await fetch(`/api/agendamentos/${currentAnexosAgendamentoId}/anexos`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                
                if (result.success) {
                    window.SAS.utils.notify('success', 'Arquivo anexado!');
                    input.value = '';
                    await loadAnexos(currentAnexosAgendamentoId);
                } else {
                    window.SAS.utils.notify('error', result.error || 'Erro ao subir arquivo');
                }
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro na comunicação com o servidor');
            }
        };

        window.deleteAnexo = (id) => {
            window.SAS.utils.modal.confirm(
                'Excluir Anexo',
                'Tem certeza que deseja remover este arquivo permanentemente?',
                async () => {
                    try {
                        const response = await fetch(`/api/agendamentos/anexos/${id}`, {
                            method: 'DELETE'
                        });
                        const result = await response.json();
                        if (result.success) {
                            window.SAS.utils.notify('success', 'Anexo removido!');
                            await loadAnexos(currentAnexosAgendamentoId);
                        } else {
                            window.SAS.utils.notify('error', 'Erro ao remover anexo');
                        }
                    } catch (e) {
                        window.SAS.utils.notify('error', 'Erro ao excluir arquivo');
                    }
                },
                'danger'
            );
        };

        const loadData = async () => {
            const all = await window.SAS.base44.entities.Agendamento.list();
            const today = todayStr();
            
            // Inclui agendamentos de HOJE ou agendamentos do PASSADO que ainda estão pendentes
            const todayAppointments = all.filter(a => {
                if (a.is_import && a.status === 'concluido') return false; // Ignora carga do CSV apenas se concluído

                const isScheduledToday = a.data_agendamento === today;
                const isCreatedToday = a.created_at && a.created_at.startsWith(today);
                const isArrivalToday = a.hora_chegada && a.hora_chegada.startsWith(today);
                const isConclusionToday = a.hora_conclusao && a.hora_conclusao.startsWith(today);
                const isPendingPast = a.data_agendamento < today && ['agendado', 'chegou', 'pendente', 'em_andamento', 'pendente_resposta', 'na_fila_do_painel'].includes(a.status);
                
                return isScheduledToday || isCreatedToday || isArrivalToday || isConclusionToday || isPendingPast;
            });

            // A "Movimentação do Dia" deve contar apenas o que é DE FATO de hoje, excluindo o backlog pendente que ainda não foi tocado hoje
            const actualTodayMovement = todayAppointments.filter(a => {
                if (a.is_import) return false; // Nunca contar imports como movimentação de hoje
                if (a.tipo_atendimento === 'Ao Público') return false; // Temporário: Ocultar do contador
                
                const isScheduledToday = a.data_agendamento === today;
                const isCreatedToday = a.created_at && a.created_at.startsWith(today);
                const isArrivalToday = a.hora_chegada && a.hora_chegada.startsWith(today);
                const isConclusionToday = a.hora_conclusao && a.hora_conclusao.startsWith(today);
                
                // Se for concluído, conta se foi finalizado hoje E NÃO foi reaberto
                if (a.status === 'concluido') {
                    return (isScheduledToday || isCreatedToday || isConclusionToday) && !a.modified_by;
                }
                
                // Para outros status, considera se foi agendado, criado, chegou ou concluiu hoje
                return isScheduledToday || isCreatedToday || isArrivalToday || isConclusionToday;
            });
            totalAgendadosEl.textContent = actualTodayMovement.length;


            const arrivals = todayAppointments.filter(a => 
                a.status === 'agendado' &&
                (a.tipo_atendimento && a.tipo_atendimento.toLowerCase() === currentQueueTab.toLowerCase() || (!a.tipo_atendimento && currentQueueTab === 'Presencial')) &&
                (currentQueueTab !== 'Whatsapp' && currentQueueTab !== 'E-mail' && currentQueueTab !== 'Telefônico')
            ).sort((a, b) => {
                const dateA = a.data_agendamento + ' ' + (a.hora_inicio || '23:59');
                const dateB = b.data_agendamento + ' ' + (b.hora_inicio || '23:59');
                return dateA.localeCompare(dateB);
            });

            const queue = todayAppointments.filter(a =>
                (a.tipo_atendimento && a.tipo_atendimento.toLowerCase() === currentQueueTab.toLowerCase() || (!a.tipo_atendimento && currentQueueTab === 'Presencial')) &&
                (
                  a.status === 'chegou' || 
                  ((currentQueueTab === 'Whatsapp' || currentQueueTab === 'E-mail' || currentQueueTab === 'Telefônico') && a.status === 'agendado') ||
                  (currentQueueTab === 'Ao Público' && (a.status === 'chegou' || a.status === 'em_andamento'))
                )
            ).sort((a, b) => {
                const dateA = a.data_agendamento + ' ' + (a.hora_inicio || '00:00');
                const dateB = b.data_agendamento + ' ' + (b.hora_inicio || '00:00');
                return dateA.localeCompare(dateB);
            });

            const active = all.find(a =>
                (a.status === 'pendente' || a.status === 'em_andamento' || a.status === 'na_fila_do_painel') &&
                (String(a.atendente_id) === String(user.id) || String(a.modified_by) === String(user.id)) &&
                (a.tipo_atendimento !== 'Ao Público') // Ao Público tickets stay in the queue
            );

            const waitingResponse = all.filter(a => 
                a.status === 'pendente_resposta' && 
                (String(a.atendente_id) === String(user.id) || String(a.modified_by) === String(user.id))
            ).sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

            const doneToday = all.filter(a => 
                !a.is_import &&
                (a.data_agendamento === today || (a.hora_conclusao && a.hora_conclusao.startsWith(today)) || (a.created_at && a.created_at.startsWith(today) && a.status === 'concluido')) && 
                a.status === 'concluido'
            ).sort((a, b) => {
                const timeA = a.hora_conclusao || a.created_at;
                const timeB = b.hora_conclusao || b.created_at;
                return new Date(timeB) - new Date(timeA);
            });

            totalAguardandoEl.textContent = queue.length;

            // Atualiza contadores das abas (Agendados + Chegou)
            const counts = { 'Presencial': 0, 'Whatsapp': 0, 'E-mail': 0, 'Telefônico': 0, 'Externo': 0, 'Ao Público': 0 };
            todayAppointments.filter(a => ['agendado', 'chegou'].includes(a.status)).forEach(a => {
                const canal = a.tipo_atendimento || 'Presencial';
                if (counts[canal] !== undefined) counts[canal]++;
            });
            Object.keys(counts).forEach(canal => {
                const el = document.getElementById(`count-${canal}`);
                if (el) el.textContent = counts[canal];
            });

            renderArrivals(arrivals);
            renderQueue(queue);
            renderStandby(waitingResponse);
            renderActiveCall(active);
            renderDoneToday(doneToday);
        };

        window.switchTab = (tab) => {
            currentQueueTab = tab;
            ['Presencial', 'Whatsapp', 'E-mail', 'Telefônico', 'Externo', 'Ao Público'].forEach(t => {
                const btn = document.getElementById(`tab-${t}`);
                if (btn) {
                    if (t === tab) {
                        btn.className = 'px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-blue-600 text-blue-700 whitespace-nowrap';
                    } else {
                        btn.className = 'px-4 py-2 font-bold text-sm rounded-t-lg transition-all border-b-2 border-transparent text-gray-400 hover:bg-gray-50 whitespace-nowrap';
                    }
                }
            });
            loadData();
        };

        const renderArrivals = (items) => {
            arrivalsList.innerHTML = '';
            if (items.length === 0) {
                arrivalsList.innerHTML = '<p class="text-gray-400 italic">Nenhum agendamento pendente de chegada.</p>';
                return;
            }
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-4 border border-gray-100 rounded-lg hover:bg-gray-50';
                div.innerHTML = `
                    <div>
                        <div class="font-bold text-gray-800">${item.nome_completo}</div>
                        <div class="text-sm text-gray-500">${item.hora_inicio || 'Sem horário'} - ${item.tipo_servico}${formatInclusionDate(item.created_at)}</div>
                    </div>
                    <div class="flex gap-2">
                         <button onclick="confirmArrival('${item.id}')" class="bg-green-600 text-white px-4 py-1.5 rounded font-bold text-sm hover:bg-green-700 flex items-center gap-1">
                            <i data-lucide="check" class="w-4 h-4"></i> Confirmar Chegada
                        </button>
                        <button onclick="markNoShow('${item.id}')" class="bg-red-100 text-red-600 px-4 py-1.5 rounded font-bold text-sm hover:bg-red-200">
                            Não Compareceu
                        </button>
                    </div>
                `;
                arrivalsList.appendChild(div);
            });
            lucide.createIcons();
        };

        const renderStandby = (items) => {
            const standbySection = document.getElementById('standbySection');
            const standbyList = document.getElementById('standbyList');
            
            if (items.length === 0) {
                standbySection.classList.add('hidden');
                return;
            }
            
            standbySection.classList.remove('hidden');
            standbyList.innerHTML = '';
            
            items.forEach(item => {
                const div = document.createElement('div');
                div.className = 'flex justify-between items-center p-4 border border-orange-100 rounded-lg bg-orange-50/30 hover:bg-orange-50 transition-colors';
                div.innerHTML = `
                    <div class="flex items-center gap-4">
                        <div class="bg-orange-100 p-2 rounded-full text-orange-600">
                            <i data-lucide="${item.tipo_atendimento === 'Whatsapp' ? 'message-circle' : (item.tipo_atendimento === 'E-mail' ? 'mail' : 'phone')}" class="w-5 h-5"></i>
                        </div>
                        <div>
                            <div class="font-bold text-gray-800">${item.nome_completo}</div>
                            <div class="text-xs text-orange-700 font-medium uppercase tracking-wider">${item.tipo_atendimento} • ${item.tipo_servico}${formatInclusionDate(item.created_at)}</div>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="resumeService('${item.id}')" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-1.5 rounded-lg font-bold text-sm flex items-center gap-1 transition-all shadow-sm">
                            <i data-lucide="play" class="w-4 h-4"></i> Retomar
                        </button>
                    </div>
                `;
                standbyList.appendChild(div);
            });
            lucide.createIcons();
        };

        const renderQueue = (items) => {
            queueSection.classList.remove('hidden');
            queueList.innerHTML = '';
            if (items.length === 0) {
                queueList.innerHTML = `
                    <div class="bg-yellow-50 p-4 rounded-lg border border-yellow-200 text-yellow-800 flex justify-between items-center">
                        <span>Ninguém aguardando na fila.</span>
                    </div>
                `;
                return;
            }
            items.forEach(item => {
                const isUrgent = item.prioridade === 'Preferencial';
                const bgClass = isUrgent ? 'bg-red-50 border-red-200' : 'bg-green-50 border-green-200';
                const textClass = isUrgent ? 'text-red-800' : 'text-green-800';
                const badge = isUrgent ? '<span class="bg-red-200 text-red-800 text-xs px-2 py-0.5 rounded-full font-bold uppercase">PREFERENCIAL</span>' : '';

                const div = document.createElement('div');
                div.className = `${bgClass} border p-4 rounded-lg flex justify-between items-center`;
                
                let extraInfo = '';
                if (currentQueueTab === 'Whatsapp' || currentQueueTab === 'Telefônico') {
                    extraInfo = `<div class="text-xs font-bold ${textClass} mt-1 flex items-center gap-1"><i data-lucide="phone" class="w-3 h-3"></i> ${item.telefone || '-'}</div>`;
                } else if (currentQueueTab === 'E-mail') {
                    extraInfo = `<div class="text-xs font-bold ${textClass} mt-1 flex items-center gap-1"><i data-lucide="mail" class="w-3 h-3"></i> ${item.email || '-'}</div>`;
                }

                div.innerHTML = `
                    <div class="flex-1">
                        <div class="font-bold ${textClass} text-lg">${item.nome_completo} ${badge}</div>
                        <div class="text-sm ${textClass} opacity-80">${item.tipo_servico}${formatInclusionDate(item.created_at)}</div>
                        ${extraInfo}
                    </div>
                    <div class="flex items-center gap-4">
                        ${(() => {
                            if (currentQueueTab === 'Whatsapp') {
                                return `
                                    <button onclick="manualCall('${item.id}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 transition-all shadow-sm">
                                        <i data-lucide="message-circle" class="w-3.5 h-3.5"></i> Atender
                                    </button>
                                `;
                            } else if (currentQueueTab === 'E-mail') {
                                return `
                                    <button onclick="manualCall('${item.id}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 transition-all shadow-sm">
                                        <i data-lucide="mail" class="w-3.5 h-3.5"></i> Responder
                                    </button>
                                `;
                            } else if (currentQueueTab === 'Telefônico') {
                                return `
                                    <button onclick="manualCall('${item.id}')" class="bg-blue-100 hover:bg-blue-200 text-blue-700 px-3 py-1.5 rounded-lg font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 transition-all shadow-sm">
                                        <i data-lucide="phone" class="w-3.5 h-3.5"></i> Atender
                                    </button>
                                `;

            const assuntoRows = document.querySelectorAll('.assunto-row');
            const assuntosAdicionais = [];
            assuntoRows.forEach(row => {

                const descricao = row.querySelector('.assunto-descricao').value;
                assuntosAdicionais.push({ categoria, descricao });
            });

            const draft = {
                obs1,
                obs2,
                servicoCorrigido,
                telefoneCorrigido,
                assuntosAdicionais,
                timestamp: new Date().getTime()
            };

            localStorage.setItem(`sas_draft_${id}`, JSON.stringify(draft));
        };

                if (draft.obs2) document.getElementById('obs2').value = draft.obs2;

            div.innerHTML = `
                <div class="flex-1">
                    <select onchange="saveServiceDraft('${id}')" class="assunto-categoria w-full p-2 border border-slate-300 rounded-md text-xs mb-1 outline-none">
                        <option value="">Selecione a categoria...</option>
                        <option value="Aposentadoria" ${initialCategoria === 'Aposentadoria' ? 'selected' : ''}>Aposentadoria</option>
                        <option value="Atendimento Geral" ${initialCategoria === 'Atendimento Geral' ? 'selected' : ''}>Atendimento Geral</option>
                        <option value="Seleção Pública Simplificada" ${initialCategoria === 'Seleção Pública Simplificada' ? 'selected' : ''}>Seleção Pública Simplificada</option>
                        <option value="Certidão" ${initialCategoria === 'Certidão' ? 'selected' : ''}>Certidão</option>
                        <option value="Licença" ${initialCategoria === 'Licença' ? 'selected' : ''}>Licença</option>
                        <option value="Pagamento" ${initialCategoria === 'Pagamento' ? 'selected' : ''}>Pagamento</option>
                        <option value="Plantão Extraordinário" ${initialCategoria === 'Plantão Extraordinário' ? 'selected' : ''}>Plantão Extraordinário</option>
                    </select>
                    <textarea oninput="saveServiceDraft('${id}')" class="assunto-descricao w-full p-2 border border-slate-300 rounded-md text-xs outline-none h-12" placeholder="Relate detalhadamente o que foi tratado neste assunto...">${initialDescricao}</textarea>
                </div>
                <button onclick="this.parentElement.remove(); saveServiceDraft('${id}')" class="text-red-500 p-1 self-start">
                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                </button>
            `;
            container.appendChild(div);
            lucide.createIcons();
            if (!initialCategoria) saveServiceDraft(id); // Salva que adicionou uma linha vazia
        };

        window.finishService = async (id) => {
            const obs1 = document.getElementById('obs1').value;
            const obs2 = document.getElementById('obs2').value;
            const servicoCorrigido = document.getElementById('servicoCorrigido').value;
            const telefoneCorrigido = document.getElementById('telefoneCorrigido') ? document.getElementById('telefoneCorrigido').value : undefined;
            
            // Coleta de assuntos adicionais dinâmicos
            const assuntoRows = document.querySelectorAll('.assunto-row');
            const assuntosAdicionais = [];
            let validationFailed = false;

            assuntoRows.forEach(row => {
                const categoria = row.querySelector('.assunto-categoria').value;
                const descricao = row.querySelector('.assunto-descricao').value;
                if (!categoria || !descricao.trim()) {
                    validationFailed = true;
                }
                assuntosAdicionais.push({ categoria, descricao });
            });

            const isChat = currentActiveItem && (currentActiveItem.tipo_atendimento === 'Externo' || currentActiveItem.tipo_atendimento === 'WhatsApp/Sistema');
            if (!isChat && (!obs1.trim() || !obs2.trim())) {
                window.SAS.utils.notify('warning', 'É preciso preencher as duas observações para encerrar.');
                return;
            }

            if (validationFailed) {
                window.SAS.utils.notify('warning', 'Por favor, preencha a categoria e a descrição de todos os assuntos adicionais.');
                return;
            }

            try {
                // Captura o registro atual para ver se já tem dono
                const currentAg = await window.SAS.base44.entities.Agendamento.get(id);
                
                const updates = {
                    status: 'concluido',
                    data_agendamento: resumedOriginalDate || undefined, // Mantém a data original que capturamos na reabertura
                    tipo_servico: servicoCorrigido,
                    observacao_problema: obs1,
                    observacao_solucao: obs2,
                    assuntos_adicionais: assuntosAdicionais.length > 0 ? JSON.stringify(assuntosAdicionais) : null
                };

                if (telefoneCorrigido !== undefined) {
                    updates.telefone = telefoneCorrigido;
                }

                // Se não tem dono, o atual assume. Se já tem, marca como modificado (mesmo se for o mesmo usuário, para manter o rastro de que houve edição).
                if (!currentAg.atendente_id) {
                    updates.atendente_id = user.id;
                } else if (isResumedService || String(currentAg.atendente_id) !== String(user.id)) {
                    updates.modified_by = user.id;
                    updates.modified_at = new Date().toISOString().replace('T', ' ').split('.')[0];
                }

                await window.SAS.base44.entities.Agendamento.update(id, updates);

                // Carrega dados atualizados para download
                const respAll = await fetch('/api/agendamentos');
                const agAll = await respAll.json();
                const updatedAg = agAll.find(a => String(a.id) === String(id));

                if (currentActiveItem && currentActiveItem.tipo_atendimento === 'Ao Público') {
                    window.SAS.utils.notify('success', 'Atendimento ao público finalizado! Ele agora está disponível no Relatório de Atendimento Público.');
                } else {
                    window.SAS.utils.notify('success', 'Atendimento finalizado com sucesso!');
                }

                // Atualiza o painel de download manual (sem modal automático)
                const lastServiceSection = document.getElementById('lastServiceSection');
                const lastServiceName = document.getElementById('lastServiceName');
                const lastBtnReq = document.getElementById('lastBtnReq');
                const lastBtnComp = document.getElementById('lastBtnComp');

                lastServiceName.textContent = updatedAg.nome_completo;
                lastBtnReq.onclick = () => window.SAS.pdf.generateRequerimentoA(updatedAg);
                lastBtnComp.onclick = () => {
                    const chefia = user.nome_assinatura || user.nome_completo || user.nome;
                    window.SAS.pdf.generateComprovante(updatedAg, chefia);
                };

                lastServiceSection.classList.remove('hidden');
                lucide.createIcons();

                window.SAS.utils.notify('success', 'Atendimento encerrado com sucesso!');
                localStorage.removeItem(`sas_draft_${id}`); // Limpa rascunho ao finalizar
                loadData();
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao encerrar atendimento.');
            }
        };

        const transferModal = document.getElementById('transferModal');
        const transferUserSelect = document.getElementById('transferUserSelect');
        const transferObs = document.getElementById('transferObs');
        let itemToTransferId = null;

        window.openTransferModal = async (id) => {
            itemToTransferId = id;
            transferObs.value = '';

            try {
                const [users, onlineUsers] = await Promise.all([
                    window.SAS.base44.entities.SystemUser.list(),
                    fetch('/api/usuarios/online').then(res => res.json())
                ]);

                const excludedNames = [
                    'Administrador Sistema',
                    'Lara Lívia Agra Amaral',
                    'Williams Americo Sobrinho'
                ];

                const activeUsers = users.filter(u => {
                    const isSelf = String(u.id) === String(user.id);
                    const isAttendant = u.tipo === 'usuario';
                    const isAtivo = u.situacao === 'ativo';
                    const isExcluded = excludedNames.includes(u.nome_completo);
                    return !isSelf && isAttendant && isAtivo && !isExcluded;
                });

                transferUserSelect.innerHTML = '<option value="">Selecione um atendente...</option>';

                activeUsers.forEach(u => {
                    const onlineInfo = onlineUsers.find(ou => String(ou.id) === String(u.id));
                    let statusText = 'Offline';
                    let statusColor = '⚪';
                    let reasonSuffix = '';

                    if (onlineInfo) {
                        if (onlineInfo.status_atendimento === 'pausa') {
                            statusText = 'Pausa';
                            statusColor = '🔴';
                            reasonSuffix = onlineInfo.motivo_pausa ? ` (${onlineInfo.motivo_pausa})` : '';
                        } else if (onlineInfo.status_atendimento === 'offline') {
                            statusText = 'Offline';
                            statusColor = '⚪';
                        } else {
                            statusText = 'Online';
                            statusColor = '🟢';
                        }
                    }

                    const option = document.createElement('option');
                    option.value = u.id;
                    option.dataset.guiche = u.guiche_atual || '';
                    option.textContent = `${u.nome_completo || u.usuario} (Guichê ${u.guiche_atual || '?'}) - ${statusColor} ${statusText}${reasonSuffix}`;
                    option.title = onlineInfo && onlineInfo.motivo_pausa ? `Motivo da Pausa: ${onlineInfo.motivo_pausa}` : statusText;

                    if (statusText !== 'Online') {
                        option.disabled = true;
                        option.classList.add('text-gray-400');
                    }

                    transferUserSelect.appendChild(option);
                });
                transferModal.classList.remove('hidden');
            } catch (e) {
                console.error('Error loading users for transfer:', e);
                window.SAS.utils.notify('error', 'Erro ao carregar lista de atendentes.');
            }
        };

        window.closeTransferModal = () => {
            transferModal.classList.add('hidden');
            itemToTransferId = null;
        };

        window.pauseService = async (id) => {
            const obs1 = document.getElementById('obs1').value;
            const obs2 = document.getElementById('obs2').value;
            const servico = document.getElementById('servicoCorrigido').value;

            try {
                // Get additional subjects if any
                const assuntos = [];
                const rows = document.querySelectorAll('.assunto-row');
                rows.forEach(row => {
                    const cat = row.querySelector('.assunto-categoria').value;
                    const desc = row.querySelector('.assunto-descricao').value;
                    if (cat && desc) assuntos.push({ categoria: cat, descricao: desc });
                });

                await window.SAS.base44.entities.Agendamento.update(id, {
                    status: 'pendente_resposta',
                    observacao_problema: obs1,
                    observacao_solucao: obs2,
                    tipo_servico: servico,
                    assuntos_adicionais: JSON.stringify(assuntos)
                });

                window.SAS.utils.notify('success', 'Atendimento colocado em aguardo.');
                loadData();
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao colocar em standby.');
            }
        };

        window.resumeService = async (id) => {
            if (currentActiveItem) {
                window.SAS.utils.notify('warning', 'Você já possui um atendimento ativo. Pause ou encerre-o antes de retomar outro.');
                return;
            }

            try {
                // Busca o registro atual para capturar a data original e o dono atual
                const ag = await window.SAS.base44.entities.Agendamento.get(id);
                resumedOriginalDate = ag.data_agendamento;

                const updates = {
                    status: 'em_andamento',
                    guiche: currentGuiche
                };

                // Lógica de "dono" vs "editor"
                if (!ag.atendente_id) {
                    updates.atendente_id = user.id;
                } else {
                    updates.modified_by = user.id;
                    updates.modified_at = new Date().toISOString().replace('T', ' ').split('.')[0];
                }

                await window.SAS.base44.entities.Agendamento.update(id, updates);
                
                if (ag && ag.tipo_atendimento === 'Ao Público') {
                    window.location.href = `atendimento_publico.html?id=${id}`;
                    return;
                }

                isResumedService = true; // Ativa flag de retorno
                shouldFocusResumed = true; // Ativa flag de foco
                window.SAS.utils.notify('success', 'Atendimento retomado!');
                loadData();
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao retomar atendimento.');
            }
        };

        window.confirmTransfer = async () => {
            if (!itemToTransferId) return;
            const targetUserId = transferUserSelect.value;
            const targetGuiche = transferUserSelect.options[transferUserSelect.selectedIndex].dataset.guiche;
            const obs = transferObs.value;
            if (!targetUserId) {
                window.SAS.utils.notify('warning', 'Selecione um atendente para transferir.');
                return;
            }
            if (!obs.trim()) {
                window.SAS.utils.notify('warning', 'Por favor, informe o motivo da transferência.');
                return;
            }

            const obs1 = document.getElementById('obs1') ? document.getElementById('obs1').value : null;
            const obs2 = document.getElementById('obs2') ? document.getElementById('obs2').value : null;

            window.SAS.utils.modal.confirm(
                'Transferir Atendimento',
                'Tem certeza que deseja transferir este atendimento?',
                async () => {
                    try {
                        await window.SAS.base44.entities.Agendamento.update(itemToTransferId, {
                            status: 'pendente',
                            atendente_id: targetUserId,
                            guiche: targetGuiche,
                            observacao_transferencia: obs,
                            observacao_problema: obs1,
                            observacao_solucao: obs2
                        });
                        window.SAS.utils.notify('success', 'Atendimento transferido com sucesso!');
                        closeTransferModal();
                        loadData();
                    } catch (e) {
                        console.error(e);
                        window.SAS.utils.notify('error', e.message || 'Erro ao transferir atendimento.');
                    }
                }
            );
        };

        chamarBtn.addEventListener('click', async () => {
            if (currentStatus === 'pausa') {
                window.SAS.utils.notify('warning', 'Você está em pausa. Fique online para chamar o próximo.');
                return;
            }
            if (currentActiveItem) {
                window.SAS.utils.notify('warning', 'Você já tem um atendimento ativo. Encerre-o antes de chamar o próximo.');
                return;
            }

            try {
                const response = await fetch('/api/agendamentos/proximo', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        atendente_id: user.id,
                        guiche: currentGuiche,
                        channel: currentQueueTab
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    isResumedService = false; // Chamada normal
                    window.SAS.utils.notify('success', 'Chamando próximo da fila...');
                    loadData();
                } else {
                    window.SAS.utils.notify('info', 'Não há ninguém aguardando na fila ou o painel está ocupado.');
                }
            } catch (e) {
                console.error(e);
                window.SAS.utils.notify('error', 'Erro ao chamar próximo.');
            }
        });

        window.resetPanel = async () => {
            if (!confirm('Deseja realmente resetar o painel? Isso limpará qualquer chamado travado e atualizará a fila.')) return;
            
            try {
                const response = await fetch('/api/agendamentos/reset-painel', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const result = await response.json();
                if (result.success) {
                    window.SAS.utils.notify('success', 'Painel resetado e fila atualizada!');
                    loadData(); // Recarrega os dados para atualizar o aviso
                } else {
                    window.SAS.utils.notify('error', 'Erro ao resetar: ' + (result.error || 'Erro desconhecido'));
                }
            } catch (error) {
                console.error('Erro resetPanel:', error);
                window.SAS.utils.notify('error', 'Falha na comunicação com o servidor.');
            }
        };

        window.recallToPanel_local = async (id) => {
            try {
                const response = await fetch(`/api/agendamentos/${id}/recall`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ guiche: currentGuiche })
                });
                
                if (response.ok) {
                    window.SAS.utils.notify('success', 'Chamada enviada ao painel!');
                } else {
                    const err = await response.json();
                    window.SAS.utils.notify('warning', err.error || 'Painel ocupado.');
                }
            } catch (e) {
                window.SAS.utils.notify('error', 'Erro ao rechamar no painel.');
            }
        };

        loadData();
        setInterval(loadData, 3000);

        // Check for resume ID in URL on load
        document.addEventListener('DOMContentLoaded', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const resumeId = urlParams.get('resume');
            if (resumeId) {
                // Clear URL params to avoid re-triggering on refresh
                window.history.replaceState({}, document.title, window.location.pathname);
                
                // Small delay to ensure everything is loaded before resuming
                setTimeout(() => {
                    window.resumeService(resumeId);
                }, 500);
            }
        });
    </script>
</body>
