<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAS - Sistema de Atendimento ao Servidor</title>
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/index.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

</head>
<body>
    <!-- Container principal com fundo gradiente -->
    <div class="container">
        <!-- Card de login centralizado -->
        <div class="login-card">
            <!-- Seção esquerda - Formulário de login -->
            <div class="login-section">

                <!-- Título de boas-vindas -->
                <div class="welcome-section">
                    <h2 class="welcome-title">Seja bem-vindo</h2>
                </div>

                <!-- Formulário de login -->
                <form class="login-form" id="loginForm">
                    <!-- Campo de login -->
                    <div class="input-group">
                        <label for="username" class="input-label">Login</label>
                        <input type="text" id="username" name="username" class="input-field" placeholder="Digite seu login" required>
                    </div>

                    <!-- Campo de senha -->
                    <div class="input-group">
                        <label for="password" class="input-label">Senha</label>
                        <div class="password-container">
                        <input type="password" id="password" name="password" class="input-field" placeholder="Digite sua senha" required>
                        <button type="button" class="password-toggle" id="passwordToggle">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                    </div>

                    <!-- Checkbox lembrar-me -->
                    <div class="checkbox-group">
                        <input type="checkbox" id="rememberMe" name="rememberMe">
                        <label for="rememberMe" class="checkbox-label">Lembrar-me</label>
                    </div>

                    <!-- Mensagem de erro -->
                    <div class="error-message" id="errorMessage" role="alert" aria-live="assertive"></div>

                    <!-- Botão de login -->
                    <button type="submit" class="login-button">
                        <span class="button-text">Efetuar Login</span>
                    </button>

                    <!-- Link esqueci a senha -->
                    <a href="#" class="forgot-password" id="forgotPassword">Esqueci a senha</a>
                </form>

                <!-- Rodapé do card -->
                <div class="card-footer">
                    <p>&copy; 2025 SAS — Sistema de Atendimento ao Servidor | Governo de Pernambuco</p>
                </div>
            </div>

            <!-- Seção direita - Imagem institucional -->
            <div class="image-section">
                        <!-- Logo central -->
                        <img src="../../Icones/logo_sistema.png" alt="Logo do Sistema" class="system-logo">

                        <!-- Logo SES no rodapé -->
                        <img src="../../Icones/ses_pe_logo.png" alt="Logo SES" class="ses-logo">
                    </div>
                </div>
            </div>
        </div>
    </div>


<!-- Modal funcional: Esqueci minha senha -->
<div class="modal" id="forgotPasswordModal" aria-hidden="true">
  <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="recSenhaTitulo">
    <div class="modal-header">
      <h3 id="recSenhaTitulo">Recuperar Senha</h3>
      <button class="modal-close" id="modalClose" aria-label="Fechar">&times;</button>
    </div>
    <div class="modal-body">
      <div class="input-group">
        <label for="recoveryNome" class="input-label">Usuário cadastrado</label>
        <input type="text" id="recoveryNome" class="input-field" placeholder="Digite seu usuário" autocomplete="username">
      </div>
      <div class="input-group">
        <label for="recoverySenha" class="input-label">Nova senha</label>
        <input type="password" id="recoverySenha" class="input-field" placeholder="Digite a nova senha" autocomplete="new-password">
      </div>
      <div class="input-group">
        <label for="recoveryConfirma" class="input-label">Confirmar senha</label>
        <input type="password" id="recoveryConfirma" class="input-field" placeholder="Confirme a nova senha" autocomplete="new-password">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-secondary" id="cancelRecovery">Cancelar</button>
        <button type="button" class="btn-primary" id="resetPasswordBtn">Confirmar</button>
      </div>
    </div>
  </div>
</div>


    <!-- Força limpeza de sessão antiga ao abrir a página de login -->
    <script>
      (function(){
        try {
          ['nomeUsuario','sga_username','sga_login_time','token_sas','sas_usuario','token_expires_at'].forEach(function(k){ localStorage.removeItem(k); });
          // manter preferências como sga_remember
        } catch(e) {}
      })();
    </script>
   
 
<!-- Scripts do olhinho -->
<script>
    const passwordInput = document.getElementById('password');
    const passwordToggle = document.getElementById('passwordToggle');
    const eyeIcon = document.getElementById('eyeIcon');

    passwordToggle.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            eyeIcon.classList.remove('bi-eye');
            eyeIcon.classList.add('bi-eye-slash');
        } else {
            passwordInput.type = 'password';
            eyeIcon.classList.remove('bi-eye-slash');
            eyeIcon.classList.add('bi-eye');
        }
    });
</script>

<!-- Usuário de teste embutido no HTML -->
<script>
// Base de usuários simulada
const usuariosTeste = [
  {
    username: "admin",
    password: "123",
    nome: "Administrador Teste"
  },
  {
    username: "lucas",
    password: "1234",
    nome: "Lucas Mateus"
  }
];

// Lógica de login para usar usuários de teste
document.getElementById("loginForm").addEventListener("submit", function (e) {
  e.preventDefault();

  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value.trim();
  const errorBox = document.getElementById("errorMessage");

  const usuarioEncontrado = usuariosTeste.find(
    u => u.username === user && u.password === pass
  );

  if (!usuarioEncontrado) {
    errorBox.textContent = "Usuário ou senha inválidos.";
    return;
  }

  // Salva nome do usuário
  localStorage.setItem("nomeUsuario", usuarioEncontrado.nome);

  // Redireciona para a página inicial do sistema
  window.location.href = "./home.html";
;

});
</script>


</body>
</html>
